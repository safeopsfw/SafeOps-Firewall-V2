<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connected!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 60px 40px;
            text-align: center;
            animation: scaleIn 0.5s ease-out;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .success-icon {
            font-size: 80px;
            margin-bottom: 24px;
            animation: bounce 1s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            color: #11998e;
            font-size: 32px;
            margin-bottom: 16px;
        }

        p {
            color: #666;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .features {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 24px;
            margin: 24px 0;
            text-align: left;
        }

        .feature {
            display: flex;
            align-items: center;
            margin: 12px 0;
            color: #333;
        }

        .feature-icon {
            font-size: 24px;
            margin-right: 12px;
        }

        .close-btn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(17, 153, 142, 0.4);
        }

        .close-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(17, 153, 142, 0.6);
        }

        .close-btn:active {
            transform: translateY(0);
        }

        .footer {
            margin-top: 24px;
            color: #999;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 40px 24px;
            }

            h1 {
                font-size: 28px;
            }

            .success-icon {
                font-size: 64px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">✅</div>
        <h1>You're Connected!</h1>
        <p>{{.Message}}</p>

        <div class="features">
            <div class="feature">
                <span class="feature-icon">🌐</span>
                <span>Full internet access enabled</span>
            </div>
            <div class="feature">
                <span class="feature-icon">🔒</span>
                <span>Secure network connection</span>
            </div>
            <div class="feature">
                <span class="feature-icon">✨</span>
                <span>Certificate successfully verified</span>
            </div>
        </div>

        <button class="close-btn" onclick="window.close()">Close This Window</button>

        <div class="footer">
            <p>You can now browse the internet freely</p>
        </div>
    </div>

    <script>
        // Auto-redirect to a test page after 5 seconds
        setTimeout(() => {
            // Try to navigate to a popular site to demonstrate connectivity
            // This will only work if the DNS hijacking has stopped
            window.location.href = 'https://www.google.com';
        }, 5000);
    </script>
</body>
</html>
