# SafeOps Firewall Engine - Domain Category Patterns
# ===================================================
# This file defines domain patterns for each category.
# Categories are toggled on/off in blocklist.toml [domains.categories].
# This file is loaded at startup and on hot-reload.
#
# Pattern syntax:
#   "*.example.com"  - matches example.com and all subdomains
#   "example.com"    - exact match only
#
# Add new domains to expand blocking coverage without recompiling.
# Hot-reload: changes to this file take effect within seconds.

