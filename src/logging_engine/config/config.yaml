# =============================================================================
# SafeOps FV2 - Centralized Configuration
# =============================================================================
# All modules (capture, parsers, storage, utils) should read from this file.
# Path: D:\SafeOpsFV2\src\logging_engine\config\config.yaml

# =============================================================================
# BASE PATHS
# =============================================================================
paths:
  # Project root
  base_dir: "D:/SafeOpsFV2"
  
  # Logs directory
  logs_dir: "D:/SafeOpsFV2/logs"
  
  # Logging engine source
  src_dir: "D:/SafeOpsFV2/src/logging_engine"
  
  # Config directory
  config_dir: "D:/SafeOpsFV2/src/logging_engine/config"

# =============================================================================
# LOG FILES
# =============================================================================
log_files:
  # Primary packet log (written by realtime_capture.py)
  network_packets: "D:/SafeOpsFV2/logs/network_packets.log"
  
  # SSL keys for decryption
  ssl_keys: "D:/SafeOpsFV2/logs/sslkeys.log"
  
  # Error logs
  errors: "D:/SafeOpsFV2/logs/logging_engine_errors.log"
  
  # Firewall output
  firewall: "D:/SafeOpsFV2/logs/firewall/firewall.log"
  
  # IDS output
  ids: "D:/SafeOpsFV2/logs/ids/ids.log"
  
  # NetFlow output
  netflow: "D:/SafeOpsFV2/logs/netflow/netflow.log"

# =============================================================================
# CAPTURE SETTINGS
# =============================================================================
capture:
  # Payload size in bytes (256 = good balance, 1500 = full)
  payload_size: 256
  
  # Interfaces to capture ("all" or specific name like "Wi-Fi")
  interfaces: "all"
  
  # Exclusions
  exclude_localhost: true
  exclude_ipv6: true
  exclude_multicast: true
  exclude_broadcast: true

# =============================================================================
# LOG ROTATION
# =============================================================================
rotation:
  # Rotation interval in seconds (300 = 5 minutes)
  interval_seconds: 300
  
  # Number of backups to keep (0 = no backups, clear and rewrite)
  backup_count: 0
  
  # Max file size before rotation (in MB, 0 = no size limit)
  max_size_mb: 0

# =============================================================================
# PROTOCOL PARSING
# =============================================================================
parsing:
  http: true
  https_metadata: true  # SNI, JA3, certificates
  dns: true
  tcp_flags: true
  udp: true
  icmp: true
  file_extraction: true  # Extract filenames from HTTP

# =============================================================================
# FLOW TRACKING
# =============================================================================
flow_tracking:
  enabled: true
  timeout_seconds: 60
  cleanup_interval: 30

# =============================================================================
# PROCESS TRACKING
# =============================================================================
process_tracking:
  enabled: true
  cache_timeout: 10

# =============================================================================
# DEDUPLICATION
# =============================================================================
deduplication:
  enabled: true
  strategy: "connection"  # 'exact', 'connection', or 'flow'
  window_seconds: 120
  cache_size: 50000

# =============================================================================
# WRITER SETTINGS (for firewall_writer, ids_writer, netflow_writer)
# =============================================================================
writers:
  # Batch processing
  batch_size: 100
  batch_timeout: 1.0
  
  # Worker threads
  worker_threads: 6
  queue_maxsize: 20000
  
  # Poll interval
  poll_interval: 0.05

# =============================================================================
# GEO INTELLIGENCE
# =============================================================================
geo:
  enabled: false  # Set to true if you have geo data
  csv_path: "D:/SafeOpsFV2/data/geo/geo_master_full.csv"
  cache_size: 10000

# =============================================================================
# FIREWALL RULES
# =============================================================================
firewall_rules:
  enabled: false  # Set to true if you have rules
  rules_path: "D:/SafeOpsFV2/data/firewall/firewall_rules.json"
  cache_size: 5000

# =============================================================================
# GAMING/BYPASS DETECTION PORTS
# =============================================================================
gaming_ports:
  - 3074   # Xbox Live
  - 3478   # PlayStation/Steam
  - 27015  # CS:GO/Source
  - 25565  # Minecraft

# =============================================================================
# CRITICAL SECURITY PORTS
# =============================================================================
critical_ports:
  - 22     # SSH
  - 23     # Telnet
  - 3389   # RDP
  - 445    # SMB
  - 1433   # MSSQL
  - 3306   # MySQL
  - 5432   # PostgreSQL
  - 6379   # Redis

# =============================================================================
# THREAT INTELLIGENCE API
# =============================================================================
threat_intel:
  # Enable threat intel lookups
  enabled: true
  
  # Local API endpoint
  api_url: "http://localhost:8080"
  
  # API timeout in seconds
  timeout: 1
  
  # Cache settings
  cache_ttl: 300  # 5 minutes
  cache_size: 5000
  
  # Only lookup public IPs (skip private/internal)
  public_only: true

# =============================================================================
# UNKNOWN IP TRACKING
# =============================================================================
unknown_ip_tracking:
  enabled: true
  csv_path: "D:/SafeOpsFV2/logs/unknown_ips.csv"
  save_interval: 60  # Save to CSV every 60 seconds