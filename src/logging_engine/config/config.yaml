# Central configuration for SafeOps pipeline
# Defines log paths, TI sources, file hashing, and sampling rates

# General pipeline settings
pipeline:
  sampling_rate: 0.2  # 20% sampling for local traffic
  log_rotation:
    enabled: true
    max_size_mb: 100
    backup_count: 5
  log_paths:
    raw_logs: "safeops/logs/network_raw.log"
    error_logs: "safeops/logs/network_raw_errors.log"
    processed_logs: "safeops/logs/ngfw_processed.log"
    ngfw_logs: "safeops/logs/ngfw.log"
    ngfw_error_logs: "safeops/logs/ngfw_errors.log"
    ngfw_windows_logs: "safeops/logs/ngfw_windows.log"
    safeops_logs: "safeops/logs/safeops.log"

# Threat Intelligence (TI) API configurations
threat_intelligence:
  abuseip:
    enabled: false  # Disabled due to missing API key
    fetch_script: "safeops/backend/modules/AbuseIP/abuse_ip_fetch.py"
    sync_script: "safeops/backend/modules/AbuseIP/abuseipdb_sync.py"
    output_csv: "safeops/backend/modules/AbuseIP/abuse_master.updated.csv"
    fetch_interval: 3600  # Seconds (1 hour)
  domain:
    enabled: true
    sources:
      blacklisted: "safeops/backend/modules/Domain/blacklisted_master.csv"
      malicious: "safeops/backend/modules/Domain/malicious_domains_master.csv"
      phishing: "safeops/backend/modules/Domain/phishing_master.csv"
      ioc: "safeops/backend/modules/Domain/ioc_latest.csv"
    fetch_script: "safeops/backend/modules/Domain/domain_fetch.py"
    state_file: "safeops/backend/modules/Domain/domain_fetch_state.json"
    fetch_interval: 86400  # Seconds (24 hours)
  geo:
    enabled: false  # Disabled due to missing API key
    fetch_script: "safeops/backend/modules/Geo/geo_ipfetch.py"
    intelligence_script: "safeops/backend/modules/Geo/geo_intelligence.py"
    output_csv: "safeops/backend/modules/Geo/geo_master_full.csv"
    database: "safeops/backend/modules/Geo/geo_seen.db"
    fetch_interval: 86400  # Seconds (24 hours)
  virustotal:
    enabled: false  # Disabled due to missing API key
    fetch_interval: 86400  # Seconds (24 hours)

# File hashing configuration
file_hashing:
  enabled: false  # Disabled due to missing secret key
  hash_algorithm: "sha256"
  hash_log_path: "safeops/logs/hash_logs.log"

# Data Loss Prevention (DLP) settings
dlp:
  content_inspection: "safeops/backend/modules/dlp/content_inspection.py"
  policy_enforcement: "safeops/backend/modules/dlp/policy_enforcement.py"
  enabled: true

# Logging engine settings
logging_engine:
  config: "safeops/backend/modules/logging_engine/config/config.yaml"
  capture:
    npcap: "safeops/backend/modules/logging_engine/capture/capture_npcap.py"
    realtime: "safeops/backend/modules/logging_engine/capture/realtime_capture.py"
  parsers:
    pcap: "safeops/backend/modules/logging_engine/parsers/pcap_parser.py"
    json_line: "safeops/backend/modules/logging_engine/parsers/json_line_serializer.py"
  storage:
    firewall_writer: "safeops/backend/modules/logging_engine/storage/firewall_writer.py"
    ids_writer: "safeops/backend/modules/logging_engine/storage/ids_writer.py"
    netflow_writer: "safeops/backend/modules/logging_engine/storage/netflow_writer.py"

# Addons for network processing
addons:
  windivert:
    dll: "safeops/backend/modules/addons/WinDivert.dll"
    sys: "safeops/backend/modules/addons/WinDivert64.sys"