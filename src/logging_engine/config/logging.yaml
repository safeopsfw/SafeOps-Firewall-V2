# Logging configuration for SafeOps FV2
# Single file, 5-minute rotation

version: 1
disable_existing_loggers: false

formatters:
  detailed:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  simple:
    format: "%(levelname)s: %(message)s"
  jsonl:
    format: "%(message)s"  # Raw JSON line output

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: simple
    stream: ext://sys.stdout

  network_packets:
    class: logging.handlers.TimedRotatingFileHandler
    level: DEBUG
    formatter: jsonl
    filename: D:/SafeOpsFV2/logs/network_packets.log
    when: S
    interval: 300  # 5 minutes
    backupCount: 0  # No backups - clear and rewrite

  error_file:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: detailed
    filename: D:/SafeOpsFV2/logs/logging_engine_errors.log
    maxBytes: 10485760  # 10MB
    backupCount: 3

loggers:
  capture:
    level: DEBUG
    handlers: [console, network_packets, error_file]
    propagate: false

  parser:
    level: DEBUG
    handlers: [console, error_file]
    propagate: false

  writer:
    level: DEBUG
    handlers: [console, network_packets, error_file]
    propagate: false

root:
  level: INFO
  handlers: [console]