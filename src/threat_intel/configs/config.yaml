# =============================================================================
# SafeOps Threat Intelligence - Main Configuration
# =============================================================================
# This file contains system-wide settings for the threat intelligence module.
# For security, sensitive values use environment variable substitution.
# Example: ${POSTGRES_PASSWORD} reads from POSTGRES_PASSWORD env var
# =============================================================================

# =============================================================================
# Database Configuration
# =============================================================================
database:
  host: localhost
  port: 5432
  database: safeops
  username: postgres
  password: ${POSTGRES_PASSWORD}  # Set via environment variable
  ssl_mode: disable  # Options: disable, require, verify-ca, verify-full
  
  # Connection Pooling
  max_open_connections: 25
  max_idle_connections: 5
  connection_max_lifetime: 1h
  connection_max_idle_time: 15m
  
  # Timeouts
  connect_timeout: 10s
  query_timeout: 30s

# =============================================================================
# Feed Fetcher Configuration
# =============================================================================
fetcher:
  # Concurrency & Performance
  default_concurrency: 6
  default_timeout: 30s
  max_feed_size: 524288000  # 500MB in bytes
  
  # HTTP Settings
  user_agent: "SafeOps-ThreatIntel/2.0"
  follow_redirects: true
  max_redirects: 10
  verify_ssl: true
  
  # Retry Logic
  default_retries: 3
  retry_backoff_multiplier: 2
  max_retry_delay: 5m
  
  # Directories
  download_directory: ./data/downloads
  cache_directory: ./data/cache
  
  # Caching
  cache_enabled: true
  cache_ttl: 1h

# =============================================================================
# Enrichment Configuration
# =============================================================================
enrichment:
  # Geolocation
  enable_geolocation: true
  geolocation_provider: IP2Location  # Options: IP2Location, MaxMind, DB-IP
  geolocation_cache_size: 100000
  geolocation_cache_ttl: 24h
  
  # ASN Lookup
  enable_asn_lookup: true
  asn_provider: TeamCymru  # Options: TeamCymru, RouteViews
  
  # Anonymizer Detection
  enable_anonymizer_detection: true
  anonymizer_update_frequency: 1h
  
  # Threat Scoring
  enable_threat_scoring: true
  threat_scoring_algorithm: MultiSource  # Options: MultiSource, FrequencyBased, Hybrid
  
  # API Keys (use environment variables)
  maxmind_license_key: ${MAXMIND_LICENSE_KEY}
  ip2location_api_key: ${IP2LOCATION_API_KEY}

# =============================================================================
# Scheduler Configuration
# =============================================================================
scheduler:
  enabled: true
  
  # Default Schedules (Cron format)
  default_hourly_schedule: "0 * * * *"        # Every hour at minute 0
  default_daily_schedule: "0 2 * * *"         # Daily at 2:00 AM
  default_weekly_schedule: "0 3 * * 0"        # Sunday at 3:00 AM
  default_monthly_schedule: "0 4 1 * *"       # First day of month at 4:00 AM
  
  # Concurrency & Limits
  max_concurrent_jobs: 5
  job_timeout: 2h
  
  # Failure Handling
  failure_retry_delay: 30m
  failure_alert_threshold: 3  # Consecutive failures before alerting

# =============================================================================
# Storage Configuration
# =============================================================================
storage:
  # Bulk Insert Settings
  bulk_insert_batch_size: 10000
  bulk_insert_concurrency: 4
  
  # Deduplication
  enable_deduplication: true
  deduplication_cache_size: 1000000
  deduplication_method: Exact  # Options: Exact, Fuzzy, Semantic
  
  # Data Retention
  retention_enabled: true
  retention_days: 90
  retention_schedule: "0 5 * * *"  # Daily at 5:00 AM

# =============================================================================
# Web UI Configuration
# =============================================================================
webui:
  enabled: true
  
  # Server Settings
  host: 0.0.0.0
  port: 8085
  
  # Authentication
  authentication_enabled: true
  authentication_method: BasicAuth  # Options: BasicAuth, OAuth, LDAP
  username: admin
  password_hash: ${THREAT_INTEL_WEBUI_PASSWORD}  # Bcrypt hash via env var
  
  # Session Management
  session_secret: ${THREAT_INTEL_SESSION_SECRET}
  session_timeout: 24h
  
  # CORS Settings
  cors_enabled: false
  cors_origins:
    - http://localhost:3000
    - http://localhost:8080
  
  # Rate Limiting
  rate_limit_enabled: true
  rate_limit_requests: 100  # Requests per minute
  
  # TLS/HTTPS Settings
  tls_enabled: false
  tls_certificate: ./certs/threat_intel.crt
  tls_key: ./certs/threat_intel.key

# =============================================================================
# Logging Configuration
# =============================================================================
logging:
  level: info  # Options: debug, info, warn, error
  format: json  # Options: json, text
  output: both  # Options: stdout, file, both
  
  # File Logging
  log_file: ./logs/threat_intel.log
  max_size: 104857600  # 100MB in bytes
  max_backups: 5
  max_age: 30  # Days
  compress: true

# =============================================================================
# Metrics Configuration
# =============================================================================
metrics:
  enabled: true
  port: 9090
  path: /metrics
  
  # Metric Categories
  enable_runtime_metrics: true
  enable_database_metrics: true
  enable_fetcher_metrics: true
  enable_enrichment_metrics: true

# =============================================================================
# Feature Flags
# =============================================================================
features:
  # Processing Features
  enable_ip_processing: true
  enable_domain_processing: true
  enable_hash_processing: true
  enable_url_processing: true
  
  # Advanced Features
  enable_relationship_tracking: true
  enable_campaign_detection: false  # Experimental
  enable_ml_threat_scoring: false   # Experimental
  
  # Integration Features
  enable_external_apis: false  # Disable external API calls (user preference)
  enable_virustotal: false
  enable_abuseipdb: false
  enable_urlhaus: false

# =============================================================================
# Operational Limits
# =============================================================================
limits:
  # Rate Limits
  max_iocs_per_fetch: 1000000
  max_sources_per_ioc: 50
  max_tags_per_ioc: 20
  
  # Query Limits
  max_query_results: 10000
  max_export_records: 100000
  
  # API Limits
  api_rate_limit: 1000  # Requests per hour
  api_burst_limit: 50   # Burst requests

# =============================================================================
# Notification Configuration
# =============================================================================
notifications:
  enabled: false
  
  # Email Notifications
  email_enabled: false
  smtp_host: smtp.gmail.com
  smtp_port: 587
  smtp_username: ${SMTP_USERNAME}
  smtp_password: ${SMTP_PASSWORD}
  email_from: threat-intel@safeops.local
  email_to:
    - security@safeops.local
  
  # Slack Notifications
  slack_enabled: false
  slack_webhook_url: ${SLACK_WEBHOOK_URL}
  slack_channel: "#threat-intel"
  
  # Notification Events
  notify_on_feed_failure: true
  notify_on_critical_threat: true
  notify_on_high_volume: true

# =============================================================================
# Development & Debug Settings
# =============================================================================
development:
  debug_mode: false
  enable_profiling: false
  profiling_port: 6060
  
  # Testing
  test_mode: false
  mock_external_services: false
  
  # Performance
  enable_query_logging: false
  enable_slow_query_logging: true
  slow_query_threshold: 1s
