# =============================================================================
# SafeOps Threat Intelligence - Reputation Feed Sources
# =============================================================================
# This file defines IP and domain reputation scoring services that provide
# dynamic reputation assessments based on behavioral analysis, historical
# activity, and crowd-sourced intelligence for nuanced threat detection.
# =============================================================================

feeds:
  # ===========================================================================
  # AbuseIPDB - Community IP Reputation
  # ===========================================================================
  - id: abuseipdb-reputation
    name: "AbuseIPDB IP Reputation"
    description: "Community-driven IP abuse reporting and reputation scoring"
    enabled: false  # Disabled - requires API key
    
    # Source URL
    url: https://api.abuseipdb.com/api/v2/check
    format: json
    update_interval: 0  # Real-time API
    timeout: 10s
    retry_attempts: 2
    retry_backoff: linear
    
    # Reputation Scope
    scope:
      reputation_scope: ip_address
      supports_ipv4: true
      supports_ipv6: true
      supports_cidr_ranges: false
      supports_wildcard_domains: false
      supports_url_components: false
    
    # Scoring System
    scoring:
      score_type: numeric
      score_range_min: 0
      score_range_max: 100
      score_interpretation: higher_is_worse  # 0=clean, 100=malicious
      risk_categories:
        - clean
        - low
        - medium
        - high
        - critical
      threshold_clean: 25
      threshold_suspicious: 50
      threshold_malicious: 75
      confidence_provided: true
      confidence_range: 0-100
    
    # Reputation Factors
    factors:
      factors_included:
        - spam_activity
        - scanning
        - bruteforce
        - malware_hosting
        - botnet_membership
      temporal_weighting: true
      lookback_period_days: 90
      decay_function: exponential
      positive_signals_included: false
      crowd_sourced_component: true
    
    # Authentication
    authentication:
      auth_type: api_key
      api_key: ${ABUSEIPDB_API_KEY}
    
    # API Service Configuration
    api:
      is_rest_api: true
      is_real_time: true
      api_endpoint_template: https://api.abuseipdb.com/api/v2/check?ipAddress={ip}
      api_method: GET
      api_key_location: header
      api_key_name: Key
      api_rate_limit_per_second: 0
      api_rate_limit_per_minute: 60  # Free tier
      api_rate_limit_per_day: 1000
      api_batch_lookup_supported: true
      api_batch_size: 100
      api_response_format: json
      api_cache_ttl_seconds: 3600  # 1 hour
      api_timeout_ms: 10000
    
    # Parser Configuration
    parser:
      parser_type: json
      json_path_entity: "$.data.ipAddress"
      json_path_score: "$.data.abuseConfidenceScore"
      json_path_category: "$.data.usageType"
      json_path_confidence: "$.data.abuseConfidenceScore"
      json_path_factors: "$.data.reports[*].categories"
      json_path_last_updated: "$.data.lastReportedAt"
    
    # Enrichment Integration
    enrichment:
      priority_order: 1  # Primary reputation source
      use_for_threat_scoring: true
      use_for_alerting: true
      use_for_blocking_decisions: false
      combine_with_other_sources: true
      aggregation_method: weighted_average
      weight_factor: 0.4
      override_static_blocklists: false
    
    # Historical Tracking
    historical:
      track_reputation_history: true
      history_retention_days: 90
      detect_reputation_changes: true
      change_threshold_delta: 20
      trend_analysis_enabled: true
      anomaly_detection_enabled: true
    
    # Context and Metadata
    context:
      provides_threat_categories: true
      provides_activity_timestamps: true
      provides_geographic_context: true
      provides_asn_context: true
      provides_dns_metadata: false
      provides_ssl_certificate_info: false
      provides_references: true
      provides_related_entities: false
    
    # False Positive Handling
    false_positive:
      false_positive_feedback_supported: true
      whitelist_override_enabled: true
      legitimate_service_detection: true
      context_aware_scoring: true
      user_behavior_analysis: false
      time_based_reputation_decay: true
    
    # Data Quality and Validation
    validation:
      validate_score_range: true
      validate_entity_format: true
      validate_confidence_scores: true
      require_minimum_confidence: 50
      reject_stale_data: true
      staleness_threshold_hours: 24
      cross_validate_sources: true
    
    # Caching and Performance
    performance:
      enable_local_cache: true
      cache_size_mb: 256
      cache_ttl_seconds: 3600  # 1 hour
      negative_cache_enabled: true
      negative_cache_ttl_seconds: 1800  # 30 min
      preload_common_entities: false
      concurrent_lookup_limit: 10
      circuit_breaker_enabled: true
    
    # Rate Limiting
    rate_limiting:
      requests_per_second: 1
      requests_per_minute: 60
      requests_per_day: 1000
      burst_allowed: false
      rate_limit_strategy: wait
      fallback_source_id: ""
      quota_monitoring_enabled: true
    
    # Error Handling
    error_handling:
      on_fetch_error: fallback
      on_parse_error: skip
      on_timeout: cache_only
      on_quota_exceeded: cache_only
      error_alert_threshold: 5
      auto_disable_after_failures: 10
      fallback_to_cache: true
      fallback_to_alternative_source: ""
      graceful_degradation_mode: cache_only
    
    # Cost Management
    cost:
      is_commercial_service: true
      cost_per_lookup: 0.0  # Free tier
      monthly_budget_limit: 0
      quota_alert_threshold: 80
      cost_optimization_enabled: true
      fallback_to_free_tier: false
    
    # Compliance and Privacy
    compliance:
      license_type: commercial
      data_residency: us
      gdpr_compliant: true
      data_sharing_policy: with_partners
      retention_policy: "90 days"
      attribution_required: false
      compliance_notes: "AbuseIPDB API terms apply"
    
    # Monitoring
    monitoring:
      track_lookup_latency: true
      track_cache_hit_rate: true
      track_error_rate: true
      track_quota_usage: true
      alert_on_service_degradation: true

  # ===========================================================================
  # Simple Reputation Database - Local Scoring
  # ===========================================================================
  - id: local-reputation-database
    name: "Local IP Reputation Database"
    description: "Locally maintained reputation scores from aggregated feeds"
    enabled: true
    
    url: file:///data/reputation/local_reputation.csv
    format: csv
    update_interval: 1h  # Hourly recalculation
    timeout: 30s
    retry_attempts: 3
    retry_backoff: exponential
    
    scope:
      reputation_scope: ip_address
      supports_ipv4: true
      supports_ipv6: true
      supports_cidr_ranges: true
      supports_wildcard_domains: false
      supports_url_components: false
    
    scoring:
      score_type: numeric
      score_range_min: 0
      score_range_max: 100
      score_interpretation: higher_is_worse
      risk_categories:
        - clean
        - low
        - medium
        - high
        - critical
      threshold_clean: 20
      threshold_suspicious: 40
      threshold_malicious: 70
      confidence_provided: true
      confidence_range: 0-100
    
    factors:
      factors_included:
        - historical_behavior
        - malware_hosting
        - phishing
        - scanning
        - botnet_membership
      temporal_weighting: true
      lookback_period_days: 30
      decay_function: linear
      positive_signals_included: false
      crowd_sourced_component: false
    
    authentication:
      auth_type: none
    
    parser:
      parser_type: csv
      csv_delimiter: comma
      csv_entity_column: 0  # IP address
      csv_score_column: 1  # reputation_score
      csv_category_column: 2  # risk_category
      csv_confidence_column: 3  # confidence
      csv_factors_column: 4  # factors
    
    enrichment:
      priority_order: 2  # Secondary source
      use_for_threat_scoring: true
      use_for_alerting: true
      use_for_blocking_decisions: true
      combine_with_other_sources: true
      aggregation_method: average
      weight_factor: 0.3
      override_static_blocklists: false
    
    historical:
      track_reputation_history: true
      history_retention_days: 90
      detect_reputation_changes: true
      change_threshold_delta: 15
      trend_analysis_enabled: true
      anomaly_detection_enabled: false
    
    context:
      provides_threat_categories: true
      provides_activity_timestamps: true
      provides_geographic_context: false
      provides_asn_context: false
      provides_dns_metadata: false
      provides_ssl_certificate_info: false
      provides_references: false
      provides_related_entities: false
    
    false_positive:
      false_positive_feedback_supported: false
      whitelist_override_enabled: true
      legitimate_service_detection: true
      context_aware_scoring: true
      user_behavior_analysis: false
      time_based_reputation_decay: true
    
    validation:
      validate_score_range: true
      validate_entity_format: true
      validate_confidence_scores: true
      require_minimum_confidence: 0
      reject_stale_data: false
      staleness_threshold_hours: 48
      cross_validate_sources: false
    
    performance:
      enable_local_cache: true
      cache_size_mb: 512
      cache_ttl_seconds: 3600
      negative_cache_enabled: false
      negative_cache_ttl_seconds: 0
      preload_common_entities: true
      concurrent_lookup_limit: 2000
      circuit_breaker_enabled: false
    
    rate_limiting:
      requests_per_second: 0  # Local database
      requests_per_minute: 0
      requests_per_day: 0
      burst_allowed: false
      rate_limit_strategy: wait
      quota_monitoring_enabled: false
    
    error_handling:
      on_fetch_error: retry
      on_parse_error: skip
      on_timeout: skip
      error_alert_threshold: 3
      auto_disable_after_failures: 5
      fallback_to_cache: true
      fallback_to_alternative_source: ""
      graceful_degradation_mode: skip
    
    cost:
      is_commercial_service: false
      cost_per_lookup: 0.0
      monthly_budget_limit: 0
      quota_alert_threshold: 0
      cost_optimization_enabled: false
      fallback_to_free_tier: false
    
    compliance:
      license_type: free
      data_residency: local
      gdpr_compliant: true
      data_sharing_policy: none
      retention_policy: "90 days"
      attribution_required: false
      compliance_notes: "Locally maintained database"
    
    monitoring:
      track_lookup_latency: true
      track_cache_hit_rate: true
      track_error_rate: true
      track_quota_usage: false
      alert_on_service_degradation: false

