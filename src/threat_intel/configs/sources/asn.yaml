# =============================================================================
# SafeOps Threat Intelligence - ASN Feed Sources
# =============================================================================
# This file defines ASN (Autonomous System Number) data sources for IP-to-ASN
# mapping, organization attribution, and network intelligence. Used for
# enriching threat data with network ownership and routing context.
# =============================================================================

feeds:
  # ===========================================================================
  # Team Cymru IP-to-ASN - Free Mapping Service
  # ===========================================================================
  - id: team-cymru-ip-to-asn
    name: "Team Cymru IP-to-ASN Database"
    description: "Community-maintained IP prefix to ASN mapping (DNS-based)"
    enabled: true
    
    # Source URL
    url: https://www.team-cymru.com/IP-ASN-mapping.html
    format: csv
    update_interval: 24h  # Daily updates
    timeout: 60s
    retry_attempts: 3
    retry_backoff: exponential
    
    # Data Source Type
    source:
      source_type: bgp_routing
      authority: team_cymru
      is_authoritative: false  # Third-party aggregation
      data_scope: global
      regional_scope:
        - global
      includes_historical_data: false
      real_time_updates: false
    
    # Authentication
    authentication:
      auth_type: none  # Free service
    
    # ASN Data Fields
    fields:
      provides_asn_number: true
      provides_organization_name: true
      provides_ip_prefixes: true
      provides_country: true
      provides_registry: true
      provides_allocation_date: false
      provides_contact_info: false
      provides_routing_policy: false
      provides_peering_info: false
      provides_upstream_providers: false
      provides_abuse_contacts: false
      provides_network_type: false
    
    # Parser Configuration
    parser:
      parser_type: csv
      csv_delimiter: pipe  # "|" delimiter
      csv_skip_lines: 0
      csv_asn_column: 0  # AS number
      csv_org_column: 2  # Organization name
      csv_prefix_column: 1  # IP prefix
      csv_country_column: 3  # Country code
      csv_registry_column: 4  # RIR registry
    
    # IP Prefix Handling
    prefixes:
      extract_ipv4_prefixes: true
      extract_ipv6_prefixes: true
      aggregate_prefixes: false
      min_prefix_length_ipv4: 8
      max_prefix_length_ipv4: 32
      min_prefix_length_ipv6: 16
      max_prefix_length_ipv6: 128
      exclude_bogon_prefixes: true
      validate_cidr_format: true
    
    # Organization Classification
    classification:
      classify_network_type: true
      network_type_keywords:
        hosting:
          - hosting
          - cloud
          - vps
          - datacenter
          - server
        isp:
          - telecom
          - internet
          - broadband
          - communications
        cdn:
          - cdn
          - content delivery
          - cloudflare
          - akamai
        education:
          - university
          - college
          - education
          - research
        government:
          - government
          - military
          - defense
        mobile:
          - mobile
          - wireless
          - cellular
      detect_hosting_providers: true
      detect_isps: true
      detect_cdns: true
      detect_education: true
      detect_government: true
      detect_mobile_carriers: true
      bulletproof_hosting_indicators:
        - bulletproof
        - offshore
        - anonymous
    
    # Enrichment Integration
    enrichment:
      priority_order: 1  # Primary ASN source
      use_for_ip_enrichment: true
      use_for_anonymizer_classification: true
      use_for_threat_scoring: true
      asn_reputation_scoring: true
      track_asn_abuse_history: true
      high_risk_asns:
        - 12989  # Known malicious hosting
        - 24940  # Bulletproof hosting example
      trusted_asns:
        - 16509  # Amazon AWS
        - 15169  # Google
        - 13335  # Cloudflare
        - 8075   # Microsoft Azure
        - 32934  # Facebook
        - 2906   # Netflix
    
    # BGP Routing Intelligence
    bgp:
      is_bgp_feed: true
      bgp_data_type: full_table
      track_routing_changes: false
      detect_hijacking: false
      detect_route_leaks: false
      monitor_rpki_validation: false
      alert_on_anomalies: false
      anomaly_detection_threshold: 0
    
    # Data Quality and Validation
    validation:
      validate_asn_format: true
      validate_org_name: false
      validate_country_codes: true
      validate_prefix_ownership: false
      reject_invalid_entries: false
      require_organization_name: false
      validation_strictness: moderate
    
    # Caching and Performance
    performance:
      enable_local_cache: true
      cache_size_mb: 512
      cache_ttl_hours: 24
      preload_database: true
      index_by_asn: true
      index_by_prefix: true  # Longest prefix match
      concurrent_lookup_limit: 1000
    
    # WHOIS Integration
    whois:
      enable_whois_queries: false
      whois_server: ""
      whois_port: 43
      whois_rate_limit: 0
      whois_timeout_seconds: 5
      cache_whois_responses: false
      whois_cache_ttl_days: 7
      fallback_to_whois: false
    
    # Database Update Handling
    updates:
      check_for_updates: true
      update_check_interval: 24h
      atomic_update: true
      backup_previous_version: true
      verify_checksum: false
      checksum_url: ""
      post_update_validation: true
      rollback_on_validation_failure: true
      incremental_updates_supported: false
    
    # Rate Limiting
    rate_limiting:
      requests_per_minute: 0  # Local database
      requests_per_hour: 0
      requests_per_day: 0
      burst_allowed: false
      rate_limit_strategy: wait
      fallback_source_id: ""
    
    # Error Handling
    error_handling:
      on_fetch_error: retry
      on_parse_error: skip_entry
      on_lookup_error: fallback
      error_alert_threshold: 3
      auto_disable_after_failures: 5
      fallback_to_cache: true
      fallback_to_whois: false
    
    # Compliance and Attribution
    licensing:
      license_type: public_domain
      attribution_required: true
      attribution_text: "ASN data provided by Team Cymru"
      data_usage_restrictions:
        - non_commercial_preferred
      redistribution_allowed: false
      compliance_notes: "Team Cymru IP-to-ASN mapping service"
    
    # Monitoring
    monitoring:
      track_fetch_duration: true
      track_lookup_latency: true
      track_cache_hit_rate: true
      track_error_rate: true
      alert_on_update_failure: true

  # ===========================================================================
  # RIPE RIS BGP Data - Routing Intelligence
  # ===========================================================================
  - id: ripe-ris-bgp-data
    name: "RIPE RIS BGP Routing Data"
    description: "Real routing table data from RIPE Route Information Service"
    enabled: true
    
    url: https://data.ris.ripe.net/rrc00/latest-bview.gz
    format: bgp_dump
    update_interval: 8h  # Every 8 hours
    timeout: 300s
    retry_attempts: 3
    retry_backoff: exponential
    
    source:
      source_type: bgp_routing
      authority: ripe
      is_authoritative: true  # Actual BGP data
      data_scope: global
      regional_scope:
        - global
      includes_historical_data: true
      real_time_updates: false
    
    authentication:
      auth_type: none
    
    fields:
      provides_asn_number: true
      provides_organization_name: false
      provides_ip_prefixes: true
      provides_country: false
      provides_registry: false
      provides_allocation_date: false
      provides_contact_info: false
      provides_routing_policy: true
      provides_peering_info: true
      provides_upstream_providers: true
      provides_abuse_contacts: false
      provides_network_type: false
    
    parser:
      parser_type: bgp_mrt
      bgp_format_version: mrt
    
    prefixes:
      extract_ipv4_prefixes: true
      extract_ipv6_prefixes: true
      aggregate_prefixes: false
      min_prefix_length_ipv4: 8
      max_prefix_length_ipv4: 24
      min_prefix_length_ipv6: 16
      max_prefix_length_ipv6: 48
      exclude_bogon_prefixes: true
      validate_cidr_format: true
    
    classification:
      classify_network_type: false
      detect_hosting_providers: false
      detect_isps: false
      detect_cdns: false
      detect_education: false
      detect_government: false
      detect_mobile_carriers: false
    
    enrichment:
      priority_order: 2  # Secondary source
      use_for_ip_enrichment: true
      use_for_anonymizer_classification: false
      use_for_threat_scoring: false
      asn_reputation_scoring: false
      track_asn_abuse_history: false
      high_risk_asns: []
      trusted_asns: []
    
    bgp:
      is_bgp_feed: true
      bgp_data_type: full_table
      track_routing_changes: true
      detect_hijacking: true
      detect_route_leaks: true
      monitor_rpki_validation: false
      alert_on_anomalies: true
      anomaly_detection_threshold: 5  # Moderate sensitivity
    
    validation:
      validate_asn_format: true
      validate_org_name: false
      validate_country_codes: false
      validate_prefix_ownership: true
      reject_invalid_entries: false
      require_organization_name: false
      validation_strictness: moderate
    
    performance:
      enable_local_cache: true
      cache_size_mb: 1024  # Larger for BGP data
      cache_ttl_hours: 8
      preload_database: false  # Too large
      index_by_asn: true
      index_by_prefix: true
      concurrent_lookup_limit: 500
    
    whois:
      enable_whois_queries: false
      fallback_to_whois: false
    
    updates:
      check_for_updates: true
      update_check_interval: 8h
      atomic_update: true
      backup_previous_version: true
      verify_checksum: false
      post_update_validation: true
      rollback_on_validation_failure: true
      incremental_updates_supported: false
    
    rate_limiting:
      requests_per_minute: 0
    
    error_handling:
      on_fetch_error: retry
      on_parse_error: skip_entry
      on_lookup_error: skip
      error_alert_threshold: 3
      auto_disable_after_failures: 5
      fallback_to_cache: true
      fallback_to_whois: false
    
    licensing:
      license_type: public_domain
      attribution_required: true
      attribution_text: "BGP data from RIPE RIS"
      data_usage_restrictions: []
      redistribution_allowed: true
      compliance_notes: "RIPE RIS data is freely available"
    
    monitoring:
      track_fetch_duration: true
      track_lookup_latency: true
      track_cache_hit_rate: true
      track_error_rate: true
      alert_on_update_failure: true

  # ===========================================================================
  # ARIN WHOIS Database - North America Registry
  # ===========================================================================
  - id: arin-whois-database
    name: "ARIN WHOIS Database"
    description: "American Registry for Internet Numbers (North America)"
    enabled: true
    
    url: https://ftp.arin.net/pub/stats/arin/delegated-arin-extended-latest
    format: csv
    update_interval: 24h
    timeout: 60s
    retry_attempts: 3
    retry_backoff: exponential
    
    source:
      source_type: rir_allocation
      authority: arin
      is_authoritative: true
      data_scope: regional
      regional_scope:
        - north_america
      includes_historical_data: false
      real_time_updates: false
    
    authentication:
      auth_type: none
    
    fields:
      provides_asn_number: true
      provides_organization_name: false  # Requires separate WHOIS lookup
      provides_ip_prefixes: true
      provides_country: true
      provides_registry: true
      provides_allocation_date: true
      provides_contact_info: false
      provides_routing_policy: false
      provides_peering_info: false
      provides_upstream_providers: false
      provides_abuse_contacts: false
      provides_network_type: false
    
    parser:
      parser_type: csv
      csv_delimiter: pipe
      csv_skip_lines: 0
      csv_asn_column: -1  # Complex format
      csv_prefix_column: -1
      csv_country_column: 1
      csv_registry_column: 0
    
    prefixes:
      extract_ipv4_prefixes: true
      extract_ipv6_prefixes: true
      aggregate_prefixes: false
      min_prefix_length_ipv4: 8
      max_prefix_length_ipv4: 32
      min_prefix_length_ipv6: 16
      max_prefix_length_ipv6: 128
      exclude_bogon_prefixes: true
      validate_cidr_format: true
    
    classification:
      classify_network_type: false
      detect_hosting_providers: false
      detect_isps: false
      detect_cdns: false
      detect_education: false
      detect_government: false
      detect_mobile_carriers: false
    
    enrichment:
      priority_order: 3  # Regional source
      use_for_ip_enrichment: true
      use_for_anonymizer_classification: false
      use_for_threat_scoring: false
      asn_reputation_scoring: false
      track_asn_abuse_history: false
      high_risk_asns: []
      trusted_asns: []
    
    bgp:
      is_bgp_feed: false
      track_routing_changes: false
      detect_hijacking: false
      detect_route_leaks: false
    
    validation:
      validate_asn_format: true
      validate_org_name: false
      validate_country_codes: true
      validate_prefix_ownership: false
      reject_invalid_entries: false
      require_organization_name: false
      validation_strictness: moderate
    
    performance:
      enable_local_cache: true
      cache_size_mb: 256
      cache_ttl_hours: 24
      preload_database: true
      index_by_asn: true
      index_by_prefix: true
      concurrent_lookup_limit: 1000
    
    whois:
      enable_whois_queries: true
      whois_server: whois.arin.net
      whois_port: 43
      whois_rate_limit: 10  # 10 queries per minute
      whois_timeout_seconds: 10
      cache_whois_responses: true
      whois_cache_ttl_days: 30
      fallback_to_whois: true
    
    updates:
      check_for_updates: true
      update_check_interval: 24h
      atomic_update: true
      backup_previous_version: true
      verify_checksum: false
      post_update_validation: true
      rollback_on_validation_failure: true
      incremental_updates_supported: false
    
    rate_limiting:
      requests_per_minute: 0  # Database download
    
    error_handling:
      on_fetch_error: retry
      on_parse_error: skip_entry
      on_lookup_error: fallback
      error_alert_threshold: 3
      auto_disable_after_failures: 5
      fallback_to_cache: true
      fallback_to_whois: true
    
    licensing:
      license_type: rir_terms
      attribution_required: true
      attribution_text: "Data from ARIN"
      data_usage_restrictions:
        - no_commercial_resale
      redistribution_allowed: false
      compliance_notes: "ARIN Bulk WHOIS data usage terms apply"
    
    monitoring:
      track_fetch_duration: true
      track_lookup_latency: true
      track_cache_hit_rate: true
      track_error_rate: true
      alert_on_update_failure: true

  # ===========================================================================
  # Example: Commercial ASN Service
  # ===========================================================================
  - id: commercial-asn-service
    name: "Example Commercial ASN Database"
    description: "Premium ASN intelligence service (template)"
    enabled: false  # Disabled template
    
    url: https://example.com/asn-database.json
    format: json
    update_interval: 12h
    timeout: 60s
    retry_attempts: 3
    retry_backoff: exponential
    
    source:
      source_type: whois_database
      authority: commercial
      is_authoritative: false
      data_scope: global
      regional_scope:
        - global
      includes_historical_data: true
      real_time_updates: false
    
    authentication:
      auth_type: api_key
      api_key: ${ASN_DATABASE_API_KEY}
    
    fields:
      provides_asn_number: true
      provides_organization_name: true
      provides_ip_prefixes: true
      provides_country: true
      provides_registry: true
      provides_allocation_date: true
      provides_contact_info: true
      provides_routing_policy: false
      provides_peering_info: false
      provides_upstream_providers: false
      provides_abuse_contacts: true
      provides_network_type: true
    
    parser:
      parser_type: json
      json_path_asn: "$.asns[*].asn"
      json_path_organization: "$.asns[*].organization"
      json_path_prefixes: "$.asns[*].prefixes[*]"
      json_path_country: "$.asns[*].country"
    
    prefixes:
      extract_ipv4_prefixes: true
      extract_ipv6_prefixes: true
      aggregate_prefixes: true
      min_prefix_length_ipv4: 8
      max_prefix_length_ipv4: 32
      min_prefix_length_ipv6: 16
      max_prefix_length_ipv6: 128
      exclude_bogon_prefixes: true
      validate_cidr_format: true
    
    classification:
      classify_network_type: true
      network_type_keywords:
        hosting:
          - hosting
          - cloud
          - vps
        isp:
          - telecom
          - internet
        cdn:
          - cdn
          - cloudflare
      detect_hosting_providers: true
      detect_isps: true
      detect_cdns: true
      detect_education: true
      detect_government: true
      detect_mobile_carriers: true
      bulletproof_hosting_indicators:
        - bulletproof
        - offshore
    
    enrichment:
      priority_order: 4  # Lower priority commercial source
      use_for_ip_enrichment: true
      use_for_anonymizer_classification: true
      use_for_threat_scoring: true
      asn_reputation_scoring: true
      track_asn_abuse_history: true
      high_risk_asns:
        - 24940
        - 12989
      trusted_asns:
        - 16509
        - 15169
        - 13335
    
    bgp:
      is_bgp_feed: false
      track_routing_changes: false
      detect_hijacking: false
      detect_route_leaks: false
    
    validation:
      validate_asn_format: true
      validate_org_name: true
      validate_country_codes: true
      validate_prefix_ownership: false
      reject_invalid_entries: false
      require_organization_name: true
      validation_strictness: strict
    
    performance:
      enable_local_cache: true
      cache_size_mb: 512
      cache_ttl_hours: 12
      preload_database: true
      index_by_asn: true
      index_by_prefix: true
      concurrent_lookup_limit: 1000
    
    whois:
      enable_whois_queries: false
      fallback_to_whois: false
    
    updates:
      check_for_updates: true
      update_check_interval: 12h
      atomic_update: true
      backup_previous_version: true
      verify_checksum: true
      checksum_url: https://example.com/asn-database.json.sha256
      post_update_validation: true
      rollback_on_validation_failure: true
      incremental_updates_supported: true
    
    rate_limiting:
      requests_per_day: 100
      burst_allowed: false
      rate_limit_strategy: wait
    
    error_handling:
      on_fetch_error: retry
      on_parse_error: skip_entry
      on_lookup_error: fallback
      error_alert_threshold: 3
      auto_disable_after_failures: 5
      fallback_to_cache: true
      fallback_to_whois: false
    
    licensing:
      license_type: commercial
      attribution_required: false
      attribution_text: ""
      data_usage_restrictions:
        - internal_use_only
        - no_redistribution
      redistribution_allowed: false
      compliance_notes: "Commercial license - check subscription terms"
    
    monitoring:
      track_fetch_duration: true
      track_lookup_latency: true
      track_cache_hit_rate: true
      track_error_rate: true
      alert_on_update_failure: true
