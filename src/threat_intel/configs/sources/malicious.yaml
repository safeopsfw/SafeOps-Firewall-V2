        - blocklist_de
      enrich_geo: true
      enrich_asn: true
      enrich_anonymizer: true
      calculate_threat_score: true
      ttl_days: 14
    
    filtering:
      exclude_private_ips: true
      exclude_reserved_ips: true
      exclude_bogon_ips: true
      min_confidence_threshold: 50
    
    rate_limiting:
      requests_per_hour: 24
      concurrent_requests: 1
      rate_limit_strategy: wait
    
    error_handling:
      on_fetch_error: retry
      on_parse_error: skip_entry
      error_alert_threshold: 3
      auto_disable_after_failures: 5
      fallback_to_cache: true
      cache_ttl: 24h
    
    validation:
      validate_ip_format: true
      deduplication_enabled: true
      cross_feed_deduplication: true
      validation_strictness: moderate
    
    monitoring:
      track_fetch_duration: true
      track_parse_duration: true
      track_ioc_count: true
      track_error_rate: true
      alert_on_zero_results: true
      alert_on_significant_change: true
      change_threshold_percent: 50

