    validation:
      validate_ip_format: true
      deduplication_enabled: true
      cross_feed_deduplication: true
      validation_strictness: moderate
    
    monitoring:
      track_fetch_duration: true
      track_parse_duration: true
      track_ioc_count: true
      track_error_rate: true
      alert_on_zero_results: true
      alert_on_significant_change: true
