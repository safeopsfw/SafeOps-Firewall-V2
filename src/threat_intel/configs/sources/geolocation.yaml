# =============================================================================
# SafeOps Threat Intelligence - Geolocation Feed Sources
# =============================================================================
# This file defines geolocation database sources for IP-to-location mapping.
# Used for enriching threat intelligence with geographical context including
# country, city, coordinates, timezone, ISP, and ASN information.
# =============================================================================

feeds:
  # ===========================================================================
  # MaxMind GeoLite2 City - Free Database
  # ===========================================================================
  - id: maxmind-geolite2-city
    name: "MaxMind GeoLite2 City Database"
    description: "Free city-level geolocation database (MMDB format)"
    enabled: true
    
    # Source URL
    url: https://download.maxmind.com/app/geoip_download?edition_id=GeoLite2-City&license_key=${MAXMIND_LICENSE_KEY}&suffix=tar.gz
    format: mmdb
    update_interval: 168h  # Weekly updates
    timeout: 300s  # 5 minutes for large download
    retry_attempts: 3
    retry_backoff: exponential
    
    # Database Type
    database:
      database_type: maxmind_mmdb
      database_edition: GeoLite2-City
      is_binary_format: true
      is_api_service: false
      supports_ipv4: true
      supports_ipv6: true
      local_storage_path: ./data/geolocation/GeoLite2-City.mmdb
      file_extension: .mmdb
    
    # Authentication
    authentication:
      auth_type: license_key
      license_key: ${MAXMIND_LICENSE_KEY}
      account_id: ${MAXMIND_ACCOUNT_ID}
    
    # Geolocation Fields
    fields:
      provides_country: true
      provides_region: true
      provides_city: true
      provides_coordinates: true
      provides_timezone: true
      provides_postal_code: true
      provides_accuracy_radius: true
      provides_isp: false
      provides_asn: false
      provides_connection_type: false
      provides_domain: false
      coordinate_precision: 4  # 4 decimal places
    
    # Data Quality
    quality:
      accuracy_level: city
      confidence_scoring_available: false
      min_confidence_threshold: 0
      known_accuracy_issues:
        - vpn_misclassification
        - mobile_carrier_location
      data_freshness: weekly
      fallback_to_country: true
      fallback_to_region: true
    
    # Parser Configuration
    parser:
      parser_type: mmdb_reader
      mmdb_field_mapping:
        country: country.iso_code
        region: subdivisions.0.iso_code
        city: city.names.en
        latitude: location.latitude
        longitude: location.longitude
        timezone: location.time_zone
        accuracy_radius: location.accuracy_radius
    
    # Enrichment Integration
    enrichment:
      priority_order: 1  # Primary geolocation source
      use_for_ip_reputation: true
      use_for_ioc_enrichment: true
      use_for_anonymizer_geo: true
      use_for_threat_scoring: true
      geographical_risk_scoring: true
      high_risk_countries:
        - CN  # China
        - RU  # Russia
        - KP  # North Korea
        - IR  # Iran
      low_risk_countries:
        - US
        - CA
        - GB
        - DE
        - FR
        - AU
    
    # Caching and Performance
    performance:
      enable_local_cache: true
      cache_size_mb: 512
      cache_ttl_hours: 24
      preload_database: true
      index_optimization: true
      use_memory_mapped_file: true
      concurrent_lookup_limit: 1000
    
    # Data Validation
    validation:
      validate_country_codes: true
      validate_coordinate_ranges: true
      validate_timezone_format: true
      reject_invalid_entries: false
      log_validation_errors: true
      validation_strictness: moderate
    
    # Database Update Handling
    updates:
      check_for_updates: true
      update_check_interval: 24h
      atomic_update: true
      backup_previous_version: true
      verify_checksum: true
      checksum_url: https://download.maxmind.com/app/geoip_download?edition_id=GeoLite2-City&license_key=${MAXMIND_LICENSE_KEY}&suffix=tar.gz.md5
      post_update_validation: true
      rollback_on_validation_failure: true
    
    # Rate Limiting (N/A for database)
    rate_limiting:
      requests_per_second: 0  # Local database, no limits
    
    # Error Handling
    error_handling:
      on_fetch_error: retry
      on_parse_error: log
      on_lookup_error: fallback
      error_alert_threshold: 3
      auto_disable_after_failures: 5
      fallback_to_cache: true
      fallback_to_alternative_source: maxmind-geolite2-country
    
    # Licensing and Compliance
    licensing:
      license_type: free
      attribution_required: true
      attribution_text: "This product includes GeoLite2 data created by MaxMind, available from https://www.maxmind.com"
      usage_restrictions:
        - no_redistribution
      data_retention_limit_days: 0  # No limit for GeoLite2
      compliance_notes: "GeoLite2 free databases under CC BY-SA 4.0 license"
    
    # Monitoring
    monitoring:
      track_fetch_duration: true
      track_parse_duration: true
      track_lookup_latency: true
      track_cache_hit_rate: true
      track_error_rate: true
      alert_on_update_failure: true

