  # ===========================================================================
  # Example: IPinfo.io API Service
  # ===========================================================================
  - id: ipinfo-api-service
    name: "IPinfo.io Geolocation API"
    description: "Real-time geolocation API service (disabled template)"
    enabled: false  # Disabled - API service template
    
    url: https://ipinfo.io/{ip}/json
    format: json
    update_interval: 0  # Real-time API, no database updates
    timeout: 5s
    retry_attempts: 2
    retry_backoff: linear
    
    database:
      database_type: rest_api
      database_edition: IPinfo
      is_binary_format: false
      is_api_service: true
      supports_ipv4: true
      supports_ipv6: true
      local_storage_path: ""
      file_extension: ""
    
    authentication:
      auth_type: api_key
      api_key: ${IPINFO_API_TOKEN}
      auth_query_param: token
    
    fields:
      provides_country: true
      provides_region: true
      provides_city: true
      provides_coordinates: true
      provides_timezone: true
      provides_postal_code: true
      provides_accuracy_radius: false
      provides_isp: true
      provides_asn: true
      provides_connection_type: false
      provides_domain: true
      coordinate_precision: 4
    
    quality:
      accuracy_level: city
      confidence_scoring_available: false
      data_freshness: real_time
      fallback_to_country: true
      fallback_to_region: true
    
    # API Service Configuration
    api:
      is_rest_api: true
      api_endpoint_template: https://ipinfo.io/{ip}/json?token=${IPINFO_API_TOKEN}
      api_method: GET
      api_rate_limit_per_second: 10
      api_rate_limit_per_day: 50000
      api_batch_lookup_supported: true
      api_batch_size: 1000
      api_response_format: json
      api_cache_ttl_seconds: 3600  # 1 hour
      api_error_codes:
        - "429: Rate limit exceeded"
        - "401: Invalid token"
    
    parser:
      parser_type: json
      json_path_country: $.country
      json_path_city: $.city
      json_path_coordinates: $.loc  # "lat,long" format
    
    enrichment:
      priority_order: 3  # Lower priority than local databases
      use_for_ip_reputation: true
      use_for_ioc_enrichment: false  # Too slow for bulk enrichment
      use_for_anonymizer_geo: false
      use_for_threat_scoring: false
      geographical_risk_scoring: false
      high_risk_countries: []
      low_risk_countries: []
    
    performance:
      enable_local_cache: true
      cache_size_mb: 128
      cache_ttl_hours: 1  # Short TTL for API
      preload_database: false
      index_optimization: false
      use_memory_mapped_file: false
      concurrent_lookup_limit: 10
    
    validation:
      validate_country_codes: true
      validate_coordinate_ranges: true
      validate_timezone_format: true
      reject_invalid_entries: false
      log_validation_errors: true
      validation_strictness: moderate
    
    updates:
      check_for_updates: false
      atomic_update: false
      backup_previous_version: false
      verify_checksum: false
    
    rate_limiting:
      requests_per_second: 10
      requests_per_minute: 600
      requests_per_hour: 36000
      requests_per_day: 50000
      burst_allowed: true
      rate_limit_strategy: wait
      fallback_source_id: maxmind-geolite2-city
    
    error_handling:
      on_fetch_error: skip
      on_parse_error: skip
      on_lookup_error: fallback
      error_alert_threshold: 10
      auto_disable_after_failures: 20
      fallback_to_cache: true
      fallback_to_alternative_source: maxmind-geolite2-city
    
    licensing:
      license_type: commercial
      attribution_required: false
      attribution_text: ""
      usage_restrictions:
        - api_rate_limits
      data_retention_limit_days: 0
      compliance_notes: "Commercial API - check subscription tier for rate limits"
    
    monitoring:
      track_fetch_duration: true
      track_lookup_latency: true
      track_cache_hit_rate: true
      track_error_rate: true
      alert_on_update_failure: false
