# ==========================================================================
# Parser Configuration Hints
# ==========================================================================
parser_config:
  csv:
    default_delimiter: ","
    skip_header: true
    comment_char: "#"
  
  txt:
    comment_chars: ["#", "//", ";"]
    trim_whitespace: true
  
  json:
    validate_schema: true
  
  mmdb:
    reader_mode: "memory"

# ==========================================================================
# Global Settings
# ==========================================================================
settings:
  max_concurrent_fetches: 5
  download_timeout_seconds: 120
  retry_attempts: 3
  retry_delay_seconds: 5
  user_agent: "SafeOps-ThreatIntel/2.0"
  feeds_storage_path: "./feeds"
