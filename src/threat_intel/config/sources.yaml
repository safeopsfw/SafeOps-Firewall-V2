# ============================================================================
# Threat Intelligence Feed Sources - CURATED TOP 3 PER CATEGORY
# Only the most reliable, accurate, and well-structured sources
# ============================================================================

feeds:
  # ==========================================================================
  # CATEGORY 1: IP GEOLOCATION (Top 3)
  # ==========================================================================

  # 1. IPtoASN - Best free IP to ASN/Country mapping
  - name: "IPtoASN"
    category: "ip_geo"
    url: "https://iptoasn.com/data/ip2asn-v4.tsv.gz"
    format: "tsv"
    enabled: true
    update_frequency: 86400 # Daily
    description: "IP to ASN mapping with country codes - auto-decompressed from gzip"

  # ==========================================================================
  # CATEGORY 2: IP BLACKLIST / MALICIOUS IPs (Top 3)
  # ==========================================================================

  # 1. Feodo Tracker - Best for botnet C2 IPs, updated frequently
  - name: "Feodo Tracker C2 IPs"
    category: "ip_blacklist"
    url: "https://feodotracker.abuse.ch/downloads/ipblocklist.txt"
    format: "txt"
    enabled: true
    update_frequency: 300 # 5 minutes
    description: "Botnet C2 server IPs - highly accurate, abuse.ch"

  # 2. Blocklist.de All - Comprehensive attack IPs
  - name: "Blocklist.de All"
    category: "ip_blacklist"
    url: "https://lists.blocklist.de/lists/all.txt"
    format: "txt"
    enabled: true
    update_frequency: 900 # 15 minutes
    description: "IPs from SSH/FTP/Mail attacks - German honeypot network"

  # 3. FireHOL Level1 - Aggregated high-confidence threats
  - name: "FireHOL Level1"
    category: "ip_blacklist"
    url: "https://iplists.firehol.org/files/firehol_level1.netset"
    format: "txt"
    enabled: true
    update_frequency: 3600 # Hourly
    description: "Aggregated IPs from multiple sources - high confidence"

  # ==========================================================================
  # CATEGORY 3: VPN / TOR / PROXY (Top 3)
  # ==========================================================================

  # 1. Tor Exit Nodes - Official Tor Project list
  - name: "Tor Exit Nodes"
    category: "ip_anonymization"
    url: "https://check.torproject.org/exit-addresses"
    format: "txt"
    enabled: true
    update_frequency: 3600 # Hourly
    description: "Official Tor exit nodes - most accurate"

  # 2. VPN Gate - Academic VPN project
  - name: "VPN Gate"
    category: "ip_anonymization"
    url: "https://www.vpngate.net/api/iphone/"
    format: "csv"
    enabled: true
    update_frequency: 3600 # Hourly
    description: "Public VPN servers with details"

  # 3. Proxy List - Open proxies
  - name: "Proxy List Raw"
    category: "ip_anonymization"
    url: "https://raw.githubusercontent.com/clarketm/proxy-list/master/proxy-list-raw.txt"
    format: "txt"
    enabled: true
    update_frequency: 86400 # Daily
    description: "Open proxy servers IP:PORT"

  # ==========================================================================
  # CATEGORY 4: DOMAIN INTELLIGENCE (Top 3)
  # ==========================================================================

  # 1. PhishTank - Best phishing database with verification
  - name: "PhishTank"
    category: "domain"
    url: "http://data.phishtank.com/data/online-valid.csv"
    format: "csv"
    enabled: true
    update_frequency: 3600 # Hourly
    description: "Verified phishing URLs with details"

  # 2. URLhaus - Malware distribution URLs (use text feed instead of zip)
  - name: "URLhaus Domains"
    category: "domain"
    url: "https://urlhaus.abuse.ch/downloads/text/"
    format: "txt"
    enabled: true
    update_frequency: 300 # 5 minutes
    description: "Malware hosting URLs - abuse.ch"

  # 3. OpenPhish - Real-time phishing URLs
  - name: "OpenPhish"
    category: "domain"
    url: "https://openphish.com/feed.txt"
    format: "txt"
    enabled: true
    update_frequency: 3600 # Hourly
    description: "Active phishing URLs - simple list"

  # ==========================================================================
  # CATEGORY 5: FILE HASH INTELLIGENCE (Top 3)
  # ==========================================================================

  # 1. MalwareBazaar - Best malware hash database
  - name: "MalwareBazaar Recent"
    category: "hash"
    url: "https://bazaar.abuse.ch/export/csv/recent/"
    format: "csv"
    enabled: true
    update_frequency: 300 # 5 minutes
    description: "Recent malware hashes with details - abuse.ch"

  # 2. ThreatFox IOCs - Multi-type IOCs including hashes
  - name: "ThreatFox Recent IOCs"
    category: "hash"
    url: "https://threatfox.abuse.ch/export/csv/recent/"
    format: "csv"
    enabled: true
    update_frequency: 300 # 5 minutes
    description: "Recent IOCs with threat context"

  # 3. SSL Blacklist - Malicious SSL certificates
  - name: "Abuse.ch SSL Certificates"
    category: "hash"
    url: "https://sslbl.abuse.ch/blacklist/sslblacklist.csv"
    format: "csv"
    enabled: true
    update_frequency: 300 # 5 minutes
    description: "Malicious SSL certificate fingerprints"

  # ==========================================================================
  # CATEGORY 6: COMBINED IOC FEEDS (Top 2)
  # ==========================================================================

  # 1. ThreatFox JSON - Rich IOC data
  - name: "ThreatFox IOCs"
    category: "ioc"
    url: "https://threatfox.abuse.ch/export/json/recent/"
    format: "json"
    enabled: true
    update_frequency: 300 # 5 minutes
    description: "Multi-type IOCs in JSON format"

  # 2. Exploit-DB - Vulnerability/exploit data
  - name: "Exploit-DB"
    category: "ioc"
    url: "https://gitlab.com/exploit-database/exploitdb/-/raw/main/files_exploits.csv"
    format: "csv"
    enabled: true
    update_frequency: 86400 # Daily
    description: "Exploit database with CVE mappings"

# ==========================================================================
# Parser Configuration
# ==========================================================================
parser_config:
  csv:
    default_delimiter: ","
    skip_header: true
    comment_char: "#"

  txt:
    comment_chars: ["#", "//", ";"]
    trim_whitespace: true

  json:
    validate_schema: true

  tsv:
    delimiter: "\t"
    skip_header: true

# ==========================================================================
# Global Settings
# ==========================================================================
settings:
  max_concurrent_fetches: 10
  download_timeout_seconds: 45
  retry_attempts: 2
  retry_delay_seconds: 2
  user_agent: "SafeOps-ThreatIntel/2.0"
  feeds_storage_path: "./feeds"
