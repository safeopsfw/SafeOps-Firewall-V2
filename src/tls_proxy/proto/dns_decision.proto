syntax = "proto3";

package dnsdecision;

option go_package = "dns_server/proto";

// DNS Decision Service - TLS Proxy tells DNS Server what IP to return
service DNSDecisionService {
  // Get DNS decision for a domain
  rpc GetDNSDecision(DNSDecisionRequest) returns (DNSDecisionResponse);
}

message DNSDecisionRequest {
  string domain = 1;              // Domain being queried (e.g., "google.com")
  string client_ip = 2;           // IP of the client making DNS query
  string query_type = 3;          // Query type (A, AAAA, CNAME, etc.)
}

message DNSDecisionResponse {
  DecisionType decision = 1;      // What action to take
  string ip_address = 2;          // IP to return (if decision = RETURN_IP)
  string redirect_domain = 3;     // Domain to redirect to (if decision = REDIRECT)
  uint32 ttl = 4;                 // TTL for the DNS response
  string reason = 5;              // Reason for the decision (for logging)
}

enum DecisionType {
  RETURN_IP = 0;                  // Return the IP address provided
  FORWARD_UPSTREAM = 1;           // Forward to upstream DNS (8.8.8.8)
  REDIRECT = 2;                   // Redirect to another domain
  BLOCK = 3;                      // Return NXDOMAIN
}
