syntax = "proto3";

package tlsproxy;

option go_package = "tls_proxy/proto";

// Packet Processing Service - Receives packets from Packet Capture Engine
service PacketProcessingService {
  // Process an intercepted packet
  rpc ProcessPacket(PacketRequest) returns (PacketResponse);
}

message PacketRequest {
  bytes raw_packet = 1;           // Raw packet data
  string source_ip = 2;           // Source IP address
  string dest_ip = 3;             // Destination IP address
  uint32 source_port = 4;         // Source port
  uint32 dest_port = 5;           // Destination port
  string protocol = 6;            // TCP, UDP, ICMP
  string interface_name = 7;      // Network interface
  int64 timestamp = 8;            // Packet capture timestamp
}

message PacketResponse {
  PacketAction action = 1;        // What to do with the packet
  bytes modified_packet = 2;      // Modified/injected packet (if action = INJECT)
  string reason = 3;              // Reason for the action
}

enum PacketAction {
  FORWARD = 0;                    // Forward packet normally
  DROP = 1;                       // Drop the packet
  INJECT = 2;                     // Inject modified packet (HTTP redirect)
  BLOCK = 3;                      // Block and send RST
}
