# SIEM Log Forwarder Configuration

elasticsearch:
  hosts:
    - "http://127.0.0.1:9200"
  # username: "elastic"
  # password: "changeme"
  bulk_size: 500          # Number of documents per bulk request
  flush_interval: 5s      # Flush interval when bulk_size not reached

# Base path for SafeOps logs
log_base_path: "../../bin/logs"

# Log files to monitor and forward
log_files:
  - path: "netflow/east_west.log"
    index_prefix: "safeops-netflow"
    type: "netflow"
    
  - path: "netflow/north_south.log"
    index_prefix: "safeops-netflow"
    type: "netflow"
    
  - path: "engine.log"
    index_prefix: "safeops-engine"
    type: "engine"
    
  - path: "firewall.log"
    index_prefix: "safeops-firewall"
    type: "firewall"
    
  - path: "ids.log"
    index_prefix: "safeops-ids"
    type: "ids"
    
  # Removed: devices.jsonl - Device tracking logs not needed in SIEM (causes spam)

# Position tracking settings
position_db:
  path: "data/positions.json"
  save_interval: 10s

# Performance settings
tailer:
  poll_interval: 500ms     # How often to check for new lines
  max_line_size: 1048576   # 1MB max line size
