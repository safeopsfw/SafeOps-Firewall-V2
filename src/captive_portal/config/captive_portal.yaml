# SafeOps Captive Portal Configuration
# Phase 3A: CA Certificate Distribution & Device Trust

server:
  # HTTPS server configuration
  https_port: 8445
  https_enabled: false
  cert_file: "D:\\SafeOpsFV2\\src\\captive_portal\\internal\\certs\\server.crt"
  key_file: "D:\\SafeOpsFV2\\src\\captive_portal\\internal\\certs\\server.key"

  # HTTP server configuration (for CA cert download - devices need HTTP access)
  http_port: 8090
  http_enabled: true  # Serve content on HTTP (devices need this to download CA cert)
  http_redirect_to_https: false  # Disabled - devices can't access HTTPS without CA cert

  # Timeouts
  read_timeout: "30s"
  write_timeout: "30s"
  idle_timeout: "60s"

portal:
  title: "SafeOps Security Portal"
  welcome_message: "Welcome to SafeOps Network"
  ca_cert_name: "SafeOps_Root_CA"
  ca_cert_description: "SafeOps Root Certificate Authority"
  
  # Auto-verify settings
  auto_verify_enabled: true
  verify_interval_seconds: 5
  verify_timeout_seconds: 300

integrations:
  # DHCP Monitor integration (gRPC)
  dhcp_monitor:
    grpc_address: "localhost:50055"
    timeout: "5s"
    retry_attempts: 3
    retry_delay: "1s"

  # Step-CA integration
  step_ca:
    api_url: "https://localhost:9000"
    verify_ssl: false
    root_ca_endpoint: "/roots.pem"
    timeout: "10s"

  # PostgreSQL direct connection (fallback)
  database:
    enabled: true
    host: "localhost"
    port: 5432
    database: "safeops"
    user: "postgres"
    password: "admin"
    sslmode: "disable"

# Static file paths
static:
  css_path: "D:\\SafeOpsFV2\\src\\captive_portal\\internal\\static\\css"
  js_path: "D:\\SafeOpsFV2\\src\\captive_portal\\internal\\static\\js"

# Template configuration
templates:
  path: "D:\\SafeOpsFV2\\src\\captive_portal\\internal\\templates"
  reload_on_change: true

# Logging
logging:
  level: "info"
  format: "json"
  output: "D:\\SafeOpsFV2\\src\\captive_portal\\logs\\captive_portal.log"
  max_size: 100
  max_backups: 10
  max_age: 30
  compress: true

# Security settings
security:
  cors_enabled: true
  cors_origins:
    - "https://captive.safeops.local:8445"
    - "http://192.168.137.1:8090"
  rate_limit_enabled: true
  rate_limit_requests: 100
  rate_limit_window: "1m"
  session_timeout: "30m"
  session_secret: "safeops-captive-portal-secret-change-this"
