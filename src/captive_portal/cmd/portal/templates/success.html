<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f3460 0%, #16213e 50%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 48px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .success-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 50%;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        h1 { font-size: 28px; margin-bottom: 16px; color: #10b981; }
        p { color: rgba(255,255,255,0.8); margin-bottom: 24px; line-height: 1.6; }
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            text-decoration: none;
            padding: 14px 36px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
        }
        .countdown {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            margin-top: 16px;
        }
    </style>
    <script>
        let seconds = 5;
        function updateCountdown() {
            document.getElementById('countdown').textContent = seconds;
            if (seconds <= 0) {
                window.location.href = 'https://www.google.com';
            } else {
                seconds--;
                setTimeout(updateCountdown, 1000);
            }
        }
        window.onload = updateCountdown;
    </script>
</head>
<body>
    <div class="container">
        <div class="success-icon">✓</div>
        <h1>Certificate Installed!</h1>
        <p>Your device is now secured and ready to use the network.</p>
        <p class="countdown">Redirecting in <span id="countdown">5</span> seconds...</p>
        <a href="https://www.google.com" class="btn">Continue to Internet</a>
    </div>
</body>
</html>
