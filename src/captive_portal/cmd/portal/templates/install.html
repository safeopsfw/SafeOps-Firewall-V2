<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{.Title}}</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        background: linear-gradient(
          135deg,
          #1a1a2e 0%,
          #16213e 50%,
          #0f3460 100%
        );
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
      }
      .container {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(20px);
        border-radius: 24px;
        padding: 48px;
        max-width: 500px;
        width: 90%;
        text-align: center;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .logo {
        width: 80px;
        height: 80px;
        background: linear-gradient(135deg, #00d4ff, #7c3aed);
        border-radius: 20px;
        margin: 0 auto 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 36px;
      }
      h1 {
        font-size: 28px;
        margin-bottom: 12px;
      }
      p {
        color: rgba(255, 255, 255, 0.8);
        margin-bottom: 24px;
        line-height: 1.6;
      }
      .os-badge {
        display: inline-block;
        background: rgba(0, 212, 255, 0.2);
        border: 1px solid #00d4ff;
        border-radius: 20px;
        padding: 6px 16px;
        font-size: 14px;
        margin-bottom: 24px;
      }
      .btn {
        display: inline-block;
        background: linear-gradient(135deg, #00d4ff, #7c3aed);
        color: white;
        text-decoration: none;
        padding: 16px 48px;
        border-radius: 50px;
        font-size: 18px;
        font-weight: 600;
        transition: transform 0.2s, box-shadow 0.2s;
        border: none;
        cursor: pointer;
      }
      .btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4);
      }
      .steps {
        margin-top: 32px;
        text-align: left;
        background: rgba(0, 0, 0, 0.2);
        border-radius: 16px;
        padding: 24px;
      }
      .steps h3 {
        margin-bottom: 16px;
        font-size: 16px;
      }
      .steps ol {
        padding-left: 20px;
      }
      .steps li {
        margin-bottom: 8px;
        color: rgba(255, 255, 255, 0.8);
      }
      .footer {
        margin-top: 24px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.5);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">🔐</div>
      <h1>Network Security Certificate</h1>
      <p>
        To access the network securely, please install the SafeOps security
        certificate.
      </p>

      <div class="os-badge">Detected: {{.OSType}}</div>

      <a href="{{.DownloadURL}}" class="btn" id="downloadBtn">
        Download Certificate
      </a>

      <div class="steps">
        <h3>Installation Steps:</h3>
        <ol id="instructions"></ol>
      </div>

      <div class="footer">
        SafeOps Network Security • Your IP: {{.ClientIP}}
      </div>
    </div>

    <script>
      const osType = "{{.OSType}}";
      const instructions = document.getElementById("instructions");

      const steps = {
        Windows: [
          "Click 'Download Certificate'",
          "Open the downloaded file",
          "Click 'Install Certificate'",
          "Select 'Local Machine' → Next",
          "Select 'Place all certificates in: Trusted Root Certification Authorities'",
          "Click Finish",
        ],
        macOS: [
          "Click 'Download Certificate'",
          "Open the downloaded file",
          "Add to Keychain when prompted",
          "Open Keychain Access",
          "Double-click the certificate → Trust → Always Trust",
        ],
        iOS: [
          "Click 'Download Certificate'",
          "Go to Settings → General → VPN & Device Management",
          "Tap on the downloaded profile",
          "Tap Install → Enter passcode",
          "Go to Settings → General → About → Certificate Trust Settings",
          "Enable trust for SafeOps CA",
        ],
        Android: [
          "Click 'Download Certificate'",
          "Go to Settings → Security → Install from storage",
          "Select the downloaded certificate",
          "Name it 'SafeOps CA'",
          "Select 'VPN and apps' for credential use",
        ],
        Linux: [
          "Click 'Download Certificate'",
          "Copy to /usr/local/share/ca-certificates/",
          "Run: sudo update-ca-certificates",
          "Restart your browser",
        ],
      };

      const osSteps = steps[osType] || steps["Linux"];
      osSteps.forEach((step) => {
        const li = document.createElement("li");
        li.textContent = step;
        instructions.appendChild(li);
      });

      document
        .getElementById("downloadBtn")
        .addEventListener("click", function () {
          setTimeout(function () {
            window.location.href = "/success";
          }, 3000);
        });
    </script>
  </body>
</html>
