# SafeOps Network Logger Configuration - MASTER LOG
# Captures ALL network traffic for IDS/IPS analysis

capture:
  # Interfaces to capture (empty = all active interfaces)
  interfaces: []

  # Promiscuous mode (capture all traffic on network)
  promiscuous: true

  # Snapshot length (bytes to capture per packet) - FULL CAPTURE
  snapshot_length: 1600

  # BPF filter - LEAVE EMPTY to capture ALL ports
  bpf_filter: ""

logging:
  # Master log file path - SINGLE FILE for IDS/IPS
  log_path: "D:/SafeOpsFV2/bin/logs/network_packets_master.jsonl"

  # Batch size (packets per write)
  batch_size: 75

  # 5-MINUTE CYCLE - Overwrite same file every 5 minutes
  cycle_minutes: 5

flow:
  # Flow timeout (seconds)
  timeout_seconds: 60

  # Cleanup interval (seconds)
  cleanup_interval_seconds: 30

deduplication:
  # Enable smart deduplication (spam prevention only)
  enabled: true

  # Deduplication window - Short window for spam only
  window_seconds: 30

  # Cache size (max entries)
  cache_size: 10000

process:
  # Process correlation cache TTL (seconds)
  cache_ttl_seconds: 10

tls:
  # Enable TLS key logging
  enabled: true

  # SSLKEYLOGFILE path
  keylog_file: "D:/SafeOpsFV2/bin/logs/sslkeys.log"

stats:
  # Stats display interval (seconds)
  display_interval_seconds: 120

hotspot:
  # Enable hotspot device tracking
  enabled: true

  # Hotspot subnet (Windows default)
  subnet: "192.168.137.0/24"
