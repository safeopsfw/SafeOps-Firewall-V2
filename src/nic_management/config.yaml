# ─────  ────                           ────      ──────  ────                ───
# 1      Loopback Pseudo-Interface 1    LOOPBACK  UP      127.0.0.1/8         -
# 10     VMware Network Adapter VMnet8  VIRTUAL   UP      192.168.171.1/24    00:50:56:c0:00:08
# 11     Ethernet 3                     LAN       DOWN    169.254.80.206/16   f8:e4:3b:5a:65:f1
# 12     Ethernet 2                     LAN       UP      192.168.56.1/24     0a:00:27:00:00:0c
# 16     Wi-Fi                          LAN       UP      192.168.1.3/24      f4:26:79:73:6f:7c  <-- YOUR MAIN INTERNET
# 19     Local Area Connection* 9       VIRTUAL   DOWN    169.254.194.218/16  f4:26:79:73:6f:7d
# 20     VMware Network Adapter VMnet1  VIRTUAL   UP      192.168.65.1/24     00:50:56:c0:00:01
# 22     Local Area Connection* 10      VIRTUAL   DOWN    169.254.30.205/16   f6:26:79:73:6f:7c
# 24     Ethernet                       LAN       DOWN    192.168.1.2/24      58:11:22:86:fd:c4
# 43     vEthernet (Default Switch)     VIRTUAL   UP      172.19.192.1/20     00:15:5d:b5:eb:f2
