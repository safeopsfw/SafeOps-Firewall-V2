# SafeOps IDS/IPS Rule Categories Configuration
# Defines rule categories, priorities, default actions, and severity mappings
#
# Maps Suricata classification types to SafeOps alert severities and actions.
# This file controls how different types of detections are handled.

# ============================================================================
# Category Definitions
# ============================================================================

# ============================================================================
# CRITICAL THREATS - Immediate Response Required
# ============================================================================

