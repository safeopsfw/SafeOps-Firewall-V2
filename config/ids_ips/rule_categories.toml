# ============================================================================
# Action Override Rules
# ============================================================================

[action_overrides]
# Override default actions for specific scenarios

# During maintenance windows, reduce aggressive blocking
maintenance_mode = false
maintenance_action_override = "ALERT"  # Convert all DROP to ALERT

# False positive suppression (signature IDs to suppress)
suppressed_signatures = []

# Source IP whitelist (never block these IPs)
whitelisted_sources = [
    "192.168.1.0/24",
    "192.168.2.0/24"
]

# Destination IP whitelist (never block traffic to these)
whitelisted_destinations = []

# ============================================================================
# Alert Severity Mapping
# ============================================================================

[severity_mapping]
# Maps priority ranges to alert severities for SIEM integration

CRITICAL = [1, 2]      # Priority 1-2
HIGH = [3, 4, 5]       # Priority 3-5
MEDIUM = [6, 7, 8, 9]  # Priority 6-9
LOW = [10, 11, 12, 13] # Priority 10-13
INFO = [14, 15]        # Priority 14-15

# ============================================================================
# Category Groups
# ============================================================================

[category_groups]
# Logical grouping of categories for bulk management

malware = [
    "malware-cnc",
    "trojan-activity",
    "ransomware",
    "backdoor",
    "worm-activity",
    "botnet-activity",
    "cryptomining"
]

exploits = [
    "attempted-admin",
    "attempted-user",
    "shellcode-detect",
    "successful-admin",
    "exploit-kit"
]

web_attacks = [
    "web-application-attack",
    "sql-injection",
    "xss-attack",
    "lfi-rfi",
    "command-injection",
    "path-traversal",
    "xxe-attack",
    "ssrf-attack"
]

network_attacks = [
    "denial-of-service",
    "attempted-dos",
    "scan-detection",
    "brute-force",
    "arp-spoofing",
    "mitm-attack"
]

reconnaissance = [
    "network-scan",
    "web-application-activity",
    "attempted-recon"
]

data_security = [
    "data-exfiltration",
    "suspicious-traffic",
    "dns-tunneling",
    "covert-channel"
]

policy = [
    "policy-violation",
    "protocol-command-decode",
    "inappropriate-content",
    "phishing",
    "spam"
]

informational = [
    "misc-activity",
    "not-suspicious",
    "unknown-traffic"
]

# ============================================================================
# Integration Settings
# ============================================================================

[integration]
# SIEM integration settings

# Enable SIEM forwarding
siem_enabled = true

# SIEM format (CEF, LEEF, JSON)
siem_format = "JSON"

# Include full packet payload in SIEM events
include_payload = false

# Maximum payload size to include (bytes)
max_payload_size = 4096

# Include related flow information
include_flow_info = true

# ============================================================================
# Performance Settings
# ============================================================================

[performance]
# Category-based performance tuning

# Enable category-based rule optimization
optimize_by_category = true

# Maximum alerts per category per second
max_alerts_per_category = 1000

# Alert queue size per category
category_queue_size = 10000

# Alert processing priority queue
use_priority_queue = true
