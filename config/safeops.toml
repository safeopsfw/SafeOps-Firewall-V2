# SafeOps Configuration
# ======================
# Copy this file to the same directory as the executables
# or set SAFEOPS_CONFIG environment variable

# Network Configuration
[network]
# IP address of the SafeOps server (used in all components)
server_ip = "192.168.1.1"

# DNS Server subnet (devices in this range use SafeOps DNS)
managed_subnet = "192.168.1.0/24"

# DHCP Configuration
[dhcp]
enabled = true
listen_interface = "Ethernet"
lease_duration = "24h"

# IP Pool
pool_start = "192.168.1.100"
pool_end = "192.168.1.200"
gateway = "192.168.1.1"
dns_server = "192.168.1.1"
subnet_mask = "255.255.255.0"

# DNS Server Configuration
[dns]
enabled = true
listen_address = ":53"
upstream_servers = ["8.8.8.8:53", "1.1.1.1:53"]

# Authoritative zones
authoritative_zones = ["safeops.local"]

# Caching
cache_enabled = true
cache_max_entries = 10000

# Filtering
filtering_enabled = true

# NIC API Configuration
[nic_api]
enabled = true
listen_address = ":50051"

# Database Configuration
[database]
enabled = true
host = "localhost"
port = 5432
database = "safeops_network"
username = "safeops"
# Password should be set via environment variable: SAFEOPS_DB_PASSWORD

# Connection pool
max_connections = 20
min_connections = 5

# Logging Configuration
[logging]
level = "info"  # debug, info, warn, error
format = "text"  # text, json
output = "stdout"  # stdout, file
file_path = "logs/safeops.log"

# Metrics Configuration
[metrics]
enabled = true
listen_address = ":9090"

# ==============================================================================
# Service Endpoints - How services find each other
# ==============================================================================
[services]
# NIC Management API (gRPC)
nic_api_address = "localhost:50051"

# DHCP Server (for status checks)
dhcp_api_address = "localhost:50067"

# DNS Server API (HTTP)
dns_api_address = "localhost:50053"

# Dev UI Dashboard (HTTP)
dashboard_address = "localhost:5173"

# ==============================================================================
# Service Integration Settings
# ==============================================================================
[integration]
# Enable DHCP → DNS device notifications
dhcp_dns_notify_enabled = true

# WebSocket settings for real-time dashboard
websocket_enabled = true
websocket_port = 8081
