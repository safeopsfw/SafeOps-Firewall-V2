# SafeOps v2.0 - Default Application Settings
# Purpose: Main configuration template for system-wide settings and application behavior
# This file defines the core operational parameters for a standard SafeOps deployment

# =============================================================================
# SYSTEM INFORMATION
# =============================================================================
[system]
profile = "default"
version = "2.0.0"
deployment_date = ""
hostname = "safeops-gateway"
domain = "local"
timezone = "UTC"

# Installation paths
install_directory = "C:\\Program Files\\SafeOps"
data_directory = "C:\\ProgramData\\SafeOps"
log_directory = "C:\\ProgramData\\SafeOps\\logs"
config_directory = "C:\\ProgramData\\SafeOps\\config"

# =============================================================================
# GLOBAL SETTINGS
# =============================================================================
[global]
mode = "production"
default_log_level = "info"
enable_all_services = true
run_as_windows_services = true
start_on_boot = true

# =============================================================================
# NETWORK CONFIGURATION
# =============================================================================
[network]
topology = "3-nic"

[network.interfaces]
wan = "NIC1"
lan = "NIC2"
wifi = "NIC3"

[network.addressing]
wan_mode = "dhcp"
lan_ip = "192.168.1.1"
lan_netmask = "255.255.255.0"
lan_network = "192.168.1.0/24"
wifi_ip = "192.168.2.1"
wifi_netmask = "255.255.255.0"
wifi_network = "192.168.2.0/24"

# =============================================================================
# DATABASE CONFIGURATION
# =============================================================================
[database]
postgres_host = "localhost"
postgres_port = 5432
postgres_database = "safeops"
postgres_user = "safeops"
postgres_password = "${POSTGRES_PASSWORD}"
pool_min_connections = 5
pool_max_connections = 50

# =============================================================================
# REDIS CONFIGURATION
# =============================================================================
[redis]
host = "localhost"
port = 6379
password = "${REDIS_PASSWORD}"
pool_size = 50

[redis.databases]
general = 0
network_logger = 1
tls_proxy = 2
dns_server = 3
certificate_manager = 4
web_ui = 5

# =============================================================================
# SECURITY DEFAULTS
# =============================================================================
[security]
default_firewall_action = "deny"
enable_ids_ips = true
ids_ips_mode = "ips"
tls_min_version = "1.2"
tls_max_version = "1.3"
enforce_strong_ciphers = true
min_password_length = 12

# =============================================================================
# LOGGING CONFIGURATION
# =============================================================================
[logging]
log_format = "json"
log_rotation = true
log_max_size_mb = 100
log_max_files = 10
syslog_enabled = false

# =============================================================================
# MONITORING AND METRICS
# =============================================================================
[monitoring]
metrics_enabled = true
health_check_enabled = true
health_check_interval_seconds = 30
cpu_alert_threshold_percent = 80
memory_alert_threshold_percent = 80
disk_alert_threshold_percent = 90

# =============================================================================
# BACKUP AND UPDATES
# =============================================================================
[backup]
backup_enabled = true
backup_schedule = "0 2 * * *"
primary_backup_path = "C:\\SafeOps_Backups"
backup_compression = true
backup_encryption = true

[updates]
auto_check_updates = true
update_channel = "stable"
auto_install_security_updates = true
auto_install_signature_updates = true

# =============================================================================
# SERVICE DEFAULTS
# =============================================================================
[firewall]
enabled = true
default_action = "deny"
log_denied = true
max_connections = 10000000

[dns]
enabled = true
cache_enabled = true
block_malware_domains = true
block_phishing_domains = true

[dhcp]
enabled = true
lan_enabled = true
wifi_enabled = true

[wifi]
enabled = true
ssid = "SafeOps-Secure"
security = "wpa3"
client_isolation = true

[ids_ips]
enabled = true
mode = "ips"
signature_updates_enabled = true

[threat_intel]
enabled = true
auto_update_feeds = true

[tls_proxy]
enabled = false
bypass_financial_sites = true

# =============================================================================
# FEATURE FLAGS
# =============================================================================
[features]
enable_behavioral_analysis = true
enable_ddos_protection = true
enable_content_filtering = true
enable_machine_learning = false
enable_cloud_sync = false

# =============================================================================
# RESOURCE LIMITS
# =============================================================================
[resource_limits]
max_cpu_percent = 80
max_memory_mb = 16384
max_disk_space_gb = 100
