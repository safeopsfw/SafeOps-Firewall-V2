# ============================================================================
# Certificate Manager Configuration
# SafeOps v2.0 - SSL/TLS Certificate Lifecycle Management
# ============================================================================

# ============================================================================
# Section 1: Service Identity & Runtime
# ============================================================================
[service]
name = "certificate_manager"
version = "2.0.0"
environment = "${ENVIRONMENT:-production}"  # development, staging, production
log_level = "${LOG_LEVEL:-info}"            # debug, info, warn, error
log_format = "json"                          # json, text
log_file = "logs/certificate_manager.log"
pid_file = "/var/run/safeops/certificate_manager.pid"
working_directory = "/opt/safeops"

# ============================================================================
# Section 2: gRPC Server Configuration
# ============================================================================
[grpc]
enabled = true
host = "0.0.0.0"                    # 0.0.0.0 for all interfaces, 127.0.0.1 for localhost
port = "${GRPC_PORT:-50053}"
max_concurrent_streams = 100
max_connection_idle = "5m"          # Idle connection timeout
max_connection_age = "30m"          # Maximum connection lifetime
keepalive_time = "30s"              # Keepalive ping interval
keepalive_timeout = "10s"           # Keepalive ping timeout
reflection_enabled = true           # Enable gRPC reflection for debugging

# ============================================================================
# Section 3: ACME Protocol (Let's Encrypt) Configuration
# ============================================================================
[acme]
# Production: https://acme-v02.api.letsencrypt.org/directory
# Staging:    https://acme-staging-v02.api.letsencrypt.org/directory
directory_url = "${ACME_DIRECTORY_URL:-https://acme-v02.api.letsencrypt.org/directory}"
email = "${ACME_EMAIL:-admin@safeops.local}"
terms_agreed = true                 # Required: Accept Let's Encrypt ToS
preferred_challenge = "http-01"     # http-01, dns-01, tls-alpn-01
key_type = "ECDSA-P256"             # RSA-2048, RSA-4096, ECDSA-P256, ECDSA-P384
timeout = "60s"                     # ACME operation timeout
retry_attempts = 3                  # Retries for failed ACME operations
retry_delay = "10s"                 # Delay between retries
rate_limit_buffer = 5               # Safety margin for LE rate limits

# ============================================================================
# Section 4: Managed Domains Configuration
# ============================================================================
# Example domain configurations - add your actual domains here

[[domains]]
common_name = "safeops.local"
subject_alt_names = ["www.safeops.local", "api.safeops.local"]
wildcard = false
challenge_type = "http-01"
enabled = true
auto_renew = true
renew_before_days = 30
http_challenge_port = 80

[[domains]]
common_name = "*.safeops.local"
subject_alt_names = []
wildcard = true
challenge_type = "dns-01"           # Wildcard requires DNS-01
enabled = false                     # Enable when DNS provider is configured
auto_renew = true
renew_before_days = 30
dns_provider = "cloudflare"

# ============================================================================
# Section 5: Certificate Storage Configuration
# ============================================================================
[storage]
type = "both"                       # filesystem, database, both
cert_path = "${CERT_STORAGE_PATH:-/opt/safeops/certs}"
key_path = "${KEY_STORAGE_PATH:-/opt/safeops/private}"
chain_path = "/opt/safeops/chains"
backup_path = "/opt/safeops/backup/certs"
file_permissions = "0600"           # Restrictive permissions for keys
directory_permissions = "0700"
encrypt_keys = true                 # Encrypt private keys at rest
encryption_key_file = "/opt/safeops/secrets/cert_encryption.key"

# ============================================================================
# Section 6: PostgreSQL Database Configuration
# ============================================================================
[database]
enabled = true
host = "${DB_HOST:-localhost}"
port = "${DB_PORT:-5432}"
name = "safeops_db"
user = "postgres"
password = "${DB_PASSWORD:-postgres}"
sslmode = "disable"                 # disable, require, verify-ca, verify-full
max_connections = 10
idle_connections = 2
connection_lifetime = "30m"
connection_timeout = "10s"

# ============================================================================
# Section 7: Automatic Renewal Scheduler
# ============================================================================
[renewal]
enabled = true
check_interval = "24h"              # How often to check for renewals
renew_before_days = 30              # Default: renew 30 days before expiry
max_concurrent_renewals = 2         # Maximum simultaneous renewals
retry_failed_renewals = true
retry_interval = "6h"               # Time between retry attempts
max_retry_attempts = 5              # Max retries before alerting
notification_enabled = true
notification_channels = ["email"]   # email, slack, webhook

# ============================================================================
# Section 8: Certificate Distribution to Services
# ============================================================================
[distribution]
enabled = true
method = "grpc_push"                # grpc_push, file_copy, both
target_services = ["tls_proxy", "web_ui", "vpn_server"]
retry_failed = true
retry_interval = "5m"
max_retry_attempts = 3
notification_on_failure = true

# ============================================================================
# Section 9: HTTP-01 Challenge Server
# ============================================================================
[http_challenge]
enabled = true
port = 80                           # Must be 80 for Let's Encrypt
bind_address = "0.0.0.0"
timeout = "30s"
well_known_path = "/.well-known/acme-challenge"
allow_external = true               # Required for ACME validation

# ============================================================================
# Section 10: DNS-01 Challenge Configuration (for Wildcards)
# ============================================================================
[dns_challenge]
enabled = false                     # Enable when using DNS-01
provider = "cloudflare"             # cloudflare, route53, digitalocean, manual
api_token = "${DNS_API_TOKEN:-}"
api_key = "${DNS_API_KEY:-}"
api_secret = "${DNS_API_SECRET:-}"
propagation_timeout = "120s"        # Wait time for DNS propagation
polling_interval = "10s"            # How often to check propagation
ttl = 120                           # TTL for challenge TXT records

# ============================================================================
# Section 11: Prometheus Metrics
# ============================================================================
[metrics]
enabled = true
port = 9093
path = "/metrics"
include_system_metrics = true       # Include Go runtime metrics

# ============================================================================
# Section 12: Health Check Endpoint
# ============================================================================
[health]
enabled = true
port = 8093
path = "/health"
check_database = true               # Include database connectivity check
check_acme_connectivity = true      # Verify Let's Encrypt reachability

# ============================================================================
# Notification Channels Configuration
# ============================================================================
[notifications.email]
enabled = false
smtp_host = "smtp.example.com"
smtp_port = 587
username = ""
password = ""
from_address = "certs@safeops.local"
to_addresses = ["admin@safeops.local"]

[notifications.slack]
enabled = false
webhook_url = "${SLACK_WEBHOOK_URL:-}"
channel = "#certificates"

[notifications.webhook]
enabled = false
url = "${WEBHOOK_URL:-}"
method = "POST"
headers = { "Content-Type" = "application/json" }

# ============================================================================
# Section 14: SafeOps Internal CA Configuration
# ============================================================================
[ca]
enabled = true                                     # Enable internal CA
organization = "SafeOps Network"                   # CA organization name
country = "US"                                     # CA country code
state = ""                                         # CA state/province (optional)
locality = ""                                      # CA city (optional)
validity_years = 10                                # CA certificate validity
key_algorithm = "RSA"                              # RSA or ECDSA
key_size = 4096                                    # 2048, 4096, or 256/384 for ECDSA
key_encryption_enabled = true                      # Encrypt CA private key at rest
key_encryption_algorithm = "AES-256-GCM"           # Encryption algorithm
key_passphrase_file = "${CA_PASSPHRASE_FILE:-/etc/safeops/secrets/ca_passphrase}"
ca_cert_path = "/etc/safeops/ca/root-cert.pem"     # CA certificate path
ca_key_path = "/etc/safeops/ca/root-key.pem.enc"   # Encrypted CA key path

# ============================================================================
# Section 15: HTTP CA Distribution Server (DHCP Integration)
# ============================================================================
[ca_distribution]
enabled = true                                     # Enable HTTP CA distribution
bind_address = "${CA_DIST_BIND:-0.0.0.0}"          # Bind address
http_port = "${CA_DIST_PORT:-8080}"                # HTTP port (use reverse proxy for 80)
base_url = "${CA_DIST_URL:-http://192.168.1.1}"    # Base URL for DHCP option 224
generate_qr_codes = true                           # Generate QR codes for mobile install
generate_trust_instructions = true                 # Generate platform-specific guides
# Endpoints served:
#   /ca.crt              - CA certificate (PEM)
#   /ca.der              - CA certificate (DER)
#   /ca.p7b              - CA certificate (PKCS#7)
#   /install-ca.sh       - Linux/macOS install script
#   /install-ca.ps1      - Windows PowerShell script
#   /SafeOps-CA.mobileconfig - iOS/macOS profile

# ============================================================================
# Section 16: Certificate Revocation List (CRL) Configuration
# ============================================================================
[revocation.crl]
enabled = true                                     # Enable CRL generation
update_interval = "24h"                            # CRL regeneration interval
crl_path = "/var/safeops/ca/crl.pem"               # CRL file path
crl_url = "${CRL_URL:-http://192.168.1.1/crl.pem}" # CRL distribution point URL
validity_days = 7                                  # CRL validity period
signature_algorithm = "SHA256WithRSA"              # CRL signature algorithm

# ============================================================================
# Section 17: OCSP Responder Configuration
# ============================================================================
[revocation.ocsp]
enabled = true                                     # Enable OCSP responder
bind_address = "${OCSP_BIND:-0.0.0.0}"             # OCSP server bind address
port = "${OCSP_PORT:-8888}"                        # OCSP server port
ocsp_url = "${OCSP_URL:-http://192.168.1.1:8888}"  # OCSP responder URL
signing_cert_validity = "365d"                     # OCSP responder cert validity
cache_validity = "1h"                              # OCSP response cache duration
max_requests_per_second = 100                      # Rate limiting

# ============================================================================
# Section 18: Security & Audit Configuration
# ============================================================================
[security]
audit_logging_enabled = true                        # Enable audit logging
audit_log_database = true                           # Log to database
audit_log_file = "/var/log/safeops/ca_audit.log"   # Also log to file
rate_limit_enabled = true                           # Enable rate limiting
max_certs_per_hour = 100                            # Max certificates per hour
hash_chain_enabled = true                           # Enable tamper-proof hash chaining

# ============================================================================
# Section 19: CA Backup Configuration
# ============================================================================
[backup]
enabled = true                                      # Enable CA backups
backup_interval = "24h"                             # Backup frequency
backup_location = "/var/backups/safeops/ca/"        # Backup directory
backup_retention_days = 90                          # Keep backups for 90 days
encryption_enabled = true                           # Encrypt backups
encryption_key_file = "${BACKUP_KEY_FILE:-/etc/safeops/secrets/backup_key}"

