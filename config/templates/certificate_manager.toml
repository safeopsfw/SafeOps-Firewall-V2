# SafeOps Certificate Manager Configuration
# Certificate Authority (CA) service for PKI management
#
# This service handles certificate generation, signing, renewal, revocation,
# and storage for TLS interception, service-to-service communication, and
# user authentication.

# ============================================================================
# Service Configuration
# ============================================================================
[service]
# Service identifier for orchestrator registration
service_name = "certificate_manager"

# gRPC certificate API address
grpc_listen_address = "127.0.0.1:50061"

# Maximum concurrent certificate requests
grpc_max_connections = 100

# HTTP server for OCSP and CRL endpoints
http_listen_address = "0.0.0.0"
http_port = 8090

# Self-health check frequency (seconds)
health_check_interval = 30

# Enable Prometheus metrics export
metrics_enabled = true
metrics_port = 9101

# ============================================================================
# Root CA Configuration
# ============================================================================
[root_ca]
# Enable root CA functionality
root_ca_enabled = true

# Path to root CA certificate
root_ca_certificate_path = "D:\\SafeOpsFV2\\certs\\ca\\root-ca.crt"

# Path to root CA private key
root_ca_private_key_path = "D:\\SafeOpsFV2\\certs\\ca\\root-ca.key"

# Root CA private key passphrase
# Can be overridden with ${ROOT_CA_PASSWORD}
# root_ca_key_password = "${ROOT_CA_PASSWORD}"

# Root CA subject Distinguished Name
[root_ca.subject]
common_name = "SafeOps Root CA"
organization = "SafeOps"
organizational_unit = "Security Operations"
country = "US"
state = "California"
locality = "San Francisco"

# Root CA key configuration
root_ca_key_algorithm = "RSA"  # RSA or ECDSA
root_ca_key_size = 4096        # RSA: 2048/4096, ECDSA: 256/384/521

# Root CA certificate validity (years)
root_ca_validity_years = 20

# ============================================================================
# Intermediate CA Configuration
# ============================================================================
[intermediate_ca]
# Use intermediate CA for operational signing (recommended)
# Protects root CA private key
intermediate_ca_enabled = true

# Path to intermediate CA certificate
intermediate_ca_certificate_path = "D:\\SafeOpsFV2\\certs\\ca\\intermediate-ca.crt"

# Path to intermediate CA private key
intermediate_ca_private_key_path = "D:\\SafeOpsFV2\\certs\\ca\\intermediate-ca.key"

# Intermediate CA private key passphrase
# Can be overridden with ${INTERMEDIATE_CA_PASSWORD}
# intermediate_ca_key_password = "${INTERMEDIATE_CA_PASSWORD}"

# Intermediate CA subject
[intermediate_ca.subject]
common_name = "SafeOps Intermediate CA"
organization = "SafeOps"
organizational_unit = "Certificate Services"
country = "US"
state = "California"
locality = "San Francisco"

# Full certificate chain file (root + intermediate)
intermediate_ca_chain_path = "D:\\SafeOpsFV2\\certs\\ca\\ca-chain.pem"

# Intermediate CA certificate validity (years)
intermediate_ca_validity_years = 10

# Auto-renew intermediate CA before expiry
auto_renew_intermediate = true

# Renew when remaining validity < N days
intermediate_renewal_threshold = 365

# ============================================================================
# Certificate Generation
# ============================================================================
[certificate_generation]
# Default certificate validity (days)
default_validity_days = 365

# Default key algorithm
# Valid values: "RSA", "ECDSA"
default_key_algorithm = "RSA"

# Default key size
# RSA: 2048 or 4096, ECDSA: 256, 384, or 521
default_key_size = 2048

# Allowed algorithms clients can request
allowed_key_algorithms = ["RSA", "ECDSA"]

# Allowed key sizes clients can request
allowed_key_sizes = [2048, 4096, 256, 384]

# Maximum certificate validity allowed (days)
max_validity_days = 825  # ~2 years (CA/Browser Forum limit)

# Require Subject Alternative Name (SAN)
san_required = true

# Allow wildcard certificate generation
wildcard_certificates_allowed = true

# Allow self-signed certificate generation (development only)
self_signed_allowed = false

# ============================================================================
# Certificate Storage
# ============================================================================
[storage]
# Storage backend
# Valid values: "DATABASE", "FILESYSTEM", "BOTH"
# DATABASE: PostgreSQL (recommended)
# FILESYSTEM: Files on disk
# BOTH: PostgreSQL + filesystem backup
storage_backend = "BOTH"

# PostgreSQL database configuration
database_host = "localhost"
database_port = 5432
database_name = "safeops"
database_user = "safeops"
database_password = "${POSTGRES_PASSWORD}"

# Connection pool size
database_connection_pool = 10

# Filesystem storage path
filesystem_path = "D:\\SafeOpsFV2\\data\\certificates"

# Certificate storage format
# Valid values: "PEM", "DER", "PKCS12"
certificate_format = "PEM"

# Store private keys (requires encryption)
include_private_keys = true

# ============================================================================
# Automatic Renewal
# ============================================================================
[auto_renewal]
# Enable automatic certificate renewal
auto_renewal_enabled = true

# How often to check for expiring certificates (hours)
renewal_check_interval = 24

# Renew certificates when remaining validity < N days
renewal_threshold_days = 30

# Start renewal attempts N days before expiry
# Provides buffer for failed renewals
renewal_window_days = 45

# Maximum retry attempts for failed renewals
renewal_retry_attempts = 5

# Retry interval (hours)
renewal_retry_interval = 6

# Notify before/after renewals
renewal_notification_enabled = true

# Notify N days before expiry
renewal_notification_threshold = 14

# Notification methods (email, webhook)
renewal_notification_methods = ["EMAIL", "WEBHOOK"]

# ============================================================================
# Certificate Revocation
# ============================================================================
[revocation]
# Enable certificate revocation
revocation_enabled = true

# Generate Certificate Revocation Lists (CRL)
crl_enabled = true

# CRL distribution point URL (included in certificates)
crl_distribution_point = "http://crl.safeops.local/root-ca.crl"

# CRL regeneration frequency (hours)
crl_update_interval = 24

# CRL validity duration (hours)
crl_validity_hours = 168  # 7 days

# Filesystem path for CRL files
crl_path = "D:\\SafeOpsFV2\\data\\crl"

# Enable OCSP responder
ocsp_enabled = true

# OCSP responder URL (included in certificates)
ocsp_responder_url = "http://ocsp.safeops.local:8090"

# Dedicated OCSP signing certificate
# If not specified, uses intermediate CA
# ocsp_signing_certificate = "D:\\SafeOpsFV2\\certs\\ocsp-signer.crt"
# ocsp_signing_key = "D:\\SafeOpsFV2\\certs\\ocsp-signer.key"

# Cache OCSP responses
ocsp_cache_enabled = true

# OCSP response cache duration (seconds)
ocsp_cache_ttl = 3600

# ============================================================================
# Certificate Templates
# ============================================================================
# Predefined certificate profiles

[[certificate_templates]]
template_name = "tls_server"
template_type = "SERVER"
validity_days = 365
key_algorithm = "RSA"
key_size = 2048
key_usage = ["digitalSignature", "keyEncipherment"]
extended_key_usage = ["serverAuth"]
san_types = ["DNS", "IP"]
description = "Standard TLS server certificate"

[[certificate_templates]]
template_name = "tls_client"
template_type = "CLIENT"
validity_days = 365
key_algorithm = "RSA"
key_size = 2048
key_usage = ["digitalSignature", "keyEncipherment"]
extended_key_usage = ["clientAuth"]
san_types = ["EMAIL", "DNS"]
description = "TLS client authentication certificate"

[[certificate_templates]]
template_name = "code_signing"
template_type = "CODE_SIGNING"
validity_days = 730  # 2 years
key_algorithm = "RSA"
key_size = 4096
key_usage = ["digitalSignature"]
extended_key_usage = ["codeSigning"]
san_types = ["EMAIL"]
description = "Code signing certificate"

[[certificate_templates]]
template_name = "email"
template_type = "EMAIL"
validity_days = 365
key_algorithm = "RSA"
key_size = 2048
key_usage = ["digitalSignature", "keyEncipherment"]
extended_key_usage = ["emailProtection"]
san_types = ["EMAIL"]
description = "S/MIME email certificate"

# ============================================================================
# TLS Interception Support
# ============================================================================
[tls_interception]
# Enable on-demand certificate generation for TLS proxy
tls_interception_enabled = true

# CA certificate for TLS interception
# Usually same as intermediate CA
interception_ca_certificate = "D:\\SafeOpsFV2\\certs\\ca\\intermediate-ca.crt"
interception_ca_private_key = "D:\\SafeOpsFV2\\certs\\ca\\intermediate-ca.key"

# Cache generated interception certificates
interception_cert_cache = true

# Maximum cached interception certificates
interception_cache_size = 10000

# Cache entry lifetime (hours)
interception_cache_ttl = 24

# Validity for intercepted certificates (days)
interception_cert_validity_days = 365

# Generate wildcard certificates for domains
wildcard_generation_enabled = true

# Copy server certificate properties (issuer, validity dates)
# Makes interception less detectable
copy_server_properties = true

# ============================================================================
# Security and Compliance
# ============================================================================
[security]
# Encrypt stored private keys
private_key_encryption = true

# Encryption algorithm
# Valid values: "AES256", "CHACHA20"
encryption_algorithm = "AES256"

# Encryption key source
# Valid values: "FILE", "ENV_VAR", "KMS", "VAULT"
encryption_key_source = "ENV_VAR"

# Encryption key environment variable
encryption_key_env_var = "ENCRYPTION_KEY"

# Path to encryption key file (if source = FILE)
# encryption_key_path = "D:\\SafeOpsFV2\\secrets\\encryption.key"

# Use Hardware Security Module for CA keys
hsm_enabled = false

# HSM type
# Valid values: "PKCS11", "AWS_CLOUDHSM", "AZURE_KEYVAULT"
# hsm_type = "PKCS11"

# HSM configuration
# hsm_library_path = "C:\\Program Files\\HSM\\pkcs11.dll"
# hsm_pin = "${HSM_PIN}"
# hsm_slot = 0

# Audit logging for all certificate operations
audit_logging_enabled = true

# Audit log file path
audit_log_path = "D:\\SafeOpsFV2\\logs\\certificate_audit.log"

# Compliance mode
# Valid values: "NONE", "NIST", "FIPS", "CA_BROWSER_FORUM"
compliance_mode = "CA_BROWSER_FORUM"

# ============================================================================
# API and Integration
# ============================================================================
[api]
# Require authentication for certificate requests
api_authentication_enabled = true

# Authentication method
# Valid values: "MTLS", "JWT", "API_KEY"
api_auth_method = "JWT"

# JWT signing key
# api_jwt_secret = "${API_SECRET}"

# API key for service-to-service communication
# api_key = "${API_SECRET}"

# Rate limit certificate requests
api_rate_limiting_enabled = true

# Maximum requests per minute per client
api_rate_limit = 100

# Call webhooks on certificate events
webhook_enabled = false

# Webhook endpoint URL
# webhook_url = "https://webhook.example.com/certificates"

# Webhook authentication secret
# webhook_secret = "${WEBHOOK_SECRET}"

# Events to notify
webhook_events = ["ISSUED", "RENEWED", "REVOKED", "EXPIRED"]

# ============================================================================
# Performance Tuning
# ============================================================================
[performance]
# Number of certificate processing worker threads
# 0 = auto-detect (CPU cores)
worker_threads = 0

# Certificate request queue size
request_queue_size = 1000

# Cache signing operations
signing_cache_enabled = true

# Sign multiple certificates in batch
batch_signing_enabled = false

# Certificates per batch
batch_size = 10

# ============================================================================
# Advanced Settings
# ============================================================================
[advanced]
# Certificate serial number format
# Valid values: "RANDOM", "SEQUENTIAL"
serial_number_format = "RANDOM"

# Random serial number bit length
serial_number_bits = 128

# Include certificate policies extension
include_certificate_policies = true

# Certificate policy OID
certificate_policy_oid = "1.3.6.1.4.1.99999.1.1.1"

# Certificate policy URL
certificate_policy_url = "https://pki.safeops.local/cps"

# Enable certificate transparency logging
ct_logging_enabled = false

# CT log servers
# ct_log_servers = ["https://ct.googleapis.com/logs/argon2021/"]

# ============================================================================
# Environment Variable Overrides
# ============================================================================
# These settings can be overridden by environment variables:
#
# ROOT_CA_PASSWORD - Root CA private key passphrase
# INTERMEDIATE_CA_PASSWORD - Intermediate CA private key passphrase
# POSTGRES_PASSWORD - Database password for certificate storage
# ENCRYPTION_KEY - Key for encrypting stored private keys
# HSM_PIN - HSM PIN or authentication credential
# API_SECRET - API authentication secret (JWT signing key or API key)
# WEBHOOK_SECRET - Webhook authentication secret
#
# ============================================================================

# ============================================================================
# Configuration Validation
# ============================================================================
# The certificate_manager service validates this configuration at startup
# and will fail to start if validation fails. Common checks:
#
# 1. Root CA certificate and private key must exist
# 2. Root CA private key must match certificate
# 3. Intermediate CA certificate must be signed by root CA
# 4. Certificate chain must be valid
# 5. storage_backend paths must be writable
# 6. database credentials must have PostgreSQL access
# 7. OCSP responder URL must be accessible
# 8. CRL distribution point must be accessible
# 9. HSM configuration must be valid if enabled
# 10. Template configurations must be valid
#
# CRITICAL: Root CA certificate must be installed in all client trust
# stores for certificates to be trusted.
#
# Use the validator: safeops-cli config validate certificate_manager.toml
# ============================================================================
