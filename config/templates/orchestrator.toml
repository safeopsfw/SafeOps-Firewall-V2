# SafeOps Orchestrator Configuration
# Central control plane for the entire SafeOps system
#
# The orchestrator manages service lifecycle, distributes configurations,
# performs health monitoring, aggregates metrics, and coordinates dependencies.
# This is the first service to start and the last to stop.

# ============================================================================
# Service Configuration
# ============================================================================
[service]
# Service identifier (always "orchestrator")
service_name = "orchestrator"

# Management API address
# 0.0.0.0 allows external management tools to connect
grpc_listen_address = "0.0.0.0:50051"

# Maximum concurrent management clients
grpc_max_connections = 100

# HTTP server for metrics and health endpoints
http_listen_address = "0.0.0.0"
http_port = 8081

# Path to master configuration file
# Can be overridden with ${MASTER_CONFIG_PATH}
master_config_path = "D:\\SafeOpsFV2\\config\\templates\\safeops.toml"

# Self-health check frequency (seconds)
health_check_interval = 30

# Enable Prometheus metrics export
metrics_enabled = true

# ============================================================================
# Service Registry and Supervision
# ============================================================================
# Services are loaded from safeops.toml at runtime
# This section configures supervision behavior

[service_supervision]
# Enable service supervision
supervision_enabled = true

# Supervision check interval (seconds)
supervision_interval = 10

# Default restart policy for all services
# Valid values: "ALWAYS", "ON_FAILURE", "NEVER"
# Can be overridden per service in safeops.toml
default_restart_policy = "ON_FAILURE"

# Default maximum consecutive restart attempts
default_max_restart_attempts = 5

# Default delay between restart attempts (seconds)
default_restart_delay = 10

# Default graceful shutdown timeout (seconds)
default_graceful_shutdown_timeout = 30

# Kill services that don't stop gracefully
force_kill_on_timeout = true

# Track service uptime and statistics
track_service_statistics = true

# ============================================================================
# Configuration Distribution
# ============================================================================
[config_distribution]
# Enable automatic configuration distribution
config_distribution_enabled = true

# Watch config files for changes
config_watch_enabled = true

# File modification check frequency (seconds)
config_watch_interval = 60

# Validate configs before distribution
config_validation_enabled = true

# Validation schema directory
config_schema_path = "D:\\SafeOpsFV2\\config\\schemas"

# Allow runtime configuration updates
config_hot_reload_enabled = true

# Hot reload strategy
# Valid values: "GRACEFUL", "IMMEDIATE", "SCHEDULED"
# GRACEFUL: Reload during next service restart
# IMMEDIATE: Reload immediately (may cause brief disruption)
# SCHEDULED: Reload during maintenance window
config_reload_strategy = "GRACEFUL"

# Backup configs before updates
config_backup_enabled = true

# Number of backup versions to keep
config_backup_retention = 5

# Backup directory
config_backup_path = "D:\\SafeOpsFV2\\config\\backups"

# ============================================================================
# Health Monitoring
# ============================================================================
[health_monitoring]
# Enable health monitoring system
health_monitoring_enabled = true

# Check services concurrently (faster)
health_check_parallel = true

# Number of concurrent health checkers
health_check_workers = 4

# Consecutive failures before marking unhealthy
unhealthy_threshold = 3

# Consecutive successes to mark healthy again
healthy_threshold = 2

# Cache health status (seconds)
# Reduces overhead for frequent status queries
status_cache_ttl = 5

# Send alerts when service becomes unhealthy
alert_on_unhealthy = true

# Automatically restart unhealthy services
auto_restart_unhealthy = true

# Wait before restarting unhealthy service (seconds)
restart_unhealthy_delay = 30

# Health check timeout multiplier
# Actual timeout = service.health_check_timeout * multiplier
timeout_multiplier = 1.5

# ============================================================================
# Metrics Aggregation
# ============================================================================
[metrics_aggregation]
# Collect metrics from all services
metrics_aggregation_enabled = true

# Scrape frequency (seconds)
metrics_collection_interval = 15

# How long to retain metrics in memory (hours)
metrics_retention_duration = 24

# Allow Prometheus to scrape aggregated metrics
prometheus_scrape_enabled = true

# HTTP path for Prometheus endpoint
prometheus_scrape_path = "/metrics"

# Support service-specific custom metrics
custom_metrics_enabled = true

# Metrics export format
# Valid values: "PROMETHEUS", "OPENMETRICS", "JSON"
metrics_export_format = "PROMETHEUS"

# Aggregate metrics by label
aggregate_by_labels = ["service", "instance", "environment"]

# ============================================================================
# Dependency Management
# ============================================================================
[dependency_management]
# Verify dependencies before starting service
dependency_checking_enabled = true

# Wait for dependencies to be ready
dependency_wait_enabled = true

# Maximum wait for dependencies (seconds)
dependency_wait_timeout = 300

# Detect and prevent circular dependencies
circular_dependency_detection = true

# Validate dependency graph on startup
dependency_graph_validation = true

# Start independent services in parallel
parallel_start_enabled = true

# Maximum services to start simultaneously
max_parallel_starts = 4

# Stop services in reverse dependency order
reverse_stop_order = true

# ============================================================================
# Logging and Diagnostics
# ============================================================================
[logging]
# Orchestrator-specific log level
# Valid values: "TRACE", "DEBUG", "INFO", "WARN", "ERROR"
orchestrator_log_level = "INFO"

# Capture stdout/stderr from supervised services
service_output_capture = true

# Combine service logs into single stream
service_log_aggregation = false

# Directory for captured service logs
service_log_path = "D:\\SafeOpsFV2\\logs\\services"

# Log all orchestrator events (start/stop/health changes)
event_log_enabled = true

# Event log file path
event_log_path = "D:\\SafeOpsFV2\\logs\\orchestrator_events.log"

# Log all management API calls
audit_log_enabled = true

# Audit log file path
audit_log_path = "D:\\SafeOpsFV2\\logs\\orchestrator_audit.log"

# Include stack traces in error logs
include_stack_traces = true

# ============================================================================
# API Security
# ============================================================================
[api_security]
# Require authentication for API calls
api_authentication_enabled = true

# Authentication method
# Valid values: "JWT", "API_KEY", "MTLS", "NONE"
api_auth_method = "JWT"

# JWT signing secret
# Can be overridden with ${ORCHESTRATOR_JWT_SECRET}
api_jwt_secret = "${ORCHESTRATOR_JWT_SECRET}"

# JWT token validity duration (hours)
api_jwt_expiry = 24

# API key for service-to-service communication
# Can be overridden with ${ORCHESTRATOR_API_KEY}
# api_key = "${ORCHESTRATOR_API_KEY}"

# IP whitelist for management API (empty = allow all)
# Production: Restrict to admin IPs only
api_allowed_ips = ["127.0.0.1", "::1"]

# Rate limit API calls
api_rate_limiting_enabled = true

# Maximum calls per minute per client
api_rate_limit = 1000

# Enable role-based access control
rbac_enabled = false

# RBAC policy file
# rbac_policy_path = "D:\\SafeOpsFV2\\config\\rbac_policies.yaml"

# ============================================================================
# Failover and High Availability
# ============================================================================
[high_availability]
# Enable high availability mode
ha_enabled = false

# HA mode
# Valid values: "ACTIVE_PASSIVE", "ACTIVE_ACTIVE"
ha_mode = "ACTIVE_PASSIVE"

# Peer orchestrator gRPC address
# Can be overridden with ${HA_PEER_ADDRESS}
# ha_peer_address = "192.168.1.2:50051"

# Heartbeat frequency (seconds)
ha_heartbeat_interval = 5

# Time before triggering failover (seconds)
ha_failover_timeout = 15

# Synchronize state with peer
ha_state_sync_enabled = true

# State sync interval (seconds)
ha_state_sync_interval = 10

# Use leader election (vs manual primary designation)
ha_leader_election = true

# Leader election timeout (seconds)
ha_election_timeout = 30

# ============================================================================
# Backup and Recovery
# ============================================================================
[state_persistence]
# Persist orchestrator state to disk
state_persistence_enabled = true

# Path to state file
# Can be overridden with ${STATE_FILE_PATH}
state_file_path = "D:\\SafeOpsFV2\\data\\orchestrator_state.json"

# How often to write state to disk (seconds)
state_sync_interval = 60

# Auto-recover services on orchestrator restart
auto_recovery_enabled = true

# Wait before starting recovery (seconds)
# Allows system to stabilize
recovery_delay = 10

# Restore services in original start order
service_order_preservation = true

# Backup state file before updates
state_backup_enabled = true

# Number of state backup versions
state_backup_retention = 10

# ============================================================================
# Performance Tuning
# ============================================================================
[performance]
# Thread pool size for management tasks
# 0 = auto-detect (CPU cores * 2)
worker_threads = 0

# Internal event queue size
event_queue_size = 10000

# gRPC keepalive interval (seconds)
grpc_keepalive_time = 30

# gRPC keepalive timeout (seconds)
grpc_keepalive_timeout = 10

# gRPC connection pool per service
connection_pool_size = 5

# Maximum gRPC message size (MB)
max_message_size = 100

# Enable gRPC compression
grpc_compression_enabled = true

# Buffer size for service stdout/stderr capture
output_buffer_size = 8192

# ============================================================================
# Notification and Alerting
# ============================================================================
[notifications]
# Send notifications for orchestrator events
notification_enabled = true

# Notification methods
[[notifications.methods]]
method = "EMAIL"
enabled = false
smtp_server = "smtp.example.com"
smtp_port = 587
from_address = "orchestrator@example.com"
to_addresses = ["admin@example.com"]
events = ["SERVICE_FAILED", "SERVICE_UNHEALTHY", "ORCHESTRATOR_STARTED"]

[[notifications.methods]]
method = "WEBHOOK"
enabled = false
webhook_url = "https://webhook.example.com/orchestrator"
events = ["SERVICE_FAILED", "SERVICE_STARTED", "SERVICE_STOPPED"]

# ============================================================================
# Advanced Settings
# ============================================================================
[advanced]
# Allow services to be managed individually via API
individual_service_control = true

# Prevent shutdown if critical services are running
safe_shutdown_enabled = true

# Critical services that must be stopped first
critical_services = ["orchestrator"]

# Environment variable prefix for service configs
env_var_prefix = "SAFEOPS_"

# Service binary search paths
service_binary_paths = [
    "D:\\SafeOpsFV2\\services",
    "D:\\SafeOpsFV2\\bin"
]

# Default environment variables for all services
[advanced.default_environment]
SAFEOPS_ENV = "production"
SAFEOPS_DATA_DIR = "D:\\SafeOpsFV2\\data"
SAFEOPS_LOG_DIR = "D:\\SafeOpsFV2\\logs"

# ============================================================================
# Startup Behavior
# ============================================================================
[startup]
# Auto-start all enabled services on orchestrator startup
auto_start_services = true

# Wait for all services to be healthy before considering startup complete
wait_for_healthy = true

# Maximum wait for all services to become healthy (seconds)
startup_timeout = 600

# Continue startup even if some services fail
continue_on_failure = true

# Services to start even if disabled in safeops.toml
# (useful for maintenance/recovery)
force_start_services = []

# ============================================================================
# Shutdown Behavior
# ============================================================================
[shutdown]
# Stop all services on orchestrator shutdown
stop_services_on_shutdown = true

# Timeout for complete shutdown (seconds)
shutdown_timeout = 120

# Send shutdown signal to all services simultaneously
parallel_shutdown = false

# Wait for each service to stop before proceeding to next
sequential_shutdown = true

# Kill remaining services after timeout
force_kill_remaining = true

# ============================================================================
# Environment Variable Overrides
# ============================================================================
# These settings can be overridden by environment variables:
#
# ORCHESTRATOR_API_KEY - API authentication key
# ORCHESTRATOR_JWT_SECRET - JWT signing secret
# MASTER_CONFIG_PATH - Override path to safeops.toml
# HA_PEER_ADDRESS - High availability peer address
# STATE_FILE_PATH - Override state persistence file path
#
# ============================================================================

# ============================================================================
# Configuration Validation
# ============================================================================
# The orchestrator validates this configuration at startup and will
# fail to start if validation fails. Common checks:
#
# 1. master_config_path must exist and be readable
# 2. All service binaries in safeops.toml must exist
# 3. Service dependencies must not form circular references
# 4. Health check endpoints must be reachable
# 5. State file directory must be writable
# 6. Log directories must exist and be writable
# 7. JWT secret must be set if api_authentication_enabled
# 8. HA peer address must be reachable if ha_enabled
# 9. Port bindings must not conflict with other services
# 10. Resource limits must be within system capacity
#
# The orchestrator is the master control service. Ensure this configuration
# is correct before starting the SafeOps system.
#
# Use the validator: safeops-cli config validate orchestrator.toml
# ============================================================================
