# ============================================================================
# Network Topology  🔄
# ============================================================================
# Describes physical network interfaces and their roles
# The network_manager service uses this for auto-configuration

[[network.interfaces]]
name = "Ethernet"
type = "WAN"
mac_address = ""  # Auto-detected at runtime
ip_configuration = "dhcp"  # "dhcp" or "static"
monitoring_enabled = true
default_gateway = ""  # Auto-populated for DHCP
dns_servers = ["8.8.8.8", "8.8.4.4"]

[[network.interfaces]]
name = "Ethernet 2"
type = "LAN"
mac_address = ""
ip_configuration = "static"
monitoring_enabled = true
static_ip = "192.168.1.1"
subnet_mask = "255.255.255.0"
default_gateway = ""
dns_servers = ["192.168.1.1"]

[[network.interfaces]]
name = "Wi-Fi"
type = "WIFI"
mac_address = ""
ip_configuration = "static"
monitoring_enabled = true
static_ip = "192.168.2.1"
subnet_mask = "255.255.255.0"
default_gateway = ""
dns_servers = ["192.168.2.1"]

# DMZ network (optional)
