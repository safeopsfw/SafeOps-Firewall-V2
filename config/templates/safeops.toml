# ============================================================================
# Orchestration Settings  🔄
# ============================================================================
[orchestration]
# Frequency of service health checks (seconds)
supervision_interval = 30

# Allow hot-reload of configuration changes
config_reload_enabled = true

# How often to check for config file modifications (seconds)
config_watch_interval = 60

# Prometheus metrics scraping frequency (seconds)
metrics_collection_interval = 15

# Maximum wait time for clean service shutdown (seconds)
graceful_shutdown_timeout = 30

# Default timeout for gRPC calls between services (seconds)
inter_service_timeout = 10

# Enable distributed tracing with OpenTelemetry
tracing_enabled = false
tracing_endpoint = "http://localhost:4317"

# ============================================================================
# Database Configuration
# ============================================================================
[database]
# PostgreSQL connection parameters
database_host = "localhost"
database_port = 5432
database_name = "safeops"

# Authentication
# Password can be overridden with ${POSTGRES_PASSWORD}
database_user = "safeops"
database_password = ""  # Set via environment variable

# Connection pool settings
connection_pool_size = 25
connection_timeout = 30

# TLS encryption
# Valid values: "disable", "require", "verify-ca", "verify-full"
ssl_mode = "require"

# Database migrations
auto_migrate = true
migration_directory = "D:\\SafeOpsFV2\\migrations"

# ============================================================================
# Redis Cache Configuration
# ============================================================================
[redis]
# Redis server connection
redis_host = "localhost"
redis_port = 6379

# Authentication (if required)
# Password can be overridden with ${REDIS_PASSWORD}
redis_password = ""

# Database number (0-15)
redis_db = 0

# Connection pool settings
connection_pool_size = 10

# Default TTL for cached entries (seconds)
# 0 = no expiration
cache_ttl_default = 3600

# Enable Redis for session management
session_storage_enabled = true

# Enable Redis for pub/sub messaging between services
pubsub_enabled = true

# ============================================================================
# Security Settings
# ============================================================================
[security]
# Enforce TLS for all gRPC communication
tls_enabled = true

# TLS certificate paths
# Can be overridden with ${TLS_CERT_PATH}, ${TLS_KEY_PATH}
tls_cert_path = "D:\\SafeOpsFV2\\certs\\server.crt"
tls_key_path = "D:\\SafeOpsFV2\\certs\\server.key"
tls_ca_path = "D:\\SafeOpsFV2\\certs\\ca.crt"

# Client certificate authentication for inter-service communication
mtls_enabled = false

# API authentication settings
api_authentication_required = true

# JWT token validity duration (seconds)
# Default: 24 hours
api_token_expiry = 86400

# JWT signing key
# Override with ${API_SECRET_KEY} environment variable
api_secret_key = ""  # Must be set via environment variable

# IP whitelist for administrative access
# Empty array = allow from any IP
allowed_admin_ips = ["127.0.0.1", "::1"]

# Rate limiting for API endpoints
rate_limiting_enabled = true
rate_limit_requests_per_minute = 100

# CORS settings for web UI
[security.cors]
enabled = true
allowed_origins = ["http://localhost:3000", "https://localhost:3000"]
allowed_methods = ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
allowed_headers = ["Content-Type", "Authorization"]
allow_credentials = true

# ============================================================================
# Metrics and Monitoring
# ============================================================================
[metrics]
# Prometheus metrics exporter
prometheus_enabled = true
prometheus_port = 9090
prometheus_path = "/metrics"

# Export system metrics (CPU, memory, disk)
system_metrics_enabled = true

# Export service-specific metrics
service_metrics_enabled = true

# Metrics retention (for internal dashboard)
metrics_retention_days = 30

# ============================================================================
# Web UI Configuration
# ============================================================================
[web_ui]
# Web UI server settings
enabled = true
listen_address = "0.0.0.0"
listen_port = 443
tls_enabled = true

# Session settings
session_timeout_minutes = 60
remember_me_duration_days = 30

# File upload limits (for configuration restore, etc.)
max_upload_size_mb = 100

# ============================================================================
# Alert and Notification Settings
# ============================================================================
[alerts]
# Enable alert notifications
enabled = true

# Email notifications
[alerts.email]
enabled = false
smtp_server = ""
smtp_port = 587
smtp_username = ""
smtp_password = ""  # Override with ${SMTP_PASSWORD}
smtp_tls = true
from_address = "safeops@example.com"
to_addresses = ["admin@example.com"]

# Webhook notifications
[alerts.webhook]
enabled = false
webhook_url = ""
webhook_secret = ""  # Override with ${WEBHOOK_SECRET}

# Alert thresholds
[alerts.thresholds]
cpu_usage_percent = 90
memory_usage_percent = 90
disk_usage_percent = 85
failed_login_attempts = 5
threat_detection_critical = 1

# ============================================================================
# Backup Configuration
# ============================================================================
[backup]
# Automatic backup settings
auto_backup_enabled = true
backup_schedule = "0 2 * * *"  # 2 AM daily (cron format)
backup_directory = "D:\\SafeOpsFV2\\backups"

# Retention policy
backup_retention_days = 30
max_backups = 10

# Compression
compress_backups = true

# ============================================================================
# Update Configuration
# ============================================================================
[updates]
# Automatic update checking
auto_check_enabled = true
check_interval_hours = 24

# Update channel
# Valid values: "stable", "beta", "nightly"
update_channel = "stable"

# Automatic installation
auto_install_enabled = false
install_schedule = "0 3 * * 0"  # 3 AM Sunday

# Update server
update_server_url = "https://updates.safeops.example.com"

# ============================================================================
# Environment Variable Overrides
# ============================================================================
# These settings can be overridden by environment variables:
#
# SAFEOPS_DATA_DIR - Override data_directory
# SAFEOPS_LOG_LEVEL - Override global log_level
# POSTGRES_PASSWORD - PostgreSQL authentication
# REDIS_PASSWORD - Redis authentication
# TLS_CERT_PATH - TLS certificate file
# TLS_KEY_PATH - TLS private key file
# API_SECRET_KEY - JWT signing key
# DEPLOYMENT_ENV - Override deployment_environment
# SMTP_PASSWORD - SMTP authentication
# WEBHOOK_SECRET - Webhook authentication
#
# ============================================================================

# ============================================================================
# Configuration Validation
# ============================================================================
# The orchestrator validates this configuration at startup against
# config/schemas/config_schema.json and will fail to start if validation
# fails. Common validation checks:
#
# 1. All service grpc_address values must be unique
# 2. Service dependencies must not create circular references
# 3. Network interface types must be valid enum values
# 4. Database connection parameters must be accessible
# 5. TLS certificate files must exist if tls_enabled = true
# 6. Port numbers must be within valid range (1-65535)
# 7. All required services must have enabled = true
# 8. Service startup_order creates valid dependency graph
#
# Use the config validator: safeops-cli config validate safeops.toml
# ============================================================================
