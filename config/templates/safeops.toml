# SafeOps Master Configuration File
# Central coordination point for the entire SafeOps system
#
# This file is loaded by the orchestrator at startup and defines:
# - Global system settings
# - Service registry and dependencies
# - Network topology
# -= Database and cache configuration
# - Security parameters
#
# Hot-reload supported for select sections (marked with 🔄)

# ============================================================================
# Global System Settings
# ============================================================================
[global]
# Human-readable identifier for this SafeOps deployment
system_name = "SafeOps Firewall v2.0"

# Deployment environment
# Valid values: "production", "staging", "development", "testing"
deployment_environment = "production"

# Global logging verbosity
# Valid values: "TRACE", "DEBUG", "INFO", "WARN", "ERROR", "CRITICAL"
# Overridden by logging.toml per-service settings
log_level = "INFO"

# Configuration schema version for compatibility checking
config_version = "2.0.0"

# Root path for all runtime data storage
# Can be overridden with ${SAFEOPS_DATA_DIR}
data_directory = "D:\\SafeOpsFV2\\data"

# Temporary files and scratch space location
temp_directory = "D:\\SafeOpsFV2\\temp"

# ============================================================================
