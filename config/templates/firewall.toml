destination_port = [80]
interface = "WAN"
state = "NEW,ESTABLISHED"
log_enabled = true
description = "Example: Port forward 8080 to internal web server (disabled)"

# --- Custom Rules (Priority 900) ---

[[rules]]
rule_id = 900
rule_name = "Custom_Rule_Example"
enabled = false
group = "custom"
priority = 1
action = "ALLOW"
direction = "ANY"
protocol = "TCP"
source_address = "ANY"
destination_address = "ANY"
destination_port = [12345]
log_enabled = true
description = "Example custom rule (disabled)"

# ============================================================================
# Connection Tracking
# ============================================================================
[connection_tracking]
# Stateful firewall tracking parameters

# Enable stateful packet inspection
connection_tracking_enabled = true

# Track TCP connection states
track_tcp_state = true

# Pseudo-stateful UDP tracking
track_udp_state = true

# ICMP request/reply matching
track_icmp_state = true

# Connection idle timeouts (seconds)
connection_timeout_tcp = 3600          # 1 hour for established TCP
connection_timeout_udp = 180           # 3 minutes for UDP sessions
connection_timeout_icmp = 30           # 30 seconds for ICMP

# Maximum tracked connections (prevents state table exhaustion)
max_connections = 1000000              # 1 million concurrent connections

# Log connection state changes
connection_logging = false

# ============================================================================
# NAT Configuration
# ============================================================================
[nat]
# Network Address Translation settings

# Enable NAT functionality
nat_enabled = true

# Source NAT (SNAT) - Masquerade LAN/WIFI to WAN
[[nat.rules]]
nat_type = "MASQUERADE"
interface = "WAN"
source_address = "LAN_NETWORK"
enabled = true
description = "Masquerade LAN traffic to WAN interface IP"

[[nat.rules]]
nat_type = "MASQUERADE"
interface = "WAN"
source_address = "WIFI_NETWORK"
enabled = true
description = "Masquerade WiFi traffic to WAN interface IP"

# Destination NAT (DNAT) - Port forwarding examples
# [[nat.rules]]
# nat_type = "DNAT"
# interface = "WAN"
# destination_port = 8080
# translated_address = "192.168.1.100"
# translated_port = 80
# protocol = "TCP"
# enabled = false
# description = "Example: Forward WAN:8080 to LAN:192.168.1.100:80"

# ============================================================================
# Port Forwarding
# ============================================================================
[port_forwarding]
# Inbound port forwarding rules (simplified DNAT)

# Example port forwards (disabled by default)
# [[port_forwarding.forwards]]
# external_port = 80
# internal_address = "192.168.1.100"
# internal_port = 80
# protocol = "TCP"
# enabled = false
# description = "HTTP to internal web server"

# [[port_forwarding.forwards]]
# external_port = 443
# internal_address = "192.168.1.100"
# internal_port = 443
# protocol = "TCP"
# enabled = false
# description = "HTTPS to internal web server"

# [[port_forwarding.forwards]]
# external_port = 3389
# internal_address = "192.168.1.50"
# internal_port = 3389
# protocol = "TCP"
# enabled = false
# description = "RDP to internal workstation (SECURITY RISK)"

# ============================================================================
# Advanced Settings
# ============================================================================
[advanced]
# Additional firewall behavior controls

# IP fragment handling
# Valid values: "DROP", "ALLOW", "REASSEMBLE"
fragment_handling = "REASSEMBLE"

# Action for malformed packets
# Valid values: "DROP", "LOG_AND_DROP"
invalid_packet_action = "LOG_AND_DROP"

# Enforce RFC-compliant TCP state machine
strict_tcp_validation = true

# ICMP rate limiting (packets/second)
# 0 = unlimited
icmp_rate_limit = 100

# Log packets with invalid source addresses (martians)
log_martian_packets = true

# Reverse path forwarding check
# Valid values: "STRICT", "LOOSE", "DISABLED"
# STRICT: Packet source must be reachable via incoming interface
# LOOSE: Packet source must be reachable via any interface
rpf_check = "STRICT"

# SYN flood protection threshold (connections/second)
# 0 = disabled, handled by ddos_protection in firewall_engine.toml
syn_flood_protection = 0

# ============================================================================
# Environment Variable Overrides
# ============================================================================
# These settings can be overridden by environment variables:
#
# WAN_INTERFACE - WAN interface name
# LAN_INTERFACE - LAN interface name
# DMZ_INTERFACE - DMZ interface name
#
# ============================================================================

# ============================================================================
# Configuration Notes
# ============================================================================
# Rule Evaluation Order:
# 1. Rules are evaluated by group priority (lower first)
# 2. Within a group, rules evaluated by rule priority
# 3. First matching rule determines action
# 4. If no rule matches, default policy applies
#
# State Matching:
# - NEW: First packet of new connection
# - ESTABLISHED: Part of existing connection
# - RELATED: Related to existing connection (e.g., FTP data)
# - INVALID: Packet doesn't match any connection
#
# Address Syntax:
# - Single IP: "192.168.1.100"
# - CIDR: "192.168.1.0/24"
# - Range: "192.168.1.10-192.168.1.20"
# - Object reference: "LAN_NETWORK"
# - Negation: "!RFC1918_PRIVATE"
# - Any: "ANY" or "0.0.0.0/0"
#
# Port Syntax:
# - Single port: [80]
# - Multiple ports: [80, 443, 8080]
# - Range: [8000-8999]
# - Any: [] or omit field
#
# ============================================================================
