# SafeOps WiFi Access Point Configuration
# Wireless network connectivity via hostapd integration
#
# This service provides WiFi access point functionality with SSID management,
# security settings, VLAN tagging, client isolation, and DHCP integration.

# ============================================================================
# Service Configuration
# ============================================================================
[service]
# Service identifier for orchestrator registration
service_name = "wifi_ap"

# gRPC management API address
grpc_listen_address = "127.0.0.1:50063"

# Physical wireless interface
# Can be overridden with ${WIFI_INTERFACE}
wireless_interface = "wlan0"

# Bridge interface (if bridging to LAN)
bridge_interface = "br0"

# Path to hostapd configuration file
hostapd_config_path = "D:\\SafeOpsFV2\\config\\hostapd.conf"

# Path to hostapd executable
hostapd_binary_path = "C:\\Program Files\\hostapd\\bin\\hostapd.exe"

# Self-health check frequency (seconds)
health_check_interval = 30

# Enable Prometheus metrics export
metrics_enabled = true
metrics_port = 9103

# ============================================================================
# SSID Configuration
# ============================================================================
# Multiple SSIDs supported

[[ssids]]
ssid_name = "SafeOps-Home"
enabled = true
hidden = false
vlan_id = 0  # No VLAN (bridge to main LAN)
max_clients = 50
client_isolation = false
description = "Main home network"

[[ssids]]
ssid_name = "SafeOps-Guest"
enabled = true
hidden = false
vlan_id = 10  # Guest VLAN
max_clients = 20
client_isolation = true
description = "Guest network with isolation"

[[ssids]]
ssid_name = "SafeOps-IoT"
enabled = true
hidden = false
vlan_id = 20  # IoT VLAN
max_clients = 30
client_isolation = true
description = "IoT devices network"

# ============================================================================
# Wireless Settings
# ============================================================================
[wireless]
# Wireless mode
# Valid values: "802.11b", "802.11g", "802.11n", "802.11ac", "802.11ax"
wireless_mode = "802.11ac"

# Frequency band
# Valid values: "2.4GHz", "5GHz", "6GHz"
frequency_band = "5GHz"

# Wireless channel (0=auto)
# 2.4GHz: 1-14, 5GHz: 36-165
channel = 0

# Channel width
# Valid values: "20MHz", "40MHz", "80MHz", "160MHz"
channel_width = "80MHz"

# Automatically select best channel
auto_channel_selection = true

# Transmission power (dBm)
# 0 = maximum allowed by regulatory domain
tx_power = 0

# Beacon interval (milliseconds)
beacon_interval = 100

# DTIM period for power saving
dtim_period = 2

# RTS/CTS threshold (bytes, 0=disabled)
rts_threshold = 2347

# Fragmentation threshold (bytes)
fragmentation_threshold = 2346

# ============================================================================
# Security Configuration
# ============================================================================
[security]
# Security mode
# Valid values: "OPEN", "WEP", "WPA", "WPA2", "WPA3", "WPA2_WPA3_MIXED"
security_mode = "WPA2_WPA3_MIXED"

# WPA passphrase (8-63 characters)
# Can be overridden with ${WPA_PASSPHRASE}
wpa_passphrase = "${WPA_PASSPHRASE}"

# Key management
# Valid values: "WPA-PSK", "WPA-EAP", "SAE"
wpa_key_mgmt = "WPA-PSK SAE"

# WPA pairwise cipher
# Valid values: "TKIP", "CCMP", "CCMP TKIP"
wpa_pairwise = "CCMP"

# RSN pairwise cipher (for WPA2/WPA3)
rsn_pairwise = "CCMP"

# Management frame protection
# 0=disabled, 1=optional, 2=required
ieee80211w = 1

# Group key rekey interval (seconds)
wpa_group_rekey = 3600

# Pairwise key rekey interval (seconds, 0=disabled)
wpa_ptk_rekey = 0

# ============================================================================
# Enterprise Authentication (802.1X)
# ============================================================================
[enterprise_auth]
# Enable 802.1X authentication
enterprise_auth_enabled = false

# RADIUS server address
radius_server = ""

# RADIUS port (default 1812)
radius_port = 1812

# RADIUS shared secret
# Can be overridden with ${RADIUS_SECRET}
# radius_secret = "${RADIUS_SECRET}"

# Enable RADIUS accounting
radius_accounting_enabled = false

# Accounting server address
# radius_accounting_server = ""

# Accounting port (default 1813)
# radius_accounting_port = 1813

# Allowed EAP methods
# Valid values: "PEAP", "TTLS", "TLS", "FAST"
# eap_methods = ["PEAP", "TTLS"]

# ============================================================================
# Client Management
# ============================================================================
[client_management]
# Maximum total clients across all SSIDs
max_concurrent_clients = 100

# Idle timeout (seconds, 0=disabled)
client_timeout = 3600

# Disassociate clients with poor signal quality
disassoc_low_ack = true

# Global AP isolation (prevent client-to-client)
# Can be overridden per SSID
ap_isolate = false

# Enable WiFi Multimedia (QoS)
wmm_enabled = true

# Enable U-APSD power saving
uapsd_enabled = true

# ============================================================================
# DHCP Integration
# ============================================================================
[dhcp_integration]
# Integrate with SafeOps DHCP server
dhcp_integration_enabled = true

# DHCP server gRPC endpoint
# Can be overridden with ${DHCP_SERVER_ADDRESS}
dhcp_grpc_address = "127.0.0.1:50057"

# DHCP pool for WiFi clients
dhcp_pool_name = "WIFI_POOL"

# Custom DHCP options for WiFi clients
dhcp_options_override = {}

# Support static IP reservations by MAC
static_dhcp_enabled = true

# ============================================================================
# Captive Portal
# ============================================================================
[captive_portal]
# Enable captive portal (for guest network)
captive_portal_enabled = false

# Captive portal landing page URL
# portal_url = "http://portal.safeops.local"

# Redirect URL after authentication
# portal_redirect = "http://www.example.com"

# Require login/acceptance
# authentication_required = true

# Require terms of service acceptance
# terms_acceptance_required = true

# Guest session timeout (minutes)
# session_timeout = 240

# Bandwidth limit for guest users (Mbps)
# bandwidth_limit = 10

# ============================================================================
# Quality of Service
# ============================================================================
[qos]
# Enable QoS
qos_enabled = true

# QoS profiles
[[qos.qos_profiles]]
profile_name = "high_priority"
priority = 6  # WMM priority (0-7)
min_bandwidth = 10  # Mbps
max_bandwidth = 100
client_matcher = "SSID"
client_value = "SafeOps-Home"

[[qos.qos_profiles]]
profile_name = "guest_limited"
priority = 2
min_bandwidth = 1
max_bandwidth = 10
client_matcher = "SSID"
client_value = "SafeOps-Guest"

[[qos.qos_profiles]]
profile_name = "iot_limited"
priority = 1
min_bandwidth = 1
max_bandwidth = 5
client_matcher = "SSID"
client_value = "SafeOps-IoT"

# Enable airtime fairness
airtime_fairness = true

# ============================================================================
# Logging and Monitoring
# ============================================================================
[logging]
# Enable AP event logging
ap_logging_enabled = true

# AP-specific log level
# Valid values: "TRACE", "DEBUG", "INFO", "WARN", "ERROR"
log_level = "INFO"

# Log client associations
log_associations = true

# Log authentication attempts
log_authentications = true

# Log client disconnections
log_deauthentications = true

# Rate limit for high-volume events (events per minute)
log_rate_limit = 100

# Forward logs to syslog
syslog_forwarding = true

# Syslog server
syslog_server = "localhost:514"

# WiFi AP log file
wifi_log_file = "D:\\SafeOpsFV2\\logs\\wifi_ap.log"

# ============================================================================
# Advanced Settings
# ============================================================================
[advanced]
# BSS load announcement interval (seconds)
bss_load_update_period = 60

# HT capabilities (802.11n)
# [LDPC][HT40+][HT40-][GF][SHORT-GI-20][SHORT-GI-40]
ht_capab = "[HT40+][HT40-][SHORT-GI-20][SHORT-GI-40]"

# VHT capabilities (802.11ac)
# [MAX-MPDU-11454][RXLDPC][SHORT-GI-80][TX-STBC-2BY1][RX-STBC-1]
vht_capab = "[RXLDPC][SHORT-GI-80][TX-STBC-2BY1][RX-STBC-1]"

# HE capabilities (802.11ax/WiFi 6)
# he_capab = "[HE40+][HE40-][HE80]"

# Enable Automatic Channel Selection
acs_enabled = true

# Exclude DFS (radar) channels from ACS
acs_exclude_dfs = true

# Regulatory domain country code
# Can be overridden with ${COUNTRY_CODE}
# US, EU, JP, CN, etc.
country_code = "US"

# IEEE 802.11d (country info in beacons)
ieee80211d = true

# IEEE 802.11h (DFS and TPC)
ieee80211h = false

# ============================================================================
# Performance Tuning
# ============================================================================
[performance]
# Maximum frame aggregation size
max_num_sta = 100

# RX queue size
rx_queue_len = 1000

# TX queue size
tx_queue_len = 1000

# Enable hardware crypto acceleration
hw_crypto_enabled = true

# ============================================================================
# Statistics and Monitoring
# ============================================================================
[statistics]
# Enable statistics collection
statistics_enabled = true

# Statistics interval (seconds)
stats_interval = 60

# Metrics to track
track_metrics = [
    "clients_connected",
    "clients_authenticated",
    "tx_bytes",
    "rx_bytes",
    "tx_packets",
    "rx_packets",
    "signal_strength_avg",
    "channel_utilization"
]

# Export statistics via Prometheus
export_to_prometheus = true

# ============================================================================
# Environment Variable Overrides
# ============================================================================
# These settings can be overridden by environment variables:
#
# WIFI_INTERFACE - Override wireless interface name
# WPA_PASSPHRASE - WiFi password
# RADIUS_SECRET - RADIUS shared secret
# DHCP_SERVER_ADDRESS - DHCP server gRPC endpoint
# COUNTRY_CODE - Regulatory domain
#
# ============================================================================

# ============================================================================
# Configuration Validation
# ============================================================================
# The wifi_ap service validates this configuration at startup and will
# fail to start if validation fails. Common checks:
#
# 1. wireless_interface must exist and be a wireless interface
# 2. hostapd binary must exist and be executable
# 3. channel must be valid for frequency_band
# 4. security_mode should not be OPEN or WEP (insecure)
# 5. wpa_passphrase must be 8-63 characters for WPA/WPA2/WPA3
# 6. max_concurrent_clients within hardware capabilities
# 7. dhcp_grpc_address must be reachable if dhcp_integration_enabled
# 8. country_code must be valid ISO 3166-1 alpha-2
# 9. RADIUS server reachable if enterprise_auth_enabled
# 10. VLAN IDs must not conflict with other network segments
#
# SECURITY WARNING: Do not use OPEN or WEP security modes in production.
# Use WPA2_WPA3_MIXED or WPA3 for maximum security.
#
# Use the validator: safeops-cli config validate wifi_ap.toml
# ============================================================================
