# DNS Server Configuration
# All values have sensible defaults for Phase 1

[server]
# UDP/TCP bind address for DNS queries
bind_address = ":53"
# Enable TCP DNS (in addition to UDP)
enable_tcp = true

[cache]
# Maximum cache entries
max_size = 50000
# Default TTL for cached responses (seconds)
default_ttl = 300
# Cache cleanup interval
cleanup_interval = "60s"

[upstream]
# Upstream DNS servers for recursive resolution
servers = ["8.8.8.8:53", "1.1.1.1:53", "8.8.4.4:53"]
# Query timeout
timeout = "3s"
# Retry count per server
retries = 2

[authoritative]
# Enable authoritative zone handling
enabled = false  # Phase 1: disabled
# Zones this server is authoritative for
zones = ["safeops.local"]

[grpc]
# gRPC server address for DynamicUpdate()
address = "localhost:50053"
# Enable gRPC reflection for debugging
enable_reflection = true

[metrics]
# Prometheus metrics endpoint
address = ":9153"
# Metrics path
path = "/metrics"

[database]
# PostgreSQL connection (Phase 2+)
host = "localhost"
port = 5432
database = "safeops_network"
username = "dns_server"
# Password from environment: DNS_DB_PASSWORD

[logging]
# Log level: debug, info, warn, error
level = "info"
# Log format: json, text
format = "text"
