# SafeOps DNS Server Configuration
# Domain name resolution service with filtering, threat intelligence, and caching
#
# This service provides DNS resolution, DNS-based content filtering, threat
# intelligence integration, and caching for the SafeOps network.

# ============================================================================
# Service Configuration
# ============================================================================
[service]
# Service identifier for orchestrator registration
service_name = "dns_server"

# DNS listening addresses (UDP and TCP)
# Can be overridden with ${DNS_LISTEN_IP}
listen_addresses = ["0.0.0.0:53", "[::]:53"]

# DNS listening port (default 53)
listen_port = 53

# gRPC management API address
grpc_listen_address = "127.0.0.1:50056"

# Maximum simultaneous DNS queries
max_concurrent_queries = 10000

# Maximum time to wait for upstream response (seconds)
query_timeout = 5

# Self-health check frequency (seconds)
health_check_interval = 30

# Enable Prometheus metrics export
metrics_enabled = true
metrics_port = 9096

# ============================================================================
# Upstream Forwarders
# ============================================================================
# DNS servers to forward queries to

[[forwarders]]
server_address = "${UPSTREAM_DNS_1:-8.8.8.8}"
server_port = 53
protocol = "UDP"
priority = 1
timeout = 2
max_failures = 3
health_check_enabled = true
description = "Google Public DNS Primary"

[[forwarders]]
server_address = "${UPSTREAM_DNS_2:-8.8.4.4}"
server_port = 53
protocol = "UDP"
priority = 2
timeout = 2
max_failures = 3
health_check_enabled = true
description = "Google Public DNS Secondary"

[[forwarders]]
server_address = "1.1.1.1"
server_port = 53
protocol = "UDP"
priority = 3
timeout = 2
max_failures = 3
health_check_enabled = true
description = "Cloudflare DNS Primary"

[[forwarders]]
server_address = "1.0.0.1"
server_port = 53
protocol = "UDP"
priority = 4
timeout = 2
max_failures = 3
health_check_enabled = true
description = "Cloudflare DNS Secondary"

# Forwarder selection strategy
# Valid values: "PRIORITY", "ROUND_ROBIN", "FASTEST"
# PRIORITY: Use lowest priority first
# ROUND_ROBIN: Distribute evenly across forwarders
# FASTEST: Use forwarder with lowest response time
forwarder_selection = "PRIORITY"

# Send queries to multiple forwarders simultaneously
parallel_queries = false

# ============================================================================
# Caching Configuration
# ============================================================================
[caching]
# Enable DNS response caching
cache_enabled = true

# Maximum cache entries
cache_size = 100000

# Minimum TTL for cached records (seconds)
cache_min_ttl = 60

# Maximum TTL for cached records (seconds)
cache_max_ttl = 86400

# TTL for NXDOMAIN responses (seconds)
cache_negative_ttl = 600

# Refresh popular records before expiry
cache_prefetch_enabled = true

# Refresh when TTL below this percentage
cache_prefetch_threshold = 10

# Eviction strategy when full
# Valid values: "LRU", "LFU", "FIFO"
cache_eviction_policy = "LRU"

# Cache statistics tracking
cache_stats_enabled = true

# ============================================================================
# Domain Filtering
# ============================================================================
[filtering]
# Enable domain filtering
filtering_enabled = true

# Action for filtered domains
# Valid values: "BLOCK", "REDIRECT", "LOG_ONLY"
default_filter_action = "BLOCK"

# Response type for blocked queries
# Valid values: "NXDOMAIN", "REFUSED", "CUSTOM_IP"
block_response_type = "NXDOMAIN"

# IP to return for blocked domains (if CUSTOM_IP)
# block_redirect_ip = "0.0.0.0"

# Domain block list sources
[[filtering.filter_lists]]
list_name = "StevenBlack Unified Hosts"
list_url = "https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts"
list_format = "HOSTS"
enabled = true
update_interval = 24  # hours
categories = ["ads", "malware"]
description = "Comprehensive ad and malware blocking"

[[filtering.filter_lists]]
list_name = "Malware Domain List"
list_url = "https://www.malwaredomainlist.com/hostslist/hosts.txt"
list_format = "HOSTS"
enabled = true
update_interval = 12
categories = ["malware"]
description = "Malware domains"

[[filtering.filter_lists]]
list_name = "Phishing Database"
list_url = "https://phishing.army/download/phishing_army_blocklist.txt"
list_format = "DOMAINS"
enabled = true
update_interval = 6
categories = ["phishing"]
description = "Phishing domains"

# Domains to never filter (always allow)
whitelist_domains = [
    "microsoft.com",
    "google.com",
    "apple.com",
    "cloudflare.com",
    "safeops.local"
]

# Domains to always block
blacklist_domains = []

# Block list storage
blocklist_cache_dir = "D:\\SafeOpsFV2\\data\\dns\\blocklists"

# ============================================================================
# Threat Intelligence Integration
# ============================================================================
[threat_intel]
# Enable threat intelligence lookup
threat_intel_enabled = true

# threat_intel service gRPC endpoint
# Can be overridden with ${THREAT_INTEL_ENDPOINT}
threat_intel_grpc_address = "127.0.0.1:50054"

# Timeout for reputation queries (milliseconds)
threat_intel_timeout = 500

# Cache threat reputation results (seconds)
threat_intel_cache_ttl = 3600

# Minimum threat score to block (0-100)
threat_intel_min_score = 70

# Action for malicious domains
# Valid values: "BLOCK", "WARN", "LOG"
# BLOCK: Return NXDOMAIN or block IP
# WARN: Return result but log warning
# LOG: Log only, don't affect response
threat_intel_action = "BLOCK"

# Threat categories to check
threat_intel_categories = ["malware", "phishing", "c2", "dga"]

# ============================================================================
# DNSSEC Validation
# ============================================================================
[dnssec]
# Enable DNSSEC validation
dnssec_enabled = false

# Validation strictness
# Valid values: "STRICT", "PERMISSIVE", "DISABLED"
# STRICT: Reject all invalid signatures
# PERMISSIVE: Log validation failures but serve anyway
# DISABLED: No validation
dnssec_validation_mode = "STRICT"

# Trust anchor files
trust_anchors = [
    "D:\\SafeOpsFV2\\data\\dns\\root-trust-anchor.xml"
]

# Action for failed validation
# Valid values: "REFUSE", "SERVE_ANYWAY", "LOG"
dnssec_bogus_action = "REFUSE"

# Cache DNSSEC validation results
dnssec_cache_enabled = true

# ============================================================================
# Local DNS Records
# ============================================================================
# Locally-defined DNS zones and records

[[local_zones]]
zone_name = "local.lan"
zone_type = "AUTHORITATIVE"
description = "Internal network zone"

[[local_zones.records]]
name = "gateway"
type = "A"
ttl = 3600
value = "192.168.1.1"

[[local_zones.records]]
name = "nas"
type = "A"
ttl = 3600
value = "192.168.1.10"

[[local_zones.records]]
name = "printer"
type = "A"
ttl = 3600
value = "192.168.1.20"

[[local_zones]]
zone_name = "safeops.local"
zone_type = "AUTHORITATIVE"
description = "SafeOps services zone"

[[local_zones.records]]
name = "orchestrator"
type = "A"
ttl = 300
value = "127.0.0.1"

[[local_zones.records]]
name = "firewall"
type = "A"
ttl = 300
value = "127.0.0.1"

# ============================================================================
# Query Logging
# ============================================================================
[query_logging]
# Log all DNS queries
query_logging_enabled = true

# Log queries that returned results
log_successful_queries = true

# Log queries that failed or were blocked
log_failed_queries = true

# Detail level
# Valid values: "MINIMAL", "STANDARD", "VERBOSE"
log_detail_level = "STANDARD"

# Log destination
# Valid values: "FILE", "DATABASE", "GRPC"
log_destination = "FILE"

# network_logger service endpoint (if using GRPC)
# logger_grpc_address = "127.0.0.1:50052"

# Log file path
log_file_path = "D:\\SafeOpsFV2\\logs\\dns_queries.log"

# Maximum log file size before rotation (MB)
log_rotation_size = 100

# Days to retain query logs
log_retention_days = 30

# Log format
# Valid values: "TEXT", "JSON", "CSV"
log_format = "JSON"

# ============================================================================
# Performance Tuning
# ============================================================================
[performance]
# Number of query processing threads
# 0 = auto-detect (CPU cores)
worker_threads = 0

# UDP socket buffer size (bytes)
udp_buffer_size = 65536

# Maximum concurrent TCP DNS connections
tcp_max_connections = 100

# Enable per-client query rate limiting
rate_limiting_enabled = true

# Maximum queries per second per client
rate_limit_qps = 100

# Burst allowance for rate limiting
rate_limit_burst = 50

# Query queue size
query_queue_size = 10000

# ============================================================================
# Response Policy Zones (RPZ)
# ============================================================================
[rpz]
# Enable response policy zones
rpz_enabled = false

# RPZ zone definitions
# [[rpz.zones]]
# zone_name = "rpz.example.com"
# zone_source = "https://example.com/rpz.zone"
# priority = 1
# action = "NXDOMAIN"
# update_interval = 24  # hours

# ============================================================================
# Advanced Settings
# ============================================================================
[advanced]
# Enable EDNS0 (Extension Mechanisms for DNS)
edns0_enabled = true

# EDNS0 UDP payload size
edns0_udp_size = 4096

# Enable DNS-over-TLS for upstream queries
dot_enabled = false

# DoT upstream servers
# dot_servers = ["dns.google:853", "cloudflare-dns.com:853"]

# Enable DNS-over-HTTPS for upstream queries
doh_enabled = false

# DoH upstream servers
# doh_servers = ["https://dns.google/dns-query", "https://cloudflare-dns.com/dns-query"]

# Minimum response TTL (override upstream)
min_response_ttl = 10

# Maximum response TTL (override upstream)
max_response_ttl = 86400

# Stale cache serving (serve expired cache during outage)
serve_stale_enabled = true
serve_stale_ttl = 3600

# ============================================================================
# Statistics and Monitoring
# ============================================================================
[statistics]
# Enable statistics collection
statistics_enabled = true

# Statistics interval (seconds)
stats_interval = 60

# Metrics to track
track_metrics = [
    "queries_total",
    "queries_blocked",
    "cache_hits",
    "cache_misses",
    "forwarder_errors",
    "response_time_avg"
]

# Export statistics via Prometheus
export_to_prometheus = true

# ============================================================================
# Environment Variable Overrides
# ============================================================================
# These settings can be overridden by environment variables:
#
# DNS_LISTEN_IP - Override DNS server listen address
# UPSTREAM_DNS_1 - Primary upstream DNS server
# UPSTREAM_DNS_2 - Secondary upstream DNS server
# THREAT_INTEL_ENDPOINT - Threat intelligence service gRPC address
# BLOCK_LISTS_DIR - Directory for downloaded block lists
#
# ============================================================================

# ============================================================================
# Configuration Validation
# ============================================================================
# The dns_server service validates this configuration at startup and will
# fail to start if validation fails. Common checks:
#
# 1. At least one upstream forwarder must be defined
# 2. listen_addresses must bind to valid interfaces
# 3. cache_size must be positive
# 4. threat_intel_grpc_address must be reachable if enabled
# 5. filter_lists URLs must be accessible
# 6. DNSSEC trust anchors must exist if dnssec_enabled
# 7. Log directory must be writable
# 8. worker_threads must be positive after auto-detection
# 9. Local zone records must have valid IP addresses
# 10. Rate limit values must be reasonable
#
# Use the validator: safeops-cli config validate dns_server.toml
# ============================================================================
