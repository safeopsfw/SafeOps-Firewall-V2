# SafeOps DNS Server Configuration
# Purpose: DNS forwarding, caching, filtering, and logging

# =============================================================================
# SERVICE CONFIGURATION
# =============================================================================
[service]
name = "dns_server"
listen_address = "0.0.0.0"
grpc_port = 50056

# DNS listening ports
dns_port = 53
dns_over_tls_port = 853
dns_over_https_port = 443

log_level = "info"
log_file = "C:\\ProgramData\\SafeOps\\logs\\dns_server.log"

# =============================================================================
# DNS FORWARDING
# =============================================================================
[forwarding]
# Upstream DNS servers
upstream_servers = [
    "1.1.1.1",      # Cloudflare
    "1.0.0.1",      # Cloudflare secondary
    "8.8.8.8",      # Google
    "8.8.4.4",      # Google secondary
]

# Forwarding strategy
strategy = "fastest"  # fastest, round_robin, sequential

# Timeouts
query_timeout_seconds = 5
upstream_timeout_seconds = 3

# Retry logic
max_retries = 2
retry_delay_milliseconds = 100

# Protocol preferences
prefer_ipv6 = false
use_tcp_fallback = true

# =============================================================================
# DNS CACHE
# =============================================================================
[cache]
enabled = true

# Cache sizing
max_cache_size = 100000  # 100K entries
max_cache_memory_mb = 256

# TTL settings
min_ttl_seconds = 60
max_ttl_seconds = 86400  # 24 hours
negative_ttl_seconds = 300  # 5 minutes

# Cache strategy
eviction_policy = "lru"
prefetch_expiring = true
prefetch_threshold_seconds = 300

# Redis cache backend
redis_enabled = true
redis_host = "localhost"
redis_port = 6379
redis_db = 3

# =============================================================================
# DNS FILTERING
# =============================================================================
[filtering]
enabled = true

# Blocklists
blocklist_enabled = true
blocklist_file = "C:\\ProgramData\\SafeOps\\dns\\blocklist.txt"

# Allowlist (whitelist)
allowlist_enabled = true
allowlist_file = "C:\\ProgramData\\SafeOps\\dns\\allowlist.txt"

# Domain categories to block
block_malware = true
block_phishing = true
block_adult = false
block_gambling = false
block_social_media = false
block_advertising = false

# Integration with threat intel
threat_intel_enabled = true
threat_intel_grpc = "localhost:50055"
threat_intel_cache_ttl = 3600

# Response for blocked domains
blocked_response = "nxdomain"  # nxdomain, refused, custom_ip
custom_block_ip = "0.0.0.0"

# =============================================================================
# DNS LOGGING
# =============================================================================
[logging]
# Query logging
log_queries = true
log_responses = true
log_blocked = true

# Database logging
database_logging = true
postgres_host = "localhost"
postgres_port = 5432
postgres_database = "safeops"
postgres_user = "safeops"

# Bulk insert
bulk_insert_enabled = true
bulk_insert_batch_size = 1000
bulk_insert_interval_seconds = 10

# What to log
log_client_ip = true
log_query_type = true
log_query_domain = true
log_response_ip = true
log_response_ttl = true
log_response_time_ms = true

# SIEM integration
siem_enabled = true
siem_endpoint = "tcp://siem.local:514"
siem_format = "json"

# =============================================================================
# DNS SECURITY
# =============================================================================
[security]
# DNSSEC validation
dnssec_enabled = true
dnssec_validate = true

# DNS over TLS (DoT)
dot_enabled = true
dot_certificate = "C:\\Program Files\\SafeOps\\certs\\dns-server.crt"
dot_private_key = "C:\\Program Files\\SafeOps\\certs\\dns-server.key"

# DNS over HTTPS (DoH)
doh_enabled = true
doh_path = "/dns-query"

# Rate limiting
rate_limit_enabled = true
rate_limit_queries_per_second = 100
rate_limit_per_client = 10

# DDoS protection
max_concurrent_queries = 10000
query_timeout_seconds = 5

# =============================================================================
# ADVANCED FEATURES
# =============================================================================
[advanced]
# DNS rebinding protection
rebinding_protection = true

# Split DNS (different answers for internal/external)
split_dns_enabled = false
internal_zones = ["internal.local", "lan"]

# Custom DNS records
custom_records_file = "C:\\ProgramData\\SafeOps\\dns\\custom_records.yaml"

# Wildcard blocking
wildcard_blocking = true

# IDN (Internationalized Domain Names) handling
idn_support = true
idn_punycode = true

# =============================================================================
# PERFORMANCE TUNING
# =============================================================================
[performance]
# Worker threads
worker_threads = 4

# Buffer sizes
udp_buffer_size = 4096
tcp_buffer_size = 65535

# Connection limits
max_tcp_connections = 1000
tcp_idle_timeout_seconds = 30

# CPU affinity
pin_to_cores = [10, 11, 12, 13]
