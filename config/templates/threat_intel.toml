# SafeOps Threat Intelligence Service Configuration
# Purpose: Feed management, reputation scoring, and threat data aggregation

# =============================================================================
# SERVICE CONFIGURATION
# =============================================================================
[service]
name = "threat_intel"
description = "Threat Intelligence Feed Manager"
listen_address = "0.0.0.0"
grpc_port = 50055
http_port = 8055
log_level = "info"  # trace, debug, info, warn, error
log_format = "json"  # json, text
log_file = "C:\\ProgramData\\SafeOps\\logs\\threat_intel.log"
max_log_size_mb = 100
max_log_files = 10

# =============================================================================
# DATABASE CONFIGURATION
# =============================================================================
[database]
postgres_host = "localhost"
postgres_port = 5432
postgres_database = "safeops_threatintel"
postgres_user = "safeops"
postgres_password = "${POSTGRES_PASSWORD}"  # Environment variable
postgres_pool_min = 5
postgres_pool_max = 20
postgres_connect_timeout_seconds = 30
postgres_statement_timeout_seconds = 60
postgres_idle_timeout_seconds = 600

# =============================================================================
# REDIS CACHE CONFIGURATION
# =============================================================================
[redis]
host = "localhost"
port = 6379
database = 0
password = "${REDIS_PASSWORD}"
pool_size = 50
connection_timeout_seconds = 5
read_timeout_seconds = 3
write_timeout_seconds = 3

# =============================================================================
# CACHE SETTINGS
# =============================================================================
[cache]
# Memory cache (in-process)
memory_cache_enabled = true
memory_cache_size_mb = 1024
memory_cache_ttl_seconds = 3600

# Redis cache
redis_cache_enabled = true
redis_cache_ttl_seconds = 7200

# Cache eviction policy
eviction_policy = "lru"  # lru, lfu, random

# Bloom filter for fast negative lookups
bloom_filter_enabled = true
bloom_filter_expected_items = 10000000
bloom_filter_false_positive_rate = 0.01
bloom_filter_rebuild_on_startup = false

# =============================================================================
# THREAT FEED CONFIGURATION
# =============================================================================
[feeds]
sources_file = "config/examples/threat_feed_sources.yaml"
download_directory = "C:\\ProgramData\\SafeOps\\threat_intel\\downloads"
download_timeout_seconds = 300
max_retries = 3
retry_delay_seconds = 60
concurrent_downloads = 5
verify_ssl = true
user_agent = "SafeOps-ThreatIntel/2.0"

# Rate limiting for API-based feeds
rate_limit_enabled = true
rate_limit_requests_per_minute = 60

# =============================================================================
# UPDATE SCHEDULE
# =============================================================================
[updates]
auto_update_enabled = true
update_on_startup = true

# Cron-style schedule (every 6 hours)
update_schedule = "0 */6 * * *"

# Feed-specific intervals (overrides global schedule)
[updates.intervals]
critical_feeds_hours = 1      # High-priority feeds
standard_feeds_hours = 6      # Normal feeds
low_priority_feeds_hours = 24 # Slow-changing feeds
geoip_feeds_days = 7          # GeoIP databases

# =============================================================================
# REPUTATION SCORING
# =============================================================================
[reputation]
# Scoring weights (must total 100)
weight_recency = 40        # How recent the threat was seen
weight_sources = 30        # Number of sources reporting it
weight_severity = 20       # Severity of the threat category
weight_frequency = 10      # How often it appears

# Score thresholds (0-100, lower = more malicious)
threshold_clean = 20
threshold_suspicious = 50
threshold_malicious = 80
threshold_critical = 95

# Auto-blocking thresholds
auto_block_score = 90
auto_block_confidence = "high"  # confirmed, high, medium, low

# =============================================================================
# DATA RETENTION
# =============================================================================
[retention]
# IOC retention policies
ioc_matches_days = 90
reputation_history_days = 365
feed_history_days = 365

# Cleanup schedule
cleanup_schedule = "0 2 * * *"  # Daily at 2 AM
cleanup_batch_size = 10000

# Archive old data instead of deleting
archive_enabled = false
archive_path = "C:\\ProgramData\\SafeOps\\threat_intel\\archive"

# =============================================================================
# PERFORMANCE TUNING
# =============================================================================
[performance]
# Worker threads
worker_threads = 8

# Bulk insert batch sizes
ip_batch_size = 10000
domain_batch_size = 5000
hash_batch_size = 5000
ioc_batch_size = 10000

# Query optimization
enable_query_cache = true
query_cache_size_mb = 512
max_query_results = 10000

# Connection pooling
db_pool_timeout_seconds = 30

# =============================================================================
# MONITORING & METRICS
# =============================================================================
[monitoring]
metrics_enabled = true
metrics_port = 9055
metrics_path = "/metrics"

# Health check endpoint
health_check_enabled = true
health_check_port = 8055
health_check_path = "/health"

# Alerts
alert_on_feed_failure = true
alert_threshold_consecutive_failures = 3
