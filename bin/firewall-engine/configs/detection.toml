[DDoS]
Enabled = true
SYNRateThreshold = 1000
UDPRateThreshold = 5000
ICMPRateThreshold = 100
ConnectionRatioThreshold = 0.01
BanDurationMinutes = 30
MaxBanDurationHours = 720
EscalationMultiplier = 4
WindowSeconds = 10

[RateLimit]
Enabled = true
DefaultRate = 1000
BurstSize = 2000
GlobalRate = 100000
CleanupIntervalSeconds = 60

[BruteForce]
Enabled = true
WindowSeconds = 120

[BruteForce.Services.ssh]
Port = 22
MaxFailures = 5
WindowSeconds = 120

[BruteForce.Services.ftp]
Port = 21
MaxFailures = 5
WindowSeconds = 120

[BruteForce.Services.rdp]
Port = 3389
MaxFailures = 3
WindowSeconds = 60

[BruteForce.Services.smtp]
Port = 25
MaxFailures = 3
WindowSeconds = 300

[BruteForce.Services.mysql]
Port = 3306
MaxFailures = 3
WindowSeconds = 60

[BruteForce.Services.postgres]
Port = 5432
MaxFailures = 3
WindowSeconds = 60

[BruteForce.Services.mssql]
Port = 1433
MaxFailures = 3
WindowSeconds = 60

[PortScan]
Enabled = true
PortThreshold = 100
WindowSeconds = 10
BanDurationMinutes = 15
SequentialThreshold = 20

[Baseline]
Enabled = true
WindowMinutes = 60
DeviationThreshold = 3
WarmupMinutes = 10
UpdateIntervalSeconds = 10

