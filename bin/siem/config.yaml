# SafeOps SIEM Integration Configuration
# ES + Kibana only — Logstash replaced by SIEM Forwarder (Go binary)

installation:
  install_dir: "siem"
  temp_dir: "siem\\temp"
  data_dir: "siem\\data"
  logs_dir: "siem\\logs"

# Elasticsearch + Kibana Configuration
elk_stack:
  elasticsearch:
    version: "8.11.3"
    download_url: "https://artifacts.elastic.co/downloads/elasticsearch/elasticsearch-8.11.3-windows-x86_64.zip"
    port: 9200
    heap_size: "512m"

  kibana:
    version: "8.11.3"
    download_url: "https://artifacts.elastic.co/downloads/kibana/kibana-8.11.3-windows-x86_64.zip"
    port: 5601

# Credentials (default - local dev only)
credentials:
  elasticsearch_username: "elastic"
  elasticsearch_password: "SafeOps2026!"
  kibana_encryption_key: "SafeOpsKibana2026SecretKey123456"

# SafeOps Integration
safeops_integration:
  # SIEM Forwarder tails these JSONL files and ships to ES
  log_sources:
    - "..\\logs\\firewall.jsonl"
    - "..\\logs\\ids_ips.jsonl"
    - "..\\logs\\netflow\\east_west.jsonl"
    - "..\\logs\\netflow\\north_south.jsonl"

  # ES index names (clean, no safeops- prefix)
  index_patterns:
    - "firewall-*"
    - "ids-*"
    - "east-west-*"
    - "north-south-*"

# Windows Service Configuration
windows_service:
  create_services: true
  auto_start: true
  elasticsearch_service: "elasticsearch-service-x64"
