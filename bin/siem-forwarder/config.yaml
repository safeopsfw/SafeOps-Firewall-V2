# SIEM Log Forwarder Configuration
# Updated for SafeOps v2 JSONL log format

elasticsearch:
  hosts:
    - "http://127.0.0.1:9200"
  # username: "elastic"
  # password: "changeme"
  bulk_size: 500          # Number of documents per bulk request
  flush_interval: 5s      # Flush interval when bulk_size not reached

# Base path for SafeOps logs (relative to exe directory)
log_base_path: "../logs"

# Log files to monitor and forward to SIEM
# All files are JSONL format (one JSON object per line)
log_files:
  # Firewall decision logs (ALLOW/DROP/BLOCK with GeoIP, community_id)
  - path: "firewall.jsonl"
    index_prefix: "firewall"
    type: "firewall"

  # IDS/IPS alerts (DNS, HTTP, TLS metadata)
  - path: "ids_ips.jsonl"
    index_prefix: "ids"
    type: "ids"

  # Network Flow Logs - East/West (internal LAN traffic)
  - path: "netflow/east_west.jsonl"
    index_prefix: "east-west"
    type: "netflow_eastwest"

  # Network Flow Logs - North/South (external WAN traffic)
  - path: "netflow/north_south.jsonl"
    index_prefix: "north-south"
    type: "netflow_northsouth"

# Data retention: auto-delete Elasticsearch indices older than this
retention:
  enabled: true
  max_days: 14            # Delete indices older than 14 days
  check_interval: 6h      # How often to check for expired indices

# Position tracking settings
position_db:
  path: "data/positions.json"
  save_interval: 10s

# Performance settings
tailer:
  poll_interval: 500ms     # How often to check for new lines
  max_line_size: 1048576   # 1MB max line size
