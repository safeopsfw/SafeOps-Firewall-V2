# SIEM Log Forwarder Configuration

elasticsearch:
  hosts:
    - "http://127.0.0.1:9200"
  # username: "elastic"
  # password: "changeme"
  bulk_size: 500          # Number of documents per bulk request
  flush_interval: 5s      # Flush interval when bulk_size not reached

# Base path for SafeOps logs
log_base_path: "../logs"

# Log files to monitor and forward
log_files:
  # Network Flow Logs - East/West (internal) traffic
  - path: "netflow/east_west.log"
    index_prefix: "safeops-netflow-eastwest"
    type: "netflow_eastwest"
    
  # Network Flow Logs - North/South (external) traffic
  - path: "netflow/north_south.log"
    index_prefix: "safeops-netflow-northsouth"
    type: "netflow_northsouth"
    
  # Network Flow Logs - Unknown/Other traffic
  - path: "netflow/unknown.log"
    index_prefix: "safeops-netflow-unknown"
    type: "netflow_unknown"
    
  # Firewall events
  - path: "firewall.log"
    index_prefix: "safeops-firewall"
    type: "firewall"
    
  # IDS alerts
  - path: "ids.log"
    index_prefix: "safeops-ids"
    type: "ids"
    
  # Removed: devices.jsonl - Device tracking logs not needed in SIEM (causes spam)

# Position tracking settings
position_db:
  path: "data/positions.json"
  save_interval: 10s

# Performance settings
tailer:
  poll_interval: 500ms     # How often to check for new lines
  max_line_size: 1048576   # 1MB max line size
