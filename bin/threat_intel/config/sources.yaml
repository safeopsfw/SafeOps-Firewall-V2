# ============================================================================
# SafeOps Threat Intelligence Feed Sources (Curated)
# ============================================================================
# Only high-accuracy, verified feeds. Each feed has a priority 1-5:
#   5 = Critical (C2, botnet)    → threat_score 90-100
#   4 = High (malware, exploits) → threat_score 70-89
#   3 = Medium (compromised IPs) → threat_score 50-69
#   2 = Low (phishing, tor)      → threat_score 30-49
#   1 = Info (geo, ASN)          → enrichment only
#
# Reconciliation: Each run compares feed data vs DB.
#   - New IOCs → INSERT
#   - Existing IOCs → UPDATE last_seen
#   - Missing from feed → DELETE (per-source)
# ============================================================================

feeds:
  # ==========================================================================
  # PRIORITY 5 — CRITICAL (C2 / Botnet)
  # ==========================================================================

  - name: "Feodo Tracker"
    category: "ip_blacklist"
    url: "https://feodotracker.abuse.ch/downloads/ipblocklist.csv"
    format: "csv"
    enabled: true
    priority: 5
    update_frequency: 3600
    description: "Botnet C2 IPs (Dridex, Emotet, TrickBot, QakBot)"

  - name: "SSL IP Blacklist"
    category: "ip_blacklist"
    url: "https://sslbl.abuse.ch/blacklist/sslipblacklist.csv"
    format: "csv"
    enabled: false
    priority: 5
    update_frequency: 3600
    description: "DEPRECATED Jan 2025 — abuse.ch discontinued this list"

  - name: "SSL Cert Blacklist"
    category: "ssl_cert"
    url: "https://sslbl.abuse.ch/blacklist/sslblacklist.csv"
    format: "csv"
    enabled: true
    priority: 5
    update_frequency: 3600
    description: "Malicious SSL certificate SHA1 fingerprints (C2, botnet)"

  # ==========================================================================
  # PRIORITY 4 — HIGH (Malware / Active Threats)
  # ==========================================================================

  - name: "URLhaus Recent"
    category: "ioc"
    url: "https://urlhaus.abuse.ch/downloads/csv_recent/"
    format: "csv"
    enabled: true
    priority: 4
    update_frequency: 3600
    description: "Recent malware distribution URLs (contains IPs + domains mixed)"

  - name: "ThreatFox Recent"
    category: "domain"
    url: "https://threatfox.abuse.ch/export/csv/recent/"
    format: "csv"
    enabled: true
    priority: 4
    update_frequency: 3600
    description: "Recent IOCs — domains, IPs, URLs from malware campaigns"

  - name: "MalwareBazaar Recent"
    category: "hash"
    url: "https://bazaar.abuse.ch/export/csv/recent/"
    format: "csv"
    enabled: true
    priority: 4
    update_frequency: 3600
    description: "Recent malware sample hashes (SHA256, MD5)"

  # ==========================================================================
  # PRIORITY 3 — MEDIUM (Compromised / Blacklisted)
  # ==========================================================================

  - name: "EmergingThreats Compromised IPs"
    category: "ip_blacklist"
    url: "https://rules.emergingthreats.net/blockrules/compromised-ips.txt"
    format: "txt"
    enabled: true
    priority: 3
    update_frequency: 3600
    description: "Compromised IPs from Proofpoint Emerging Threats"

  - name: "FireHOL Level 1"
    category: "ip_blacklist"
    url: "https://raw.githubusercontent.com/firehol/blocklist-ipsets/master/firehol_level1.netset"
    format: "txt"
    enabled: true
    priority: 3
    update_frequency: 86400
    description: "FireHOL Level 1 — high confidence aggregated blacklist"

  # ==========================================================================
  # PRIORITY 2 — LOW (Phishing / Anonymization)
  # ==========================================================================

  - name: "Tor Exit Nodes"
    category: "ip_anonymization"
    url: "https://check.torproject.org/exit-addresses"
    format: "txt"
    enabled: true
    priority: 2
    update_frequency: 3600
    description: "Official Tor Project exit node list"

  - name: "OpenPhish"
    category: "domain"
    url: "https://openphish.com/feed.txt"
    format: "txt"
    enabled: false
    priority: 2
    update_frequency: 3600
    description: "DISABLED — returns 302 redirect, free feed may be discontinued"

  # ==========================================================================
  # PRIORITY 1 — INFO (Enrichment / GeoIP)
  # ==========================================================================

  - name: "IPtoASN"
    category: "ip_geo"
    url: "https://iptoasn.com/data/ip2asn-v4.tsv.gz"
    format: "tsv"
    enabled: true
    priority: 1
    update_frequency: 86400
    description: "IP to ASN and country mapping"

  - name: "GeoLite2-Country"
    category: "ip_geo"
    url: "https://gitlab.com/tdulcet/ip-geolocation-dbs/-/raw/main/geolite2-country/ipv4.tsv?inline=false"
    format: "tsv"
    enabled: true
    priority: 1
    update_frequency: 86400
    description: "MaxMind GeoLite2 IP to country mapping"

# ==========================================================================
# Parser Configuration
# ==========================================================================
parser_config:
  csv:
    default_delimiter: ","
    skip_header: true
    comment_char: "#"

  txt:
    comment_chars: ["#", "//", ";"]
    trim_whitespace: true

  json:
    validate_schema: true

  tsv:
    delimiter: "\t"
    skip_header: false
