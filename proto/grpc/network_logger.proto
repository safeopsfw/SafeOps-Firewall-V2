syntax = "proto3";

// Package and Imports
package safeops.network_logger;

import "common.proto";

option go_package = "safeops/build/proto/go/network_logger";

// ============================================================================
// SERVICE DEFINITION
// ============================================================================

// Network Logger Service - Centralized logging sink for all network events
service NetworkLoggerService {
  // Logging Methods
  rpc LogPacket(LogPacketRequest) returns (LogResponse);
  rpc LogConnection(LogConnectionRequest) returns (LogResponse);
  rpc LogDNSQuery(LogDNSQueryRequest) returns (LogResponse);
  rpc LogHTTPRequest(LogHTTPRequestRequest) returns (LogResponse);
  rpc BulkLog(BulkLogRequest) returns (BulkLogResponse);
  
  // Query Methods
  rpc QueryLogs(QueryLogsRequest) returns (LogQueryResponse);
  rpc SearchLogs(SearchLogsRequest) returns (LogQueryResponse);
  rpc GetLogsByConnection(GetLogsByConnectionRequest) returns (LogQueryResponse);
  rpc GetLogsByIP(GetLogsByIPRequest) returns (LogQueryResponse);
  
  // Stream Methods
  rpc StreamLogs(StreamLogsRequest) returns (stream LogEntry);
  rpc TailLogs(TailLogsRequest) returns (stream LogEntry);
  
  // Retention Methods
  rpc SetRetentionPolicy(RetentionPolicyRequest) returns (RetentionPolicyResponse);
  rpc GetRetentionPolicy(GetRetentionPolicyRequest) returns (RetentionPolicyResponse);
  rpc PurgeLogs(PurgeLogsRequest) returns (PurgeLogsResponse);
  
  // Statistics Methods
  rpc GetLogStats(LogStatsRequest) returns (LogStatsResponse);
  rpc GetStorageStats(StorageStatsRequest) returns (StorageStatsResponse);
  
  // Export Methods
  rpc ExportLogs(ExportLogsRequest) returns (ExportResponse);
  rpc ScheduleExport(ScheduleExportRequest) returns (ExportResponse);
}

// ============================================================================
// ENUMERATIONS
// ============================================================================

// Log type
enum LogType {
  LOG_TYPE_UNKNOWN = 0;
  LOG_TYPE_PACKET = 1;
  LOG_TYPE_CONNECTION = 2;
  LOG_TYPE_DNS_QUERY = 3;
  LOG_TYPE_HTTP_REQUEST = 4;
  LOG_TYPE_FIREWALL_EVENT = 5;
  LOG_TYPE_IDS_ALERT = 6;
  LOG_TYPE_DHCP_LEASE = 7;
  LOG_TYPE_TLS_HANDSHAKE = 8;
  LOG_TYPE_WIFI_EVENT = 9;
}

// Export format
enum ExportFormat {
  EXPORT_FORMAT_UNKNOWN = 0;
  EXPORT_FORMAT_PCAP = 1;
  EXPORT_FORMAT_JSON = 2;
  EXPORT_FORMAT_CSV = 3;
  EXPORT_FORMAT_SYSLOG = 4;
  EXPORT_FORMAT_CEF = 5;
}

// Compression algorithm
enum CompressionAlgorithm {
  COMPRESSION_NONE = 0;
  COMPRESSION_GZIP = 1;
  COMPRESSION_ZSTD = 2;
  COMPRESSION_LZ4 = 3;
}

// Traffic direction
enum TrafficDirection {
  DIRECTION_UNKNOWN = 0;
  DIRECTION_SOURCE = 1;
  DIRECTION_DEST = 2;
  DIRECTION_BOTH = 3;
}

// Log severity
enum LogSeverity {
  SEVERITY_UNKNOWN = 0;
  SEVERITY_INFO = 1;
  SEVERITY_WARNING = 2;
  SEVERITY_ERROR = 3;
  SEVERITY_CRITICAL = 4;
}

// ============================================================================
// REQUEST MESSAGES - LOGGING METHODS
// ============================================================================

// Log packet request
message LogPacketRequest {
  common.Timestamp timestamp = 1;                // Packet timestamp
  common.IPAddress source_ip = 2;                // Source IP
  common.IPAddress dest_ip = 3;                  // Destination IP
  uint32 source_port = 4;                        // Source port
  uint32 dest_port = 5;                          // Destination port
  common.Protocol protocol = 6;                  // Protocol
  uint32 packet_size = 7;                        // Packet size in bytes
  string flags = 8;                              // TCP flags
  string payload_hash = 9;                       // SHA256 hash of payload
  string interface_name = 10;                    // Network interface
}

// Log connection request
message LogConnectionRequest {
  string connection_id = 1;                      // Unique connection ID
  common.Timestamp start_time = 2;               // Connection start
  common.Timestamp end_time = 3;                 // Connection end
  common.IPAddress source_ip = 4;                // Source IP
  common.IPAddress dest_ip = 5;                  // Destination IP
  uint32 source_port = 6;                        // Source port
  uint32 dest_port = 7;                          // Destination port
  common.Protocol protocol = 8;                  // Protocol
  uint64 bytes_sent = 9;                         // Bytes sent
  uint64 bytes_received = 10;                    // Bytes received
  uint64 packets_sent = 11;                      // Packets sent
  uint64 packets_received = 12;                  // Packets received
  string termination_reason = 13;                // Why connection ended
}

// Log DNS query request
message LogDNSQueryRequest {
  common.Timestamp timestamp = 1;                // Query timestamp
  common.IPAddress client_ip = 2;                // Client IP
  string query_domain = 3;                       // Queried domain
  string query_type = 4;                         // DNS query type (A/AAAA/MX)
  uint32 response_code = 5;                      // DNS response code
  repeated string response_ips = 6;              // Resolved IP addresses
  uint32 response_time_ms = 7;                   // Response time in ms
}

// Log HTTP request
message LogHTTPRequestRequest {
  common.Timestamp timestamp = 1;                // Request timestamp
  common.IPAddress client_ip = 2;                // Client IP
  string method = 3;                             // HTTP method (GET/POST)
  string host = 4;                               // Host header
  string path = 5;                               // Request path
  string user_agent = 6;                         // User-Agent header
  uint32 status_code = 7;                        // HTTP status code
  uint64 bytes_transferred = 8;                  // Bytes transferred
  uint32 duration_ms = 9;                        // Request duration in ms
}

// Bulk log request
message BulkLogRequest {
  repeated LogEntry log_entries = 1;             // Log entries (up to 10,000)
  string batch_id = 2;                           // Batch identifier
}

// ============================================================================
// REQUEST MESSAGES - QUERY METHODS
// ============================================================================

// Query logs request
message QueryLogsRequest {
  common.Timestamp start_time = 1;               // Start of time range
  common.Timestamp end_time = 2;                 // End of time range
  common.IPAddress source_ip = 3;                // Filter by source IP
  common.IPAddress dest_ip = 4;                  // Filter by destination IP
  common.Protocol protocol = 5;                  // Filter by protocol
  uint32 port = 6;                               // Filter by port
  LogType log_type = 7;                          // Filter by log type
  uint32 limit = 8;                              // Max results
  uint32 offset = 9;                             // Pagination offset
}

// Search logs request
message SearchLogsRequest {
  string search_term = 1;                        // Search term
  repeated string fields_to_search = 2;          // Fields (IP/DOMAIN/PORT)
  common.Timestamp start_time = 3;               // Start of time range
  common.Timestamp end_time = 4;                 // End of time range
  common.Pagination pagination = 5;              // Pagination
}

// Get logs by connection request
message GetLogsByConnectionRequest {
  string connection_id = 1;                      // Connection ID
}

// Get logs by IP request
message GetLogsByIPRequest {
  common.IPAddress ip_address = 1;               // IP address to query
  TrafficDirection direction = 2;                // Direction filter
  common.Timestamp start_time = 3;               // Start of time range
  common.Timestamp end_time = 4;                 // End of time range
  common.Pagination pagination = 5;              // Pagination
}

// ============================================================================
// REQUEST MESSAGES - STREAM METHODS
// ============================================================================

// Stream logs request
message StreamLogsRequest {
  LogType log_type = 1;                          // Filter by log type
  LogSeverity min_severity = 2;                  // Minimum severity
  common.IPAddress ip_filter = 3;                // Optional IP filter
}

// Tail logs request
message TailLogsRequest {
  uint32 tail_lines = 1;                         // Number of recent lines
  bool follow = 2;                               // Follow like tail -f
  LogType log_type = 3;                          // Filter by log type
}

// ============================================================================
// REQUEST MESSAGES - RETENTION METHODS
// ============================================================================

// Retention policy request
message RetentionPolicyRequest {
  LogType log_type = 1;                          // Log type
  uint32 retention_days = 2;                     // Days to retain
  bool compression_enabled = 3;                  // Enable compression
  uint32 archive_after_days = 4;                 // Days before archiving
  CompressionAlgorithm compression_algo = 5;     // Compression algorithm
  string archive_location = 6;                   // Archive path/URL
}

// Get retention policy request
message GetRetentionPolicyRequest {
  LogType log_type = 1;                          // Log type to query
}

// Purge logs request
message PurgeLogsRequest {
  uint32 older_than_days = 1;                    // Purge logs older than this
  repeated LogType log_types = 2;                // Log types to purge
  bool dry_run = 3;                              // Dry run mode
}

// ============================================================================
// REQUEST MESSAGES - STATISTICS & EXPORT
// ============================================================================

// Log stats request
message LogStatsRequest {
  common.Timestamp start_time = 1;               // Start time
  common.Timestamp end_time = 2;                 // End time
}

// Storage stats request
message StorageStatsRequest {
}

// Export logs request
message ExportLogsRequest {
  common.Timestamp start_time = 1;               // Start of time range
  common.Timestamp end_time = 2;                 // End of time range
  ExportFormat format = 3;                       // Export format
  LogType log_type = 4;                          // Filter by log type
  common.IPAddress ip_filter = 5;                // Optional IP filter
  string destination = 6;                        // FILE/S3/FTP destination
  bool compress = 7;                             // Compress export
}

// Schedule export request
message ScheduleExportRequest {
  string schedule_cron = 1;                      // Cron expression
  ExportLogsRequest export_config = 2;           // Export configuration
  bool enabled = 3;                              // Enable schedule
}

// ============================================================================
// RESPONSE MESSAGES
// ============================================================================

// Log response
message LogResponse {
  string log_id = 1;                             // Generated log ID
  common.Status status = 2;                      // Ingestion status
  common.Timestamp ingestion_time = 3;           // When log was ingested
}

// Bulk log response
message BulkLogResponse {
  uint32 successful_count = 1;                   // Successfully ingested
  uint32 failed_count = 2;                       // Failed to ingest
  repeated string failed_log_ids = 3;            // IDs of failed logs
  common.Status status = 4;                      // Overall status
}

// Log query response
message LogQueryResponse {
  repeated LogEntry log_entries = 1;             // Log entries
  uint32 total_count = 2;                        // Total matching logs
  common.Pagination pagination = 3;              // Pagination info
}

// Log stats response
message LogStatsResponse {
  uint64 total_logs = 1;                         // Total log count
  map<string, uint64> logs_by_protocol = 2;      // Breakdown by protocol
  map<string, uint64> logs_by_service = 3;       // Breakdown by service
  uint64 storage_used_bytes = 4;                 // Storage used
  common.Timestamp oldest_log_timestamp = 5;     // Oldest log time
  common.Timestamp newest_log_timestamp = 6;     // Newest log time
  map<string, uint64> logs_by_type = 7;          // Breakdown by type
}

// Storage stats response
message StorageStatsResponse {
  uint64 total_storage_bytes = 1;                // Total storage
  uint64 available_storage_bytes = 2;            // Available storage
  double compression_ratio = 3;                  // Compression ratio
  uint64 logs_per_day_average = 4;               // Average logs/day
  map<string, uint64> storage_by_type = 5;       // Storage by log type
}

// Retention policy response
message RetentionPolicyResponse {
  common.Status status = 1;                      // Operation status
  RetentionPolicy policy = 2;                    // Retention policy
  string message = 3;                            // Status message
}

// Purge logs response
message PurgeLogsResponse {
  common.Status status = 1;                      // Operation status
  uint64 logs_purged = 2;                        // Number of logs purged
  uint64 bytes_freed = 3;                        // Bytes freed
  bool was_dry_run = 4;                          // Was this a dry run
}

// Export response
message ExportResponse {
  string export_id = 1;                          // Export job ID
  common.Status status = 2;                      // Export status
  string file_path = 3;                          // Export file path/URL
  uint64 size_bytes = 4;                         // Export size
  ExportFormat format = 5;                       // Export format
  common.Timestamp created_at = 6;               // When export created
}

// ============================================================================
// DATA STRUCTURES
// ============================================================================

// Log entry
message LogEntry {
  string id = 1;                                 // Unique log ID
  common.Timestamp timestamp = 2;                // Log timestamp
  LogType log_type = 3;                          // Type of log
  common.IPAddress source_ip = 4;                // Source IP
  common.IPAddress dest_ip = 5;                  // Destination IP
  uint32 source_port = 6;                        // Source port
  uint32 dest_port = 7;                          // Destination port
  common.Protocol protocol = 8;                  // Network protocol
  string event_data = 9;                         // Event data (JSON)
  LogSeverity severity = 10;                     // Log severity
  string service_name = 11;                      // Originating service
  common.Timestamp indexed_at = 12;              // When log was indexed
}

// Retention policy
message RetentionPolicy {
  LogType log_type = 1;                          // Log type
  uint32 retention_days = 2;                     // Retention period
  bool compression_enabled = 3;                  // Compression enabled
  CompressionAlgorithm compression_algorithm = 4;// Compression algorithm
  string archive_location = 5;                   // Archive location
  bool auto_purge_enabled = 6;                   // Auto-purge enabled
  uint32 archive_after_days = 7;                 // Days before archiving
}
