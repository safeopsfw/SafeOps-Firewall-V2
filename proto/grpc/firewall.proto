syntax = "proto3";

// Package and Imports
package safeops.firewall;

import "common.proto";

option go_package = "safeops/build/proto/go/firewall";

// ============================================================================
// SERVICE DEFINITION
// ============================================================================

// Firewall Service - Packet filtering, NAT, connection tracking, DDoS protection
service FirewallService {
  // Rule Management
  rpc AddRule(AddRuleRequest) returns (RuleResponse);
  rpc RemoveRule(RemoveRuleRequest) returns (RuleResponse);
  rpc UpdateRule(UpdateRuleRequest) returns (RuleResponse);
  rpc ListRules(ListRulesRequest) returns (RuleListResponse);
  rpc FlushRules(FlushRulesRequest) returns (RuleResponse);
  
  // NAT Operations
  rpc EnableNAT(NATEnableRequest) returns (NATResponse);
  rpc DisableNAT(NATEnableRequest) returns (NATResponse);
  rpc AddNATRule(NATRuleRequest) returns (NATResponse);
  rpc RemoveNATRule(RemoveNATRuleRequest) returns (NATResponse);
  rpc ListNATRules(ListNATRulesRequest) returns (NATRuleListResponse);
  
  // Connection Tracking
  rpc GetConnections(GetConnectionsRequest) returns (ConnectionListResponse);
  rpc DropConnection(DropConnectionRequest) returns (ConnectionResponse);
  rpc GetConnectionStats(ConnectionStatsRequest) returns (ConnectionStatsResponse);
  
  // DDoS Protection
  rpc EnableDDoSProtection(DDoSEnableRequest) returns (DDoSResponse);
  rpc UpdateDDoSThresholds(DDoSThresholdsRequest) returns (DDoSResponse);
  rpc GetDDoSStats(DDoSStatsRequest) returns (DDoSStatsResponse);
  
  // Policy Management
  rpc SetDefaultPolicy(PolicyRequest) returns (PolicyResponse);
  rpc GetPolicy(GetPolicyRequest) returns (PolicyResponse);
  
  // Statistics
  rpc GetFirewallStats(FirewallStatsRequest) returns (FirewallStatsResponse);
  rpc StreamStats(FirewallStatsRequest) returns (stream FirewallStatsResponse);
}

// ============================================================================
// ENUMERATIONS
// ============================================================================

// Rule insertion position
enum RulePosition {
  POSITION_UNKNOWN = 0;
  POSITION_TOP = 1;
  POSITION_BOTTOM = 2;
  POSITION_BEFORE = 3;
  POSITION_AFTER = 4;
}

// NAT type
enum NATType {
  NAT_TYPE_UNKNOWN = 0;
  NAT_TYPE_SNAT = 1;          // Source NAT
  NAT_TYPE_DNAT = 2;          // Destination NAT
  NAT_TYPE_MASQUERADE = 3;    // Dynamic SNAT
}

// Connection state
enum ConnectionState {
  STATE_UNKNOWN = 0;
  STATE_NEW = 1;
  STATE_ESTABLISHED = 2;
  STATE_RELATED = 3;
  STATE_INVALID = 4;
}

// Firewall chain
enum FirewallChain {
  CHAIN_UNKNOWN = 0;
  CHAIN_INPUT = 1;
  CHAIN_OUTPUT = 2;
  CHAIN_FORWARD = 3;
}

// ============================================================================
// REQUEST MESSAGES - RULE MANAGEMENT
// ============================================================================

// Add rule request
message AddRuleRequest {
  FirewallRule rule = 1;                 // Rule to add
  RulePosition position = 2;             // Where to insert
  string reference_rule_id = 3;          // For BEFORE/AFTER position
  bool enabled = 4;                      // Enable immediately
}

// Remove rule request
message RemoveRuleRequest {
  string rule_id = 1;                    // Rule ID to remove
}

// Update rule request
message UpdateRuleRequest {
  string rule_id = 1;                    // Rule ID to update
  FirewallRule updated_rule = 2;         // New rule definition
}

// List rules request
message ListRulesRequest {
  common.Protocol protocol = 1;          // Filter by protocol
  common.ActionType action = 2;          // Filter by action
  bool enabled_only = 3;                 // Only enabled rules
  common.Pagination pagination = 4;      // Pagination
}

// Flush rules request
message FlushRulesRequest {
  FirewallChain chain = 1;               // Chain to flush (empty for all)
}

// ============================================================================
// REQUEST MESSAGES - NAT OPERATIONS
// ============================================================================

// Enable/Disable NAT request
message NATEnableRequest {
  string interface = 1;                  // Network interface
  bool enabled = 2;                      // Enable or disable
}

// NAT rule request
message NATRuleRequest {
  NATType type = 1;                      // NAT type
  string interface = 2;                  // Network interface
  common.IPAddress original_ip = 3;      // Original IP address
  uint32 original_port = 4;              // Original port
  common.IPAddress translated_ip = 5;    // Translated IP address
  uint32 translated_port = 6;            // Translated port
}

// Remove NAT rule request
message RemoveNATRuleRequest {
  string nat_rule_id = 1;                // NAT rule ID to remove
}

// List NAT rules request
message ListNATRulesRequest {
  NATType type = 1;                      // Filter by NAT type
  string interface = 2;                  // Filter by interface
}

// ============================================================================
// REQUEST MESSAGES - CONNECTION TRACKING
// ============================================================================

// Get connections request
message GetConnectionsRequest {
  common.Protocol protocol = 1;          // Filter by protocol
  common.IPAddress source_ip = 2;        // Filter by source IP
  common.IPAddress dest_ip = 3;          // Filter by destination IP
  ConnectionState state = 4;             // Filter by state
  common.Pagination pagination = 5;      // Pagination
}

// Drop connection request
message DropConnectionRequest {
  string connection_id = 1;              // Connection ID to drop
  string reason = 2;                     // Reason for dropping
}

// Connection stats request
message ConnectionStatsRequest {
}

// ============================================================================
// REQUEST MESSAGES - DDoS PROTECTION
// ============================================================================

// Enable DDoS protection request
message DDoSEnableRequest {
  bool enabled = 1;                      // Enable or disable
}

// DDoS thresholds request
message DDoSThresholdsRequest {
  DDoSThresholds thresholds = 1;         // Threshold configuration
}

// DDoS stats request
message DDoSStatsRequest {
}

// ============================================================================
// REQUEST MESSAGES - POLICY & STATISTICS
// ============================================================================

// Policy request
message PolicyRequest {
  FirewallChain chain = 1;               // Chain name
  common.ActionType default_action = 2;  // Default action
}

// Get policy request
message GetPolicyRequest {
  FirewallChain chain = 1;               // Chain to query
}

// Firewall stats request
message FirewallStatsRequest {
}

// ============================================================================
// RESPONSE MESSAGES
// ============================================================================

// Rule response
message RuleResponse {
  common.Status status = 1;              // Operation status
  string rule_id = 2;                    // Affected rule ID
  string error_message = 3;              // Error message if failed
}

// Rule list response
message RuleListResponse {
  repeated FirewallRule rules = 1;       // List of rules
  uint32 total_count = 2;                // Total number of rules
  common.Pagination pagination = 3;      // Pagination info
}

// NAT response
message NATResponse {
  common.Status status = 1;              // Operation status
  string nat_rule_id = 2;                // NAT rule ID
  string error_message = 3;              // Error message if failed
}

// NAT rule list response
message NATRuleListResponse {
  repeated NATRule rules = 1;            // List of NAT rules
  uint32 total_count = 2;                // Total number of rules
}

// Connection response
message ConnectionResponse {
  common.Status status = 1;              // Operation status
  string message = 2;                    // Status message
}

// Connection list response
message ConnectionListResponse {
  repeated Connection connections = 1;   // List of connections
  uint32 total_count = 2;                // Total connections
  common.Pagination pagination = 3;      // Pagination info
}

// Connection statistics response
message ConnectionStatsResponse {
  uint64 total_connections = 1;                    // Total active connections
  map<string, uint64> by_protocol = 2;             // Breakdown by protocol
  map<string, uint64> by_state = 3;                // Breakdown by state
  common.Timestamp timestamp = 4;                  // When stats collected
}

// DDoS response
message DDoSResponse {
  common.Status status = 1;              // Operation status
  string message = 2;                    // Status message
}

// DDoS statistics response
message DDoSStatsResponse {
  uint64 blocked_packets = 1;            // Packets blocked
  uint64 blocked_connections = 2;        // Connections blocked
  map<string, double> current_rates = 3; // Current packet/connection rates
  common.Timestamp timestamp = 4;        // When stats collected
}

// Policy response
message PolicyResponse {
  common.Status status = 1;              // Operation status
  FirewallChain chain = 2;               // Chain name
  common.ActionType default_action = 3;  // Default action
}

// Firewall statistics response
message FirewallStatsResponse {
  uint64 packets_processed = 1;          // Total packets processed
  uint64 packets_blocked = 2;            // Packets blocked
  uint64 packets_allowed = 3;            // Packets allowed
  uint64 bytes_total = 4;                // Total bytes processed
  common.Timestamp timestamp = 5;        // When stats collected
}

// ============================================================================
// DATA STRUCTURES
// ============================================================================

// Firewall rule
message FirewallRule {
  string id = 1;                         // Unique rule ID
  string name = 2;                       // Rule name
  bool enabled = 3;                      // Is rule enabled
  uint32 priority = 4;                   // Rule priority (lower = higher priority)
  
  // Match criteria
  common.IPAddress source_ip = 5;        // Source IP address
  common.IPAddress dest_ip = 6;          // Destination IP address
  uint32 source_port = 7;                // Source port (0 = any)
  uint32 dest_port = 8;                  // Destination port (0 = any)
  common.Protocol protocol = 9;          // Network protocol
  
  // Action
  common.ActionType action = 10;         // Action to take
  
  // Options
  bool log_enabled = 11;                 // Enable logging for matches
  string comment = 12;                   // Human-readable comment
  
  // Metadata
  common.Timestamp created_at = 13;      // When rule was created
  common.Timestamp updated_at = 14;      // Last update time
}

// NAT rule
message NATRule {
  string id = 1;                         // Unique NAT rule ID
  NATType type = 2;                      // NAT type
  string interface = 3;                  // Network interface
  
  // Original address
  common.IPAddress original_ip = 4;      // Original IP
  uint32 original_port = 5;              // Original port (0 = any)
  
  // Translated address
  common.IPAddress translated_ip = 6;    // Translated IP
  uint32 translated_port = 7;            // Translated port (0 = any)
  
  // Metadata
  common.Timestamp created_at = 8;       // When rule was created
}

// Active connection
message Connection {
  string id = 1;                         // Connection ID
  common.Protocol protocol = 2;          // Protocol
  
  // Source
  common.IPAddress source_ip = 3;        // Source IP
  uint32 source_port = 4;                // Source port
  
  // Destination
  common.IPAddress dest_ip = 5;          // Destination IP
  uint32 dest_port = 6;                  // Destination port
  
  // State and statistics
  ConnectionState state = 7;             // Connection state
  uint64 bytes_sent = 8;                 // Bytes sent
  uint64 bytes_received = 9;             // Bytes received
  uint64 packets_sent = 10;              // Packets sent
  uint64 packets_received = 11;          // Packets received
  common.Timestamp start_time = 12;      // Connection start time
  common.Timestamp last_seen = 13;       // Last activity time
}

// DDoS protection thresholds
message DDoSThresholds {
  uint32 syn_flood_pps = 1;              // SYN packets per second threshold
  uint32 max_connections_per_ip = 2;     // Max connections per IP
  uint32 packet_rate_limit = 3;          // Overall packet rate limit
  bool enable_geo_blocking = 4;          // Enable geographic blocking
}
